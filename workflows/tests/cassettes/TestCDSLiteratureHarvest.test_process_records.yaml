        performance results, specifically optimised for the upcoming ATLAS Inner Tracker
        (ITk). The GN2 algorithm, a novel transformer-based approach, delivers significant
        improvements in jet flavour identification. Using simulated datasets of $t\\\\bar{t}$
        and $Z^\\\\prime$ events, we demonstrate GN2\u2019s significant rejection
        power for both light- and charm-jet backgrounds. The GN2 performance obtained
        with Run 4 detector simulation is compared with the performance of the GN2
        algorithm tuning for the Run 3 detector. Similar performance is achieved in
        the $t\\\\bar{t}$ $p_{\\\\text{T}}$ regime, while the light-jet rejection
        can be improved by up to a factor 40 in the high-$p_{\\\\text{T}}$ regime.
        The new ITk detector extends in addition the $b$-tagging acceptance in the
        region $2.5<|\\\\eta|<4.0$. This work establishes GN2 as a critical component
        for Run 4, setting a new standard for robustness and accuracy in flavour-tagging
        at the HL-LHC.\"}],\"inspire_categories\":[{\"term\":\"Experiment-HEP\",\"source\":\"cds\"}],\"keywords\":[{\"source\":\"CERN\",\"value\":\"BTAGGING\"},{\"source\":\"CERN\",\"value\":\"FUTURE\"}],\"accelerator_experiments\":[{\"legacy_name\":\"CERN-LHC-ATLAS\"}],\"collaborations\":[{\"value\":\"ATLAS\"}],\"documents\":[{\"key\":\"ATL-PHYS-PUB-2026-002.pdf\",\"url\":\"http://cds.cern.ch/record/2956726/files/ATL-PHYS-PUB-2026-002.pdf\",\"source\":\"CDS\"}],\"external_system_identifiers\":[{\"schema\":\"CDS\",\"value\":\"2956726\"}],\"$schema\":\"hep.json\",\"curated\":true,\"acquisition_source\":{\"source\":\"CDS\",\"method\":\"hepcrawl\",\"datetime\":\"2026-04-14T08:54:08.641368\",\"submission_number\":\"__airflow_temporary_run_2026-04-14T08:54:05.920210+00:00__\"}},\"tickets\":[],\"decisions\":[],\"workflow_type\":\"HEP_PUBLISHER_CREATE\",\"classifier_results\":null,\"merge_details\":null,\"callback_url\":null,\"_created_at\":\"2026-04-14T08:54:08.683129Z\",\"_updated_at\":\"2026-04-14T08:54:08.683179Z\",\"journal_coverage\":null,\"relevance_prediction\":null,\"reference_count\":null,\"matches\":null,\"form_data\":null,\"status\":\"processing\"}"
