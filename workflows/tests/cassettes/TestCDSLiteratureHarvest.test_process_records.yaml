        \ <marc:datafield tag=\"300\" ind1=\" \" ind2=\" \">\n    <marc:subfield code=\"a\">mult.
        p</marc:subfield>\n  </marc:datafield>\n  <marc:datafield tag=\"500\" ind1=\"
        \" ind2=\" \">\n    <marc:subfield code=\"a\">All figures including auxiliary
        figures are available at https://atlas.web.cern.ch/Atlas/GROUPS/PHYSICS/PUBNOTES/ATL-PHYS-PUB-2026-002</marc:subfield>\n
        \ </marc:datafield>\n  <marc:datafield tag=\"520\" ind1=\" \" ind2=\" \">\n
        \   <marc:subfield code=\"a\">As the ATLAS experiment prepares for the High-Luminosity
        LHC era, the latest advancements in flavour-tagging algorithms are essential
        for optimising the performance of the upgraded Run 4 detector. This note presents
        the first GN2 performance results, specifically optimised for the upcoming
        ATLAS Inner Tracker (ITk). The GN2 algorithm, a novel transformer-based approach,
        delivers significant improvements in jet flavour identification. Using simulated
        datasets of $t\\bar{t}$ and $Z^\\prime$ events, we demonstrate GN2\u2019s
        significant rejection power for both light- and charm-jet backgrounds. The
        GN2 performance obtained with Run 4 detector simulation is compared with the
        performance of the GN2 algorithm tuning for the Run 3 detector. Similar performance
        is achieved in the $t\\bar{t}$ $p_{\\text{T}}$ regime, while the light-jet
        rejection can be improved by up to a factor 40 in the high-$p_{\\text{T}}$
        regime. The new ITk detector extends in addition the $b$-tagging acceptance
        in the region $2.5&lt;|\\eta|&lt;4.0$. This work establishes GN2 as a critical
        component for Run 4, setting a new standard for robustness and accuracy in
        flavour-tagging at the HL-LHC.</marc:subfield>\n  </marc:datafield>\n  <marc:datafield
        tag=\"594\" ind1=\" \" ind2=\" \">\n    <marc:subfield code=\"a\">PUB</marc:subfield>\n
