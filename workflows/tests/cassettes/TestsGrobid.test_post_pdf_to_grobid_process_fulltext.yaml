        level=\"a\" type=\"main\">Efficient Visual Question Answering Pipeline for
        Autonomous Driving via Scene Region Compression</title>\n\t\t\t\t\t</analytic>\n\t\t\t\t\t<monogr>\n\t\t\t\t\t\t<imprint>\n\t\t\t\t\t\t\t<date
        type=\"published\" when=\"2026-01-11\">11 Jan 2026</date>\n\t\t\t\t\t\t</imprint>\n\t\t\t\t\t</monogr>\n\t\t\t\t\t<idno
        type=\"MD5\">96F485A710DA89C85F7D9657059810FB</idno>\n\t\t\t\t\t<idno type=\"arXiv\">arXiv:2601.07092v1[cs.CV]</idno>\n\t\t\t\t</biblStruct>\n\t\t\t</sourceDesc>\n\t\t</fileDesc>\n\t\t<encodingDesc>\n\t\t\t<appInfo>\n\t\t\t\t<application
        version=\"0.7.3\" ident=\"GROBID\" when=\"2026-04-09T13:03+0000\">\n\t\t\t\t\t<desc>GROBID
        - A machine learning software for extracting information from scholarly documents</desc>\n\t\t\t\t\t<ref
        target=\"https://github.com/kermitt2/grobid\"/>\n\t\t\t\t</application>\n\t\t\t</appInfo>\n\t\t</encodingDesc>\n\t\t<profileDesc>\n\t\t\t<abstract>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><p>Autonomous driving increasingly relies
        on Visual Question Answering (VQA) to enable vehicles to understand complex
        surroundings by analyzing visual inputs and textual queries. Currently, a
        paramount concern for VQA in this domain is the stringent requirement for
        fast latency and real-time processing, as delays directly impact real-world
        safety in this safety-critical application. However, current state-of-theart
        VQA models, particularly large vision-language models (VLMs), often prioritize
        performance over computational efficiency. These models typically process
        dense patch tokens for every frame, leading to prohibitive computational costs
        (FLOPs) and significant inference latency, especially with long video sequences.
        This focus limits their practical deployment in real-time autonomous driving
        scenarios. To tackle this issue, we propose an efficient VLM framework for
        autonomous driving VQA tasks, SRC-Pipeline. It learns to compress early frame
        tokens into a small number of high-level tokens while retaining full patch
        tokens for recent frames. Experiments on autonomous driving video question
        answering tasks show that our approach achieves 66% FLOPs reduction while
        maintaining comparable performance, enabling VLMs to operate more effectively
        in real-time, safety-critical autonomous driving settings.</p></div>\n\t\t\t</abstract>\n\t\t</profileDesc>\n\t</teiHeader>\n\t<text
        xml:lang=\"en\">\n\t\t<body>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"1.\">Introduction</head><p>Autonomous driving increasingly depends on
        large vision-language models (VLMs) to enhance multimodal understanding by
        bridging visual and textual modalities through large-scale pretraining. Early
        models <ref type=\"bibr\" target=\"#b5\">[5,</ref><ref type=\"bibr\" target=\"#b7\">7,</ref><ref
        type=\"bibr\" target=\"#b12\">12]</ref> have demonstrated that combining powerful
        vision encoders with large language models enables strong performance on a
        variety of multimodal tasks, such as image Figure <ref type=\"figure\">1</ref>.
        Difference between general-purpose video question answering and autonomous
        driving video question answering. While the question of the general-purpose
        video question answering covers the information from all the frames, the question
        of the autonomous driving video question answering mostly focuses on the later
        frames due to the timeliness of the autonomous driving video. captioning,
        image-text retrieval, visual question answering (VQA), etc. Extending these
        ideas, video question answering has emerged as a promising paradigm for domains
        where temporal reasoning and causal understanding are critical. In particular,
        autonomous driving is an application field where answering natural language
        queries about dynamic traffic scenes can evaluate and enhance the reasoning
        capabilities of the perception system. Recent benchmarks <ref type=\"bibr\"
        target=\"#b1\">[2,</ref><ref type=\"bibr\" target=\"#b10\">10,</ref><ref type=\"bibr\"
        target=\"#b15\">15]</ref> exemplify this trend, providing large-scale datasets
        that frame autonomous driving challenges-such as detecting pedestrians, recognizing
        traffic signals, or predicting vehicle intent-as visual-based question answering
        problems.</p><p>Despite these advances, existing VLMs face serious efficiency
        challenges when applied to autonomous driving. Modern models often contain
        billions of parameters and rely on dense patch tokenization of each video
        frame, which can result in hundreds of visual tokens per frame <ref type=\"bibr\"
        target=\"#b4\">[4,</ref><ref type=\"bibr\" target=\"#b17\">17]</ref>. While
        such designs are suitable for offline benchmarks, they are not suitable to
        safety-critical driving scenarios where real-time perception and reasoning
        are essential. Autonomous driving systems must react within strict latency
        budgets-often a few hundred milliseconds-when making decisions such as braking
        for pedestrians or changing lanes in dense traffic. In such contexts, the
        high floating-point operation (FLOP) requirements and large memory footprint
        of current VLMs present a major barrier to deployment. Even modest delays
        in processing visual streams can degrade safety, underscoring the importance
        of designing VLMs that are both accurate and computationally efficient.</p><p>To
        address this challenge, recent works have begun to explore efficient multimodal
        modeling strategies. Approaches such as token pruning, adaptive visual tokenization,
        and dynamic resolution scaling <ref type=\"bibr\" target=\"#b6\">[6,</ref><ref
        type=\"bibr\" target=\"#b17\">17]</ref> attempt to reduce the number of tokens
        passed to the language decoder, thereby lowering the dominant FLOPs cost.
        However, these methods only focus on the token-efficient design for general
        video question answering, without considering the unique property of the autonomous
        driving video question answering (VideoQA). In general VideoQA task <ref type=\"bibr\"
        target=\"#b19\">[19]</ref>, the questions are highly diverse-ranging from
        summarization and description to captioning and decision making-and may require
        detailed information from arbitrary temporal segments of the video. For example,
        the questions could be \"what is the cat doing?\", \"Why is the kid crying?\",
        and \"Is the dog barking at the first ten seconds?\" In contrast, the questions
        from autonomous driving VideoQA <ref type=\"bibr\" target=\"#b9\">[9,</ref><ref
        type=\"bibr\" target=\"#b10\">10]</ref> are relatively homogeneous, focusing
        on the real-time perception (eg. what is the traffic light color now?) and
        the decision making (eg. what should be the next-step action of the vehicle?\"),
        which highly depend on the visual information from the later frames in the
        video.</p><p>Based on the uniqueness of the autonomous driving VideoQA, we
        propose an efficient VLM framework for video question answering of autonomous
        driving, SRC-Pipeline, which leverages frame-level token compression. We hypothesis
        that in the domain of real-time traffic scene analysis and decision making,
        later frames are typically more informative than earlier frames. By summarizing
        early frames into compact high-level tokens while retaining dense patch tokens
        for later, contextually critical frames, our method reduces the computational
        burden of VLM inference with only slightly drop of reasoning accuracy. This
        design significantly lowers FLOPs in the language decoder-the primary computational
        bottleneck-while maintaining the ability to reason about both long-term temporal
        context and fine-grained spatial detail. We demonstrate that our approach
        achieves competitive accuracy with substantially reduced computation on driving-focused
        VideoQA benchmarks, highlighting its potential for real-time deployment in
        latency-sensitive autonomous driving systems.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"2.\">Related Works</head><p>Visual Question Answering (VQA) has emerged
        as a crucial area of research for enhancing the interpretability, trustworthiness,
        and overall capability of autonomous driving (AD) systems. By enabling vehicles
        to answer natural language questions about their surrounding environment,
        VQA bridges the gap between raw sensor data and humanunderstandable reasoning,
        a critical step for safety-critical applications like autonomous driving <ref
        type=\"bibr\" target=\"#b0\">[1,</ref><ref type=\"bibr\" target=\"#b10\">10,</ref><ref
        type=\"bibr\" target=\"#b13\">13]</ref>. Recent advancements in Vision-Language
        Models (VLMs) and Multimodal Large Language Models (MLLMs) have significantly
        propelled VQA research in AD.</p><p>These models, by synthesizing linguistic
        and visual data, promise a new era of intelligent and efficient transportation
        systems capable of deep environmental understanding and natural language interaction.
        LMDrive <ref type=\"bibr\" target=\"#b14\">[14]</ref> proposes an LLM-based
        end-to-end driving framework on close-loop scenario by integrating multi-modal
        sensor data with natural language instructions, enabling interaction with
        humans and navigation software in realistic instructional settin DriveGPT4
        <ref type=\"bibr\" target=\"#b20\">[20]</ref>, on the other hand, develops
        an multimodal large language model to offer interpretation of the vehicle's
        action and predict the low-level control signal in an end-to-end manner. TOKEN
        <ref type=\"bibr\" target=\"#b16\">[16]</ref> proposes a novel Multi-Modal
        Large Language Model that tokenizes the world into object-level knowledge,
        which aims to address long-tail events in autonomous driving by producing
        condensed and semantically enriched representations of the scene.</p><p>The
        methods mentioned above primarily focuses on VLM performance in autonomous
        driving, yet often overlooks efficiency, which is crucial for real-time, safetycritical
        operations and constrained onboard computational resources. To tackle the
        efficiency issue, VTS <ref type=\"bibr\" target=\"#b8\">[8]</ref> focuses
        on using CNN-based model to adaptively identify the key frame and reduce the
        less informative tokens in the autonomous driving video. FastDriveVLA <ref
        type=\"bibr\" target=\"#b2\">[3]</ref> proposes a plug-and-play module for
        VLMs to perform token pruning. Instead of using visual token similarity or
        video-text attention, it designs a reconstruction-based pruning strategy using
        MAE-style pixel reconstruction technique.</p><p>However, while the token pruning
        methods can effectively reduce the redundant visual token and save bandwidth
        for LLM computation, they also introduce extra computation to identify the
        less informative and redundant tokens, which makes such approaches less efficient.
        As a result, we propose a new temporal-based token compression strategy that
        can significantly reduce the amount of visual token based on the timeliness
        of the frame, instead of introducing extra computation, to save the FLOPs.
        (lower left): The region attention mask. For each of the region tokens, the
        attention of it to the patch tokens that do not belong to the specific region
        will be masked out.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"3.\">Problem Description</head><p>Our study focuses on video question
        answering (VideoQA) for autonomous driving, where a model must reason over
        driving videos and preserving detailed visual information in a computational
        efficient manner. Given a dataset D = {(V i , q i , a i )} N i=1 , where each
        sample consists of a driving clip V i = (I 1 , I 2 , ..., I T ) with T frames,
        a question q i , and a corresponding ground truth answer a i . A text encoder,
        f text maps the question, q i , into a semantic feature representation:</p><formula
        xml:id=\"formula_0\">Q i = f text (q i ).<label>(1)</label></formula><p>Meanwhile,
        a visual encoder f vis extracts multi-level visual features from each video
        frame I t :</p><formula xml:id=\"formula_1\">V t = f vis (I t ) = [C t , P
        t ].<label>(2)</label></formula><p>Specifically, it produces two sets of tokens:</p><p>\u2022
        a compact contextual representation C t \u2208 R m\xD7d , where m is the size
        of contextual tokens, which summarizes high-level semantics of the frame,
        and \u2022 a patch token representation P t \u2208 R n\xD7d , where n is the
        token length for the frame, capturing detailed spatial information.</p><p>To
        reduce computational overhead while retaining fidelity, we adopt a hybrid
        token selection strategy: we represent the first m frames with the contextual
        representation. For the earlier frames (t \u2264 m), we substitute the patch
        tokens P t with their counterpart C t , while for later frames we preserve
        the patch tokens. This design ensures that the model focuses its bandwidth
        on the more informative parts of the video, which are often concentrated in
        later temporal segments, while keep the global context information of the
        whole video, like weather, traffic condition, etc. The final multimodal input
        to the language decoder f dec is thus constructed as</p><formula xml:id=\"formula_2\">X
        = (Q, C 1 , C 2 , ..., C m , P m+1 , ..., P T ).<label>(3)</label></formula><p>The
        decoder f dec integrates visual and textual representations to generate the
        predicted answer \xE2.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"4.\">Methodology</head><p>We introduce our proposed scene-region compression
        pipeline (SRC-Pipeline) for efficient autonomous driving video question answering,
        the pipeline is shown in left side of Figure <ref type=\"figure\" target=\"#fig_0\">2</ref>.
        SRC-Pipeline is a visual token compression technique based on the large VLMs
        which aims to efficiently solve the VideoQA task for autonomous driv- </p></div>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><head n=\"4.1.\">Scene Region Compression
        for Vision Transformer</head><p>We introduce the Scene Region Vision Transformer
        (SRC-ViT), shown in the upper right of Figure <ref type=\"figure\" target=\"#fig_0\">2</ref>,
        a novel visual encoder designed to improve the computational efficiency of
        video question answering (VideoQA) for autonomous driving. The core idea of
        SRC-ViT is to replace less informative patch tokens from earlier frames with
        compact scene-region compression tokens and reduce FLOPs while preserving
        essential spatial-temporal information.</p><p>Unlike the the visual encoders
        of the general-purpose VLMs <ref type=\"bibr\" target=\"#b4\">[4,</ref><ref
        type=\"bibr\" target=\"#b18\">18]</ref> which input hundreds of dense patch
        tokens per frame into the language decoder, SRC-ViT generates both fine-grained
        patch representations and high-level compression tokens. Inspired by the success
        of the [CLS] token in CLIP <ref type=\"bibr\" target=\"#b12\">[12]</ref>,
        our design extends this idea by introducing a multi-scale set of learnable
        tokens that capture global and localized information at different levels.
        Specifically, each frame is augmented with one scene token and four region
        tokens, corresponding to the upper-left, upper-right, lowerleft, and lower-right
        quadrants. This enables the model to encode both holistic semantics and localized
        spatial details in a compressed form.</p><p>Given an input frame I, the patch
        embedding layer E p produces a sequence of patch tokens P = {P 1 , P 2 , ...,
        P n } = E p (I).</p><p>We then augment these tokens with a set of learnable
        highlevel tokens, including a scene token S and four region tokens (R ul ,R
        ur ,R ll ,R lr ). The combined input to SRC-ViT's transformer encoder E t
        is Z = [S, R ul , R ur , R ll , R lr , P 1 , P 2 , ..., P n ] + T pos , where
        T pos denotes positional embeddings.</p><p>To ensure that each region token
        only summarize information from its designated spatial partition, we modify
        the self-attention mask M \u2208 {0, 1} (n+5)\xD7(n+5) , shown in the lower
        right of Figure <ref type=\"figure\" target=\"#fig_0\">2</ref>. Specifically,
        for a region token R, attention is restricted to the subset of patch tokens
        P r corresponding to its spatial quadrant:</p><formula xml:id=\"formula_3\">Attn(R,
        P j ) = 0, if P j / \u2208 P r .</formula><p>This constraint enforces spatial
        grounding, ensuring that the learned region tokens encode localized compression
        features align with specific areas of the frames. The transformer encoder
        then outputs a set of encoded features:</p><formula xml:id=\"formula_4\">O
        = E t (Z) = [ \u015C, Rul , Rur , Rll , Rlr , P1 , P2 , ..., Pn ],</formula><p>where
        each element represents the updated embedding of its corresponding input token.
        The resulting compression tokens ( \u015C, Rul , Rur , Rll , Rlr ) provide
        a compact and semantically rich summary of the frame, allowing the VLM pipline
        to substitue dense early-frame patches with these tokens while retaining detailed
        patch tokens for later, more informative frames.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"4.2.\">Token Compression VLM Pipeline</head><p>Building on the proposed
        SRC-ViT, we design the SRC-Pipeline to efficiently integrate compressed visual
        tokens into the vision-language model (VLM) for autonomous driving video question
        answering. The central motivation is that in real-time driving scenarios,
        later frames often contain more critical details for perception and decision
        making, whereas earlier frames primarily provide contextual semantics. To
        exploit this property, we substitute dense patch tokens from early frames
        with compact scene-region compression tokens, thereby reducing the FLOPs cost
        while preserving the semantics. Consider a driving video composed of N frames,
        V 1 , V 2 , ..., V n . For each frame V i , the SRC-ViT produces two types
        of representations: \u2022 Compression token C i , consisting of one scene
        token and four region tokens.</p><p>\u2022 Patch tokens P i , capturing the
        fine-grained spatial details. The full visual feature sequence is thus V =
        [(C 1 , P 1 ), (C 2 , P 2 ), ..., (C T , P T )].</p><p>To reduce computational
        overhead, we represent the first M frames using only the compression tokens
        C 1 , C 2 , ..., C M , , while preserving the full patch tokens P M +1 , P
        M +2 , ..., P T for the later, more informative frames. Since the high-level
        compression tokens must be compatible with the language decoder's feature
        space, we introduce a vision-language mapper M vl , which projects each C
        i into a shared multimodal embedding space:</p><formula xml:id=\"formula_5\">C
        \u2032 = M vl (C i ).<label>(4)</label></formula><p>The resulting visual input
        to the language decoder is</p><formula xml:id=\"formula_6\">V \u2032 = [C
        \u2032 1 , C \u2032 2 , ..., C \u2032 M , P M +1 , P M +2 , ..., P N ].</formula><p>Finally,
        the visual features V \u2032 are fused with the encoded text representation
        of the question,</p><formula xml:id=\"formula_7\">T = E q (q),<label>(5)</label></formula><p>where
        E q is the text encoder. The multimodal input to the decoder is</p><formula
        xml:id=\"formula_8\">I d = [V \u2032 , T ],<label>(6)</label></formula><p>which
        is processed by the LLM decoder E d to generate the final answer A.</p><p>To
        effectively incorporate the proposed scene-region compression strategy into
        the VLM, we design a two-stage training pipeline. This strategy first fine-tunes
        the SRC-ViT to have meaningful high-level compression tokens and then adapts
        the language model to interpret these tokens in a multimodal reasoning context.</p></div>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><head n=\"4.2.1.\">Stage One: SRC-ViT
        Fine-tuning</head><p>Since the original ViT backbone lacks high-level scene
        and region tokens, we train these tokens from scratch using contrastive objectives.
        Specifically, each image is paired with one scene caption and four region
        captions to provide textlevel supervision at multiple spatial scales, which
        is shown in Figure <ref type=\"figure\" target=\"#fig_1\">3</ref>. The captions
        are generated by a large vision-language model <ref type=\"bibr\" target=\"#b21\">[21]</ref>
        to ensure semantic consistency.</p><p>Given an image I, we associate it with
        a set of captions:</p><formula xml:id=\"formula_9\">S(I) = {c s , c ul , c
        ur , c ll , c lr },</formula><p>where c s is the scene-level caption and c
        ul , c ur , c ll , c lr are the region-level captions. The SRC-ViT produces
        a scene token S and four region tokens R ul , R ur , R ll , R lr . Each token
        is aligned with the [CLS] embedding of its corresponding caption from the
        CLIP text encoder via a contrastive loss:</p><formula xml:id=\"formula_10\">L
        total = 1 2 L scene + 1 2 L region ,<label>(7)</label></formula><p>where the
        L scene is the contrastive loss between the image and the scene-level caption,
        and the L region is the contrastive loss between the image and the four caption-level
        captions. To distance the semantic features of similar scenarios and make
        the region-wise image-text matching more accurate, we compute L region by
        contrasting one region image features with all the other region text features
        in the batch, and vice versa, including the regions in the same frame.</p></div>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><head n=\"4.2.2.\">Stage Two: VLM Pipeline
        Fine-tuning</head><p>After fine-tuning SRC-ViT, we freeze its parameters and
        proceed to adapt the vision-language mapper and the LLM decoder. The mapper
        M vl projects the learned high-level tokens into a multimodal embedding space
        that is compatible with the decoder. During this stage, the decoder is fine-tuned
        jointly with M vl so that it can interpret both dense patch tokens and compressed
        scene-region tokens in downstream VideoQA tasks. This process enables the
        LLM to seamlessly integrate compact early-frame features with detailed later-frame
        features, preserving reasoning quality while improving efficiency.</p></div>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><head n=\"5.\">Experiments</head><p>To
        demonstrate the performance of SRC-Pipeline on autonomous driving video question
        answering tasks, we evaluate SRC-Pipeline on the LingoQA <ref type=\"bibr\"
        target=\"#b10\">[10]</ref> dataset, and present the ablation study to examine
        the effectiveness of each designed component.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"5.1.\">Experiment Setup</head><p>To evaluate the performance of SRC-Pipeline,
        we choose the LingoQA as the evaluation benchmark <ref type=\"bibr\" target=\"#b10\">[10]</ref>,
        which contains 419.9k autonomous driving-related QA pairs. It evaluates the
        model's performance on four aspects, including scene description, action prediction,
        justification and attention. Besides the common N-Gram-based metrics such
        as BLEU <ref type=\"bibr\" target=\"#b11\">[11]</ref>, LingoQA introduces
        a semantic-based metric, Lingo-Judge, such that it adopt fine-tuned Bert-based
        model as classifier to evaluate the semantic similarity between the generated
        answer and the ground truth answer. We choose the QWen2VL-7B <ref type=\"bibr\"
        target=\"#b17\">[17]</ref> as the VLM backbone of SRC-Pipeline, which couples
        a 675M-parameter Vision Transformer with a 7.6B-parameter language decoder.
        To encode the scene token and the region tokens via ViT, we apply the same
        positional embedding to them as to the patch tokens. Notably, the QWen2VL
        model applies Multimodal Rotary Position Embedding (M-RoPE) as the positional
        embedding of its LLM decoder input, unifying positional encoding across time,
        x index and y index in visual domain. To fit the high-level tokens into the
        M-RoPE, we modify the M-RoPE of the scene and region tokens' x and y position
        embedding to be the center of its focused area. For example, for the region
        token of a frame which focuses on m th to n th patch token for row and i th
        to j th patch token for column, the x and y index of it will be:</p><formula
        xml:id=\"formula_11\">p x = (m + n) 2 , p y = (i + j) 2 . (<label>8</label></formula><formula
        xml:id=\"formula_12\">)</formula><p>The temporal index of the scene region
        tokens are the same of the patch tokens in the same frame.</p><p>For the baseline
        methods, we adopt several SOTA VLMs, including LingoQA <ref type=\"bibr\"
        target=\"#b10\">[10]</ref>, LLaVA <ref type=\"bibr\" target=\"#b7\">[7]</ref>,
        BLIP-2 <ref type=\"bibr\" target=\"#b5\">[5]</ref>, QWen2VL <ref type=\"bibr\"
        target=\"#b17\">[17]</ref>, and fine-tune them on LingoQA dataset.</p></div>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><head n=\"5.2.\">Experiment Result</head><p>We
        present our experiment results on LingoQA in table1, where the column Frames
        represents the number of frames preserved in the video. While LingoQA only
        contains 5 frames per video, Frames of 5 indicates all the video frames are
        used as visual input, while Frames of 1 indicates that only the latest one
        frame is used as the visual input. Across LingoQA video QA with varying input
        frames, our SRC-Pipeline consistently demonstrates strong performance relative
        to the QWen2VL backbone it builds upon. In the 5-frame setting, SRC-Pipeline
        surpasses QWen2VL on both Ling-Judge (59.10 vs. 58.20) and BLEU (12.55 vs.
        13.46, noting that our method narrows the BLEU gap while clearly improving
        the judgment-based metric), indicating that adding our pipeline yields tangible
        gains over the base model when leveraging full video context. Although the
        best overall 5-frame results come from LingoQA (Ling-Judge 60.8, BLEU 15.00),
        its 1-frame performance (Ling-Judge 57.00, BLEU 14.21) falls below our 1-frame
        SRC-Pipeline variants, showing that LingoQA's advantage diminishes when temporal
        context is constrained.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"5.3.\">Ablation Study</head><p>We analyze the effect of scene-and region-level
        compression in the SRC-Pipeline, with results shown in Table <ref type=\"table\"
        target=\"#tab_1\">2</ref>. Using all five frames without compression achieves
        the highest performance (Ling-Judge 59.10, BLEU 12.55) but at the cost of
        full computation (100% FLOPs). When applying compression to the first four
        frames and keeping only the last frame in full detail, the FLOPs are reduced
        to 33.3% while maintaining strong accuracy (Ling-Judge 57.28, BLEU 12.09).
        To isolate the contributions of scene and region tokens, we evaluate two variants:
        one using only the scene token for compressed frames (s only) and one removing
        scene-region compression entirely (no sr). Both variants result in performance
        drops (Ling-Judge 56.42/56.00, BLEU 11.18/11.02), demonstrating that region
        tokens provide important localized detail that complements the global semantics
        from scene tokens. To demonstrate that the high-level tokens are making contribution,
        we also replace the scene and region tokens with the av-  </p></div>\n<div
        xmlns=\"http://www.tei-c.org/ns/1.0\"><head>Model</head></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"5.4.\">Analysis Experiments</head><p>In this section, we propose some
        analytic experiments on SRC-Pipeline, examine the effect of stage one training
        and our hypothesis that later frames' detail are more important than that
        of the early frames.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"5.4.1.\">Stage One Evaluation</head><p>In stage one, we fine-tuned the
        SRC-ViT based on the QWen2VL's ViT backbone. To evaluate how the fine-tuning
        affect the performance of the ViT model, we utilize the ViT from CLIP-L/14
        as the backbone to implement SRC-ViT, and evaluate its image-to-text (ItoT)
        retrieval and text-toimage (TtoI) retrieval performance with a corresponding
        CLIP-L/14's text encoder on a subset of CC3M dataset, which composes of 2000
        data samples. The results are presented in Table <ref type=\"table\" target=\"#tab_2\">3</ref>.
        From the table, we observe that the SRC-ViT outperform the vanilla CLIP's
        ViT on both of the ItoT and TtoI retrieval, indicating that the scene and
        region training procedure can boost the performance of vision encoder itself.
        This is also verified in Table <ref type=\"table\" target=\"#tab_3\">4</ref>,
        where we conduct a zero-shot evaluation of the original QWen2VL model and
        the SRC-Pipeline (The pre-trained QWen2VL model in which we replace the ViT
        to the fine-tuned SRC-ViT). We observe that there's a slightly improvement
        on the Lingo-J metric, which means the stage-one training will not harm, but
        increase the performance of the vision encoder.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"5.4.2.\">Temporal Hypothesis Verification</head><p>The novelty of SRC-Pipeline
        is based on the hypothesis that in autonomous driving video question answering
        task, later frames' detail is more important than that of early frames. To
        verify the hypothesis, instead of using sceneregion tokens for early four
        frames and leave the last one as patch tokens, we try a \"reverse\" implementation
        by using scene-region tokens for later four frames and leave the first one
        frame as patch tokens. By doing this, we remove the detailed semantic information
        of the latest frame, which should be the most important one in our hypothesis,
        which keep the total number of visual token unchanged. Base on the result
        on Table <ref type=\"table\" target=\"#tab_4\">5</ref>, we observe that there
        is a significant drop of performance between the original and \"reverse\"
        approach. Such a performance gap indicates that the detailed information of
        latest frames are important and cannot be removed.</p></div>\n<div xmlns=\"http://www.tei-c.org/ns/1.0\"><head
        n=\"6.\">Conclusion</head><p>In this work, we introduced the SRC-Pipeline,
        an efficiencydriven framework for video question answering in autonomous driving.
        By compressing early frames into multiscale scene and region tokens while
        preserving detailed patch representations for later frames, our approach significantly
        reduces FLOPs in the vision-language pipeline without sacrificing reasoning
        accuracy. Experiments demonstrate that both scene-and region-level tokens
        provide complementary benefits, enabling the model to retain global semantics
        and localized details while operating at one-third of the computational cost.
        This balance between efficiency and accuracy is particularly crucial for autonomous
        driving, where real-time response is essential for safety. While SRC-Pipeline
        achieves promising result on QWen2VL backbone, we plan to extend our scene&amp;region
        compression strategy to other backbones, using other autonomous driving training
        datasets, and perform evaluation with longer autonomous driving video streams
        in our future work.</p></div><figure xmlns=\"http://www.tei-c.org/ns/1.0\"
        xml:id=\"fig_0\"><head>Figure 2 .</head><label>2</label><figDesc>Figure 2.
        The architecture of SRC-Pipeline. (left): The overall architecture of SRC-Pipeline.
        Video frames are sent to the SRC-ViT to produce both the scene-region token
        and the patch token, where the early frames are represented by the scene-region
        tokens and the later frames are represented by the patch tokens. (upper right):
        The architecture of the SRC-ViT. Learnable scene and region tokens are attached
        to the path tokens from linear projection, and the positional embedding is
        applied to both the scene region tokens and the patch tokens.(lower left):
        The region attention mask. For each of the region tokens, the attention of
