        \" ind2=\" \">\n    <marc:subfield code=\"a\">Recent results from $p$+Pb collisions
        at the LHC provide important information for constraining initial state effects
        of nuclear collisions and possible modifications of parton distribution functions
        in the nuclear environment. In these proceedings we summarize new ATLAS results
        on dijet azimuthal correlations and conditional yields in $pp$ and $p$+Pb
        collisions at $\\sqrt{s_{NN}}=5.02$ TeV and prompt photon production in $\\sqrt{s_{NN}}=8.16$
        TeV $p$+Pb collisions.</marc:subfield>\n  </marc:datafield>\n  <marc:datafield
