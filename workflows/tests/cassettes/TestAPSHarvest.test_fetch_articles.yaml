        title, journal citation, and DOI. Open access publication funded by the Max
        Planck Society.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Plunge-merger-ringdown
        tests of general relativity with GW250114\",\"format\":\"html\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>The
        origin of the Higgs boson (<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>H</mi><mn>125</mn></msub></math>), discovered
        in 2012, remains a mystery. In the metric affine theory (MAT) framework, we
        study the scalar potential and investigate a couple of scenarios for the symmetry
        breaking mechanisms with a dilaton model which is derived from the geometry.
        The LHC constraints for the couplings of Yukawa couplings, Higgs-weak vector
        bosons and Higgs self-couplings, in this model are examined, which identify
        the parameter space where the discovered Higgs boson <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>m</mi><mi>h</mi></msub><mo>=</mo><mn>125</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>GeV</mi></math>
        can be dilaton-dominant and the features of Higgs self-couplings are explored.
        It is found that via the measurements of Higgs pair production, the High Luminosity
        LHC (HL-LHC) running can either confirm or rule out the dilaton dominance.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"J.\u2009E.
        Wu\",\"firstname\":\"J.\u2009E.\",\"surname\":\"Wu\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Q.\u2009S.
        Yan\",\"firstname\":\"Q.\u2009S.\",\"surname\":\"Yan\",\"affiliationIds\":[\"a2\",\"a1\"]}],\"affiliations\":[{\"name\":\"School
        of Physics Sciences, <a href=\\\"https://ror.org/05qbk4x57\\\">University
        of Chinese Academy of Sciences</a>, Beijing 101408, People\u2019s Republic
        of China\",\"id\":\"a1\"},{\"name\":\"Center for Future High Energy Physics,
        <a href=\\\"https://ror.org/034t30j35\\\">Chinese Academy of Sciences</a>,
        Beijing 100049, People\u2019s Republic of China\",\"id\":\"a2\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
