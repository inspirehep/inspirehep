        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article\u2019s
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRL\",\"abbreviatedName\":\"Phys.
        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Phase
        Space Fractons\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Condensed
        Matter and Materials\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>We
        revisit the renormalization of the gauge coupling in massless QED coupled
        to a scaleless quadratic theory of gravity. We compare two alternative prescriptions
        for the running of the electric charge: (i)\_the conventional <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03BC</mi></math> running in minimal subtraction,
        and (ii)\_a <i>physical running</i> extracted from the logarithmic dependence
        of amplitudes on a hard scale <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>Q</mi><mn>2</mn></msup></math> (e.g., <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mi>p</mi><mn>2</mn></msup></math>
        or a Mandelstam invariant) after removing IR effects. At one loop, using dimensional
        regularization with an IR mass regulator <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>m</mi></math>, we compute the photon vacuum polarization.
        We find a clean separation between UV and soft logarithms: the former is gauge
        and process independent and fixes the beta function, whereas the latter encodes
        nonlocal, IR-dominated contributions that may depend on gauge parameters and
        must not be interpreted as UV running. In the quadratic-gravity sector, the
        photon self-energy is UV finite\u2014the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mrow><mi>ln</mi><msup><mrow><mi>\u03BC</mi></mrow><mrow><mn>2</mn></mrow></msup></mrow></math>
        pieces cancel\u2014leaving only <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>ln</mi><mo stretchy=\\\"false\\\">(</mo><msup><mi>Q</mi><mn>2</mn></msup><mo>/</mo><msup><mi>m</mi><mn>2</mn></msup><mo
        stretchy=\\\"false\\\">)</mo></math> soft (IR) logs, which do not contribute
        to the running of the coupling once IR effects are consistently removed. Consequently,
        quadratic gravity does not modify the one-loop UV coefficient and thus does
        not alter <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03B2</mi><mo
        stretchy=\\\"false\\\">(</mo><mi>e</mi><mo stretchy=\\\"false\\\">)</mo></math>.
        Therefore, the physical running coincides with the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03BC</mi></math> running in QED at one loop.
        Our analysis clarifies how to extract a gauge and process independent running
        in the presence of gravitational interactions and why soft logs from quadratic
        gravity should not contribute to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03B2</mi><mo stretchy=\\\"false\\\">(</mo><mi>e</mi><mo
        stretchy=\\\"false\\\">)</mo></math>.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"M.
        Gomes\",\"firstname\":\"M.\",\"surname\":\"Gomes\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"A.\u2009C.
        Lehum\",\"firstname\":\"A.\u2009C.\",\"surname\":\"Lehum\",\"affiliationIds\":[\"a2\"]},{\"type\":\"Person\",\"name\":\"A.\u2009J.
        da Silva\",\"firstname\":\"A.\u2009J.\",\"surname\":\"da Silva\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"<a
