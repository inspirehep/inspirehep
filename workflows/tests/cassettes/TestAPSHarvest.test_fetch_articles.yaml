        title, journal citation, and DOI. Open access publication funded by Max Planck
        Society.\"}]},\"journal\":{\"id\":\"PRA\",\"abbreviatedName\":\"Phys. Rev.
        A\",\"name\":\"Physical Review A\"},\"title\":{\"value\":\"Laboratory measurements
        of Ca XIX dielectronic recombination satellites\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Atomic
        and molecular structure and dynamics; high-precision experiments; chemical
        physics\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Stochasticity
        is a defining feature of the pairwise forces governing interactions in biological
        systems\u2014from molecular motors to cell-cell adhesion\u2014yet its consequences
        on large-scale dynamics remain poorly understood. Here, we show that reciprocal
        but randomly fluctuating interactions between particles create active suspensions
        that can enhance the diffusion of an external tracer particle, even in the
        absence of self-propulsion or nonreciprocity. Starting from a lattice model
        with pairwise dynamics that minimally break detailed balance, we derive a
        coarse-grained dynamical theory for spatiotemporal density fluctuations and
        reveal an elevated effective temperature at short wavelengths. We then compute
        the self-diffusion coefficient of a tracer particle weakly coupled to our
        active fluid, demonstrating that purely reciprocal stochastic interactions
        provide a distinct and generic route to enhanced diffusivity in dense nonequilibrium
        suspensions.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Henry
        Alston\",\"firstname\":\"Henry\",\"surname\":\"Alston\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Rapha\xEBl
        Voituriez\",\"firstname\":\"Rapha\xEBl\",\"surname\":\"Voituriez\",\"affiliationIds\":[\"a3\",\"a4\"]},{\"type\":\"Person\",\"name\":\"Thibault
        Bertrand\",\"firstname\":\"Thibault\",\"surname\":\"Bertrand\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"Department
