        Nacional de Desenvolvimento Cient\xEDfico e Tecnol\xF3gico\",\"awards\":[\"404310/2023-0\",\"301256/2025-0\",\"309915/2021-0\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-26T12:31:08+0000\",\"last_modified_at\":\"2026-03-26T12:31:08+0000\",\"id\":\"10.1103/gc68-584n\",\"identifiers\":{\"doi\":\"10.1103/gc68-584n\",\"arxiv\":\"arXiv:2512.11742\"},\"issue\":{\"number\":\"6\"},\"pageStart\":\"065026\",\"hasArticleId\":true,\"numPages\":7,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"50ba3f74-7f31-4857-8a75-b2b007348981\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"6d5b9a32-cad0-4d9f-a837-b0f239f5cdc6\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"abc8b5e1-9768-40d2-8d64-1bc2f0c09a89\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false}],\"disciplines\":[\"9f5c878e-b7b7-4030-bdb9-21a24ad97422\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
