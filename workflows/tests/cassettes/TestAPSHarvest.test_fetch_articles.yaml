        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRXLIFE\",\"abbreviatedName\":\"PRX
        Life\",\"name\":\"PRX Life\"},\"title\":{\"value\":\"Nonequilibrium Protein
        Complexes as Molecular Automata\",\"format\":\"html\"},\"volume\":{\"number\":\"4\"}},{\"abstract\":{\"value\":\"<p>We
        present MicroBooNE\u2019s first search for dark sector <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>e</mi><mo>+</mo></msup><msup><mi>e</mi><mo>\u2212</mo></msup></math>
        explanations of the long-standing MiniBooNE anomaly. The MiniBooNE anomaly
        has garnered significant attention over the past 20\_years including previous
        MicroBooNE investigations into both anomalous electron and photon excesses,
        but its origin still remains unclear. In this Letter, we provide the first
        direct test of dark sector models in which dark neutrinos, produced through
        neutrino-induced scattering, decay into missing energy and visible <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>e</mi><mo>+</mo></msup><msup><mi>e</mi><mo>\u2212</mo></msup></math>
        pairs comprising the MiniBooNE anomaly. Many such models have recently gained
        traction as a viable solution to the anomaly while evading past bounds. Using
        an exposure of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mn>6.87</mn><mo>\xD7</mo><msup><mn>10</mn><mn>20</mn></msup></math>
        protons-on-target in the Booster Neutrino Beam, we implement a selection targeting
        forward-going, coherently produced <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>e</mi><mo>+</mo></msup><msup><mi>e</mi><mo>\u2212</mo></msup></math>
        events. After unblinding, we observe 95 events, which we compare with the
        constrained background-only prediction of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mn>69.7</mn><mo>\xB1</mo><mn>17.3</mn></math>. This
        analysis sets the world\u2019s first direct limits on these dark sector models
        and, at the 95% confidence level, excludes the entirety of the single dark
        neutrino and majority of the dual dark neutrino, parameter space that is viable
        as a solution to the MiniBooNE anomaly.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Collaboration\",\"name\":\"MicroBooNE
