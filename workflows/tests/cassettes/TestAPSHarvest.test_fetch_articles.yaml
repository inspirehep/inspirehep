        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRE\",\"abbreviatedName\":\"Phys.
        Rev. E\",\"name\":\"Physical Review E\"},\"title\":{\"value\":\"Utilizing
        the deuterium-tritium fusion resonance to diagnose thermal runaway in igniting
        plasmas\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Plasma Physics\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Fracton
        codes have been intensively studied as novel topological states of matter,
        yet their fault-tolerant properties remain largely unexplored. Here, we investigate
        the optimal thresholds of self-dual fracton codes, in particular, the checkerboard
        code, against stochastic Pauli noise. By utilizing a statistical-mechanical
        mapping combined with large-scale parallel tempering Monte Carlo simulations,
        we calculate the optimal code-capacity threshold of the checkerboard code
        to be <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>p</mi><mtext>th</mtext></msub><mo>\u2243</mo><mn>0.107</mn><mrow><mo>(</mo><mn>3</mn><mo>)</mo></mrow></mrow></math>.
        This value is the highest among known three-dimensional codes and nearly saturates
        the theoretical limit for topological codes. Our results further validate
        the generalized entropy relation for two mutually dual models, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>H</mi><mrow><mo>(</mo><msub><mi>p</mi><mtext>th</mtext></msub><mo>)</mo></mrow><mo>+</mo><mi>H</mi><mrow><mo>(</mo><msub><mover
        accent=\\\"true\\\"><mi>p</mi><mo>\u0303</mo></mover><mtext>th</mtext></msub><mo>)</mo></mrow><mo>\u2248</mo><mn>1</mn></mrow></math>,
        and extend its applicability beyond standard topological codes. This verification
        indicates the Haah's code also possesses a code-capacity threshold near the
        theoretical limit <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>p</mi><mtext>th</mtext></msub><mo>\u2248</mo><mn>0.11</mn></mrow></math>.
        These findings highlight fracton codes as highly resilient quantum memory
        and demonstrate the utility of duality techniques in analyzing intricate error-correcting
        codes.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Giovanni
        Canossa\",\"firstname\":\"Giovanni\",\"surname\":\"Canossa\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Lode
