        Svizzero di Calcolo Scientifico\",\"awards\":[\"s1286\",\"sm101\",\"s1327\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-27T13:45:32+0000\",\"last_modified_at\":\"2026-03-27T13:45:32+0000\",\"id\":\"10.1103/jgwb-6493\",\"identifiers\":{\"doi\":\"10.1103/jgwb-6493\",\"arxiv\":\"arXiv:2510.04197\"},\"issue\":{\"number\":\"3\"},\"pageStart\":\"035310\",\"hasArticleId\":true,\"numPages\":26,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"99934578-7c4c-4b59-9edd-cd7dc8988a58\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"6558d12a-54c2-4ef7-8a5b-67ba06aaab9d\",\"facet\":{\"id\":\"1e0c099a-9f2a-4e47-b3f1-7faa28b6a506\"},\"primary\":false},{\"id\":\"7a4e6b3d-d685-4a65-a562-4720bd830099\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"bbb4472b-21d7-4e9a-a5e1-b08007b9f820\",\"facet\":{\"id\":\"1e0c099a-9f2a-4e47-b3f1-7faa28b6a506\"},\"primary\":true}],\"disciplines\":[\"512fd433-7b6d-4535-bb60-78f3bf431bc3\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
