        Nationale de la Recherche\",\"awards\":[\"ANR-23-CE30-0018\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-27T13:30:32+0000\",\"last_modified_at\":\"2026-03-27T13:30:32+0000\",\"id\":\"10.1103/2y2z-hgfn\",\"identifiers\":{\"doi\":\"10.1103/2y2z-hgfn\"},\"issue\":{\"number\":\"10\"},\"pageStart\":\"104204\",\"hasArticleId\":true,\"numPages\":12,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"c3c8c4f2-ab1b-4b6d-8556-3cbf5c77a5f2\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"f2a9db78-1651-4a94-b66e-3e3d72056760\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"373a7206-3c07-47bb-9078-efd80ed70556\",\"facet\":{\"id\":\"f45b3c40-959c-4e90-ba0e-38232980802a\"},\"primary\":false},{\"id\":\"ea5486d7-baba-459b-bf6a-145a4f675537\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false}],\"disciplines\":[\"510fc218-8774-4547-ab09-fc6cef0c9a03\",\"419d860e-ce5c-42f1-b6ad-4dee9f4fbf60\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
        by the American Physical Society\",\"copyrightYear\":2026,\"copyrightHolders\":[],\"creativeCommons\":true,\"licenses\":[{\"url\":\"https://creativecommons.org/licenses/by/4.0/\",\"licenseStatement\":\"Published
        by the American Physical Society under the terms of the <a href=\\\"https://creativecommons.org/licenses/by/4.0/\\\">Creative
        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRB\",\"abbreviatedName\":\"Phys.
        Rev. B\",\"name\":\"Physical Review B\"},\"title\":{\"value\":\"Error resilience
        of fracton codes and near saturation of code-capacity threshold in three dimensions\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Inhomogeneous,
        disordered, and partially ordered systems\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>A
        consistent kinetic modeling and discretization strategy for compressible flows
        across all Prandtl numbers and specific heat ratios is developed using the
        quasiequilibrium approach within two of the most widely used double-distribution
        frameworks. The methodology ensures accurate recovery of the Navier-Stokes-Fourier
        equations, including all macroscopic moments and dissipation rates, through
        detailed hydrodynamic limit analysis and careful construction of equilibrium
        and quasiequilibrium attractors. Discretization is performed using high-order
        velocity lattices with a static reference frame in a discrete velocity Boltzmann
        context to isolate key modeling aspects such as the necessary requirements
        on expansion and quadrature orders. The proposed models demonstrate high accuracy,
        numerical stability, and Galilean invariance across a wide range of Mach numbers
        and temperature ratios. Separate tests for strict conservation and measurements
        of all dissipation rates confirm these insights for all Prandtl numbers and
        specific heat ratios. Simulations of a thermal Couette flow and a sensitive
        two-dimensional shock-vortex interaction excellently reproduce viscous Navier-Stokes-Fourier-level
        physics. The proposed models establish an accurate, efficient, and scalable
        framework for kinetic simulations of compressible flows with moderate supersonic
        speeds and discontinuities at arbitrary Prandtl numbers and specific heat
        ratios, offering a valuable tool for studying complex problems in fluid dynamics
        and paving the way for future extensions to the lattice Boltzmann context,
        by application of correction terms, as well as high-Mach and hypersonic regimes,
        employing target-designed reference frames.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"R.
        M. Str\xE4ssle\",\"firstname\":\"R. M.\",\"surname\":\"Str\xE4ssle\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"S.
        A. Hosseini\",\"firstname\":\"S. A.\",\"surname\":\"Hosseini\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"I.
        V. Karlin\",\"firstname\":\"I. V.\",\"surname\":\"Karlin\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"Computational
        Kinetics Group, Department of Mechanical and Process Engineering, <a href=\\\"https://ror.org/05a28rw58\\\">ETH
        Z\xFCrich</a>, 8092 Z\xFCrich, Switzerland\",\"id\":\"a1\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
