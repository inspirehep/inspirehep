        Natural Science Foundation of China\",\"awards\":[\"11875260\",\"12275143\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-27T12:31:07+0000\",\"last_modified_at\":\"2026-03-27T12:31:07+0000\",\"id\":\"10.1103/ycxz-bvfn\",\"identifiers\":{\"doi\":\"10.1103/ycxz-bvfn\",\"arxiv\":\"arXiv:2501.07820\"},\"issue\":{\"number\":\"5\"},\"pageStart\":\"055049\",\"hasArticleId\":true,\"numPages\":14,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"f9878664-4f0f-49a5-ae1c-9d7d9ce789f6\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"83c64883-5507-43f8-92bc-ae9f5ae03f02\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"b59fbf99-aaba-4b28-b58a-6104444592fb\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"8f8b77e5-7263-4333-a6a9-def3fd83e2f6\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"4e212348-481b-40ed-a4c8-b7cf31405640\",\"facet\":{\"id\":\"f45b3c40-959c-4e90-ba0e-38232980802a\"},\"primary\":true}],\"disciplines\":[\"9f5c878e-b7b7-4030-bdb9-21a24ad97422\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
