        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Reference-frame-independent
        quantum metrology\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>Ferrotoroidic
        materials, which break both time- and space-reversal symmetries to enhance
        magnetoelectric responses, are of great interest for applications. <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>Ba</mi><mn>6</mn></msub><msub><mi>Cr</mi><mn>2</mn></msub><msub><mi
        mathvariant=\\\"normal\\\">S</mi><mn>10</mn></msub></mrow></math>, a recently
        synthesized quasi-one-dimensional ferrotoroidic candidate, combines polarization,
        magnetization, and toroidal moment, yet its electronic band structure, magnetic
        evolution, and phase transitions remain incompletely understood to date. Here,
        we investigate <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>Ba</mi><mn>6</mn></msub><msub><mi>Cr</mi><mn>2</mn></msub><msub><mi
        mathvariant=\\\"normal\\\">S</mi><mn>10</mn></msub></mrow></math>, using electrical
        transport, direct current magnetization, alternating current susceptibility,
        specific heat, and muon spin rotation (<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03BC</mi><mi>SR</mi></mrow></math>)
        measurements, along with various first-principles calculations. Electrical
        transport measurements and density functional theory confirm a narrow band
        gap (<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>\u223C</mo><mn>0.707</mn><mspace
        width=\\\"0.16em\\\"></mspace><mi>eV</mi></mrow></math>, experimentally; <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>\u223C</mo><mn>0.680</mn><mspace
        width=\\\"0.16em\\\"></mspace><mi>eV</mi></mrow></math>, theoretically). <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03BC</mi><mi>SR</mi></mrow></math>
        measurements reveal that static magnetism dominates down to 2\_K, with an
        ordered volume fraction of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>\u223C</mo><mn>89</mn><mo>%</mo></mrow></math>
        at this temperature. Two distinct transitions are identified: one around the
        N\xE9el temperature <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>[</mo><msub><mi>T</mi><mi
        mathvariant=\\\"normal\\\">N</mi></msub><mo>=</mo><mrow><mo>(</mo><mn>8</mn><mo>\xB1</mo><mn>1</mn><mo>)</mo></mrow><mspace
        width=\\\"0.16em\\\"></mspace><mi mathvariant=\\\"normal\\\">K</mi><mo>]</mo></mrow></math>
        and another corresponding to a phase transition near 30\_K, as consistently
        indicated by our complementary experimental techniques. The absence of dynamic
        critical behaviors and the lack of a <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03BB</mi></math>-type
        specific heat anomaly are consistent with a first-order-like transition at
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>T</mi><mi
        mathvariant=\\\"normal\\\">N</mi></msub></math>. Based on various complementary
        experimental results and theoretical calculations, we propose a hypothesis
        that the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>\u223C</mo><mn>30</mn><mspace
        width=\\\"0.16em\\\"></mspace><mi mathvariant=\\\"normal\\\">K</mi></mrow></math>
        broad feature arises from the complex interplay between crystal structure
        distortion and magnetic coupling, which is potentially directly linked to
        ferrotoroidicity. As the first study integrating <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03BC</mi><mi>SR</mi></mrow></math>
        with complementary experiments and first-principles calculations to explore
        ferrotoroidicity, this work provides key insights into the underlying physics
        of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>Ba</mi><mn>6</mn></msub><msub><mi>Cr</mi><mn>2</mn></msub><msub><mi
        mathvariant=\\\"normal\\\">S</mi><mn>10</mn></msub></mrow></math> and related
        compounds in this area.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Guoqiang
