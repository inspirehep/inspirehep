        do Par\xE1</a>, 66075-110, Bel\xE9m, Par\xE1, Brazil\",\"id\":\"a2\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
        author: mgomes@fma.if.usp.br</p>\",\"label\":\"*\",\"id\":\"n1\",\"type\":\"contrib\"},{\"format\":\"html\",\"value\":\"<p>Contact
