        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Global quenches
        and correlator dynamics in de Sitter space\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Formal
        aspects of field theory, field theory in curved space\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Light
        dark matter with sub-eV masses has a high number density in our Galaxy, and
        its scattering cross section with macroscopic objects can be significantly
        enhanced by coherence effects. Repeated scattering with a target object can
        induce a measurable acceleration. Torsion balance experiments with geometric
        asymmetry are, in principle, capable of detecting such signals. Our analysis
        shows that existing torsion balances designed to test the equivalence principle
        already place the most stringent constraints on DM-nucleon scattering in the
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mo
        stretchy=\\\"false\\\">(</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup><mo>,</mo><mn>1</mn><mo
        stretchy=\\\"false\\\">)</mo><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>eV</mi></math>
        mass range.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Shigeki
        Matsumoto\",\"firstname\":\"Shigeki\",\"surname\":\"Matsumoto\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Jie
