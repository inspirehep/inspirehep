        via S. Sofia 78, I-95123 Catania, Italy, Dipartimento di Fisica e Astronomia
        \u201CEttore Majorana,\u201D <a href=\\\"https://ror.org/03a64bh57\\\">Universit\xE0
        di Catania</a>, Via S. Sofia 64, 95123, Catania, Italy, and High Energy Physics
        Department, Institute of Mathematics, Astrophysics, and Particle Physics,
        <a href=\\\"https://ror.org/016xsfp80\\\">Radboud University</a>, Heyendalseweg
        135, 6525 AJ Nijmegen, The Netherlands\",\"id\":\"a1\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
        author: antonio.panassiti@phd.unict.it</p>\",\"label\":\"*\",\"id\":\"n1\",\"type\":\"contrib\"}],\"date\":\"2026-03-26\",\"fundings\":[{\"funderId\":\"http://dx.doi.org/10.13039/501100010790\",\"funderName\":\"Erasmus+\",\"awards\":[\"2022-1-IT02-KA131-HED-000066529\",\"2023-1-IT02-KA131-HED-000135582\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-26T12:32:06+0000\",\"last_modified_at\":\"2026-03-26T12:31:59+0000\",\"id\":\"10.1103/fbz2-8n2h\",\"identifiers\":{\"doi\":\"10.1103/fbz2-8n2h\",\"arxiv\":\"arXiv:2509.17234\"},\"issue\":{\"number\":\"6\"},\"pageStart\":\"064057\",\"hasArticleId\":true,\"numPages\":21,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"421e122f-4752-421c-8af6-88e0df808bb2\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"ac15776a-3741-4dfb-baad-ee2918f8e6e6\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"19eb7adc-6b41-43d6-b3a1-ccdd0a973e87\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false}],\"disciplines\":[\"0f4313da-ec73-46f5-b24f-521a1fcb6db7\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
