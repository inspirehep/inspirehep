        flux-tube model predictions from charmed mesons to double-charmed baryons\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Strong
        Interactions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>The
        strong coupling regime of four-dimensional <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>N</mi><mo>=</mo><mn>2</mn></math> supersymmetric
        vacua of the heterotic string is analyzed from a dual domain wall perspective.
        Using modular invariance, we compute a closed form for the nonperturbative
        corrections to the supersymmetric domain wall equations, which enables a quantitative
        study of gravitational strong coupling regimes. A strong coupling singularity
        for the hidden Ho\u0159ava-Witten 9-brane is resolved, and the domain wall
        interpolates between the visible 9-brane and a supersymmetric anti\u2013de
        Sitter vacuum, thereby realizing a variant of the Randall-Sundrum model.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Mirjam
