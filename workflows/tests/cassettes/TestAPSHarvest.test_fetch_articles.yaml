        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Gauged extended
        field theory and generalized Cartan geometry\",\"format\":\"html\"},\"tocSection\":{\"label\":\"String
        theory, quantum gravity, gauge/gravity duality\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Dimension
        in physical systems determines universal properties at criticality. Yet, the
        impact of structural perturbations on dimensionality remains largely unexplored.
        Here, we characterize the attraction basins of structural fixed points in
        scale-invariant networks from a renormalization group perspective, demonstrating
        that basin stability connects to a structural phase transition. This topology-dependent
        effect, which we term <i>geometric criticality</i>, triggers a geometric breakdown
        hitherto unknown, which induces nontrivial fractal dimensions and unveils
        hidden Laplacian renormalization group flows toward unstable structural fixed
        points. Our systematic study of how networks and lattices respond to disorder
        paves the way for future analysis of nonergodic behavior induced by quenched
        disorder.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Lorenzo
