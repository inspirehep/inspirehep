        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Landau-Zener-St\xFCckelberg-Majorana
        dynamics of magnetized quarkonia\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Strong
        Interactions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        use conformal symmetry to calculate the next to next to leading order (NNLO)
        anomalous dimension matrix (three loops) for flavor-singlet axial-vector QCD
        operators for spin <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>N</mi><mo>\u2264</mo><mn>8</mn></math> from a set
        of gauge-invariant two-point correlation functions. Combining this result
        with the recent calculation of the two-loop coefficient functions, we carry
        out the calculation of the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03B3</mi><msup><mi>\u03B3</mi><mo>*</mo></msup><mo
        stretchy=\\\"false\\\">\u2192</mo><mi>\u03B7</mi></math> and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03B3</mi><msup><mi>\u03B3</mi><mo>*</mo></msup><mo
        stretchy=\\\"false\\\">\u2192</mo><msup><mi>\u03B7</mi><mo>\u2032</mo></msup></math>
        form factors at large momentum transfers to the NNLO accuracy in perturbative
        QCD.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Vladimir
        M. Braun\",\"firstname\":\"Vladimir M.\",\"surname\":\"Braun\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Konstantin
