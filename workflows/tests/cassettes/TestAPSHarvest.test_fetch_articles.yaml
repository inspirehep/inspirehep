        J\xFClich</a>, 52425 J\xFClich, Germany\",\"id\":\"a1\"},{\"name\":\"Theoretical
        Physics, <a href=\\\"https://ror.org/01jdpyv68\\\">Saarland University</a>,
        66123 Saarbr\xFCcken, Germany\",\"id\":\"a2\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
