        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Non-Hermitian
        Green\u2019s function theory with <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>N</mi></mrow></math>-body
        interactions: The coupled-cluster similarity transformation\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>We
        present an application of physics-informed neural networks (PINNs) to the
        study of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>SU</mi><mo
        stretchy=\\\"false\\\">(</mo><msub><mi>N</mi><mi>c</mi></msub><mo stretchy=\\\"false\\\">)</mo></math>
        lattice gauge theories. Our method enables the learning of eigenfunctions
        and eigenvalues at arbitrary gauge couplings, smoothly moving from the analytically
        known strong-coupling regime toward weaker couplings. By encoding the Schr\xF6dinger
        equation and the symmetries of the eigenstates directly into the loss function,
        the network performs an unsupervised exploration of the spectrum. We validate
        the approach on the single-plaquette U(1) and SU(2) pure-gauge theories, showing
        that the PINNs successfully reproduce the hierarchy of energy levels and their
        corresponding wave functions.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Simone
        Romiti\",\"firstname\":\"Simone\",\"surname\":\"Romiti\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"Institute
        for Theoretical Physics, Albert Einstein Center for Fundamental Physics, <a
        href=\\\"https://ror.org/02k7v4d05\\\">University of Bern</a>, CH-3012 Bern,
        Switzerland\",\"id\":\"a1\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
        author: simone.romiti.1994@gmail.com</p>\",\"label\":\"*\",\"id\":\"n1\",\"type\":\"contrib\"}],\"date\":\"2026-03-26\",\"fundings\":[{\"funderId\":\"http://dx.doi.org/10.13039/501100001711\",\"funderName\":\"Schweizerischer
