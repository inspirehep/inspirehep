        by the American Physical Society under the terms of the <a href=\\\"https://creativecommons.org/licenses/by/4.0/\\\">Creative
        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article\u2019s
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRL\",\"abbreviatedName\":\"Phys.
        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Quasiprobability
        Thermodynamic Uncertainty Relation\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Quantum
        Information, Science, and Technology\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>In
        quantum optics and condensed matter physics, non-Hermitian phenomena are often
        studied under the assumption of an open physical system. However, there are
        many examples of intrinsically non-Hermitian, though often <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi
        mathvariant=\\\"script\\\">PT</mi></math>-symmetric systems, which do not
        necessarily need to be characterized as open, where one usually speaks of
        gain and loss relative to an underlying environment. A particularly intriguing
        example with experimental consequences in the literature is QCD at finite
        density. Motivated by the existence of such inherently non-Hermitian systems,
        here we study the critical behavior of a <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>U</mi><mo>(</mo><mn>1</mn><mo>)</mo></mrow></math>-invariant
        Lagrangian perturbed by a complex, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi
        mathvariant=\\\"script\\\">PT</mi></math>-symmetric <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>Z</mi><mn>4</mn></msub></math>
        anisotropy. We find real critical exponents both in the region of unbroken
        and broken <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi mathvariant=\\\"script\\\">PT</mi></math>
        symmetry. In the former the coupling constants for fixed points or lines are
        real, whereas in the latter they become complex. Importantly, the most stable
        fixed point corresponds to the flow at large distances towards an effectively
        Hermitian <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>U</mi><mo>(</mo><mn>1</mn><mo>)</mo></mrow></math>
        symmetric system. This constitutes an example where both the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>U</mi><mo>(</mo><mn>1</mn><mo>)</mo></mrow></math>
        and the Hermitian character are emergent features of the theory. This tells
        us about the importance and physical meaning of some non-Hermitian systems
        beyond interpretations involving gain and loss.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Eduard
