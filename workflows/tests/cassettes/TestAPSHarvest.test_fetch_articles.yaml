        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Nonlocal
        Josephson diode effect in minimal Kitaev chains\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>Many-body
        systems that saturate the quantum bound on chaos are attracting interest across
        a wide range of fields. Notable examples include the Sachdev-Ye-Kitaev model
        and its variations, all characterized by some form or randomness and all-to-all
        couplings. Here, we study many-body quantum chaos in a quantum impurity model
        showing non-Fermi-liquid physics, the overscreened multichannel <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>S</mi><mi>U</mi><mo stretchy=\\\"false\\\">(</mo><mi>N</mi><mo
        stretchy=\\\"false\\\">)</mo></math> Kondo model. We exactly compute the low-temperature
        behavior of the out-of-time order correlator in the limit of large <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>N</mi></math> and large number of channels, <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>K</mi></math>,
        at a fixed ratio <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03B3</mi><mo>=</mo><mi>K</mi><mo>/</mo><mi>N</mi></math>.
        Because of strong correlations at the impurity site, the spin fractionalizes
        in auxiliary fermions and bosons. We show that all the degrees of freedom
        of our theory acquire a Lyapunov exponent that is linear in temperature as
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>T</mi><mo
        stretchy=\\\"false\\\">\u2192</mo><mn>0</mn></math>, with a prefactor that
        depends on <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03B3</mi></math>.
        Remarkably, for <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>N</mi><mo>=</mo><mi>K</mi></math>,
        the impurity spin displays maximal chaos, while bosons and fermions only reach
        half of the maximal Lyapunov exponent. Our results highlight two key features:
        a nondisordered model that is maximally chaotic due to strong correlations
        at its boundary, with the maximal chaos appearing in a composite gauge-invariant
        operator, the impurity spin, and not in the auxiliary single-particle degrees
        of freedom.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Ancel
