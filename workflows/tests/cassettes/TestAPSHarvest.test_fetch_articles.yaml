        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Prediction
        of molecular single-photon emitters: A materials-modeling approach\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>Magic-angle
        twisted bilayer graphene (TBG) with its flat bands provides a rich platform
        for exploring emergent electronic orders. Similarly, periodically buckled
        monolayer graphene (MLG) has been proposed as a tunable alternative for realizing
        flat bands. Here, we investigate the combined effect of buckling and twisting
        in bilayer graphene. We find that periodic buckling in large-angle TBG initially
        enhances band flattening compared to monolayer graphene, but for sufficiently
        strong buckling, it instead increases the band dispersion. This occurs because
        of both the presence of interlayer coupling, which reduces the in-plane kinetic
        energy, and the opening of a gap at the Dirac point resulting from inversion-symmetry
        breaking. Additionally, we find that buckling-induced band flattening competes
        with twist-induced band flattening. While the former breaks sublattice symmetry,
        generating a sublattice polarization, the latter prefers to preserve it. This
        prevents buckling from generating even flatter bands at the magic angle. Nevertheless,
        we find that buckled TBG can exhibit flatter bands than pristine TBG over
        a wide range of twist angles, with a flatness similar to that of pristine
        magic-angle TBG.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Jannes
        van Poppelen\",\"firstname\":\"Jannes\",\"surname\":\"van Poppelen\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Annica
