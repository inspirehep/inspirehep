        this work must maintain attribution to the author(s) and the published article\u2019s
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRX\",\"abbreviatedName\":\"Phys.
        Rev. X\",\"name\":\"Physical Review X\"},\"title\":{\"value\":\"Fast Scrambling
        at the Boundary\",\"format\":\"html\"},\"volume\":{\"number\":\"16\"}},{\"abstract\":{\"value\":\"<p>We
        derive a quantum extension of the thermodynamic uncertainty relation where
        dynamical fluctuations are quantified by the Terletsky\u2013Margenau\u2013Hill
        quasiprobability, a quantum generalization of the classical joint probability.
        The obtained inequality plays a complementary role to existing quantum thermodynamic
        uncertainty relations, focusing on observables\u2019 change rather than exchange
        of charges through jumps and respecting initial coherence. Quasiprobabilities
        show anomalous behaviors that are forbidden in classical systems, such as
        negativity; we reveal that negativity or a nonclassically enhanced escape
        rate is necessary to increase an output-to-dissipation ratio beyond classical
        limitations and show that the requirements are basis independent and stronger
        than quantum coherence. To illustrate these statements, we employ a model
        that can exhibit a dissipationless heat current, which would be prohibited
        in classical systems; we construct a state that has much coherence but does
        not lead to a dissipationless current due to the absence of anomalous behaviors
        in quasiprobabilities.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Kohei
        Yoshimura\",\"firstname\":\"Kohei\",\"surname\":\"Yoshimura\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Ryusuke
        Hamazaki\",\"firstname\":\"Ryusuke\",\"surname\":\"Hamazaki\",\"affiliationIds\":[\"a1\",\"a3\"]}],\"affiliations\":[{\"name\":\"Nonequilibrium
        Quantum Statistical Mechanics RIKEN Hakubi Research Team, Pioneering Research
