        interactions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Based
        on a sample of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mo
        stretchy=\\\"false\\\">(</mo><mn>10087</mn><mo>\xB1</mo><mn>44</mn><mo stretchy=\\\"false\\\">)</mo><mo>\xD7</mo><msup><mn>10</mn><mn>6</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>J</mi><mo>/</mo><mi>\u03C8</mi></math>
        events collected with the BESIII detector, a partial-wave analysis of <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>J</mi><mo>/</mo><mi>\u03C8</mi><mo
        stretchy=\\\"false\\\">\u2192</mo><mi mathvariant=\\\"normal\\\">\u039B</mi><msup><mover
        accent=\\\"true\\\"><mi mathvariant=\\\"normal\\\">\u03A3</mi><mo stretchy=\\\"false\\\">\xAF</mo></mover><mn>0</mn></msup><mi>\u03B7</mi><mo>+</mo><mi
        mathvariant=\\\"normal\\\">c</mi><mo>.</mo><mi mathvariant=\\\"normal\\\">c</mi><mo>.</mo></math>
        is performed for the first time. The dominant contributions are found to be
        excited <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"normal\\\">\u039B</mi></math> states with <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>J</mi><mi>P</mi></msup><mo>=</mo><mn>1</mn><mo>/</mo><msup><mn>2</mn><mo>\u2212</mo></msup></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mi>J</mi><mi>P</mi></msup><mo>=</mo><mn>1</mn><mo>/</mo><msup><mn>2</mn><mo>+</mo></msup></math>
        in the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03B7</mi><mi
        mathvariant=\\\"normal\\\">\u039B</mi></math> mass spectra. The measured masses
        and widths are <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>M</mi><mo>=</mo><mn>1668.8</mn><mo>\xB1</mo><mn>3.1</mn><mo>\xB1</mo><mn>21.2</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>MeV</mi><mo>/</mo><msup><mi>c</mi><mn>2</mn></msup></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"normal\\\">\u0393</mi><mo>=</mo><mn>52.7</mn><mo>\xB1</mo><mn>4.2</mn><mo>\xB1</mo><mn>17.8</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>MeV</mi></math>
        for the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"normal\\\">\u039B</mi><mo stretchy=\\\"false\\\">(</mo><mn>1670</mn><mo
        stretchy=\\\"false\\\">)</mo></math>, and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>M</mi><mo>=</mo><mn>1881.5</mn><mo>\xB1</mo><mn>16.5</mn><mo>\xB1</mo><mn>20.3</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>MeV</mi><mo>/</mo><msup><mi>c</mi><mn>2</mn></msup></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"normal\\\">\u0393</mi><mo>=</mo><mn>82.4</mn><mo>\xB1</mo><mn>18.2</mn><mo>\xB1</mo><mn>8.9</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>MeV</mi></math>
        for the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"normal\\\">\u039B</mi><mo stretchy=\\\"false\\\">(</mo><mn>1810</mn><mo
        stretchy=\\\"false\\\">)</mo></math>, respectively. The\_branching fraction
        is determined to be <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi mathvariant=\\\"script\\\">B</mi><mo stretchy=\\\"false\\\">(</mo><mi>J</mi><mo>/</mo><mi>\u03C8</mi><mo
        stretchy=\\\"false\\\">\u2192</mo><mi mathvariant=\\\"normal\\\">\u039B</mi><msup><mover
        accent=\\\"true\\\"><mi mathvariant=\\\"normal\\\">\u03A3</mi><mo stretchy=\\\"false\\\">\xAF</mo></mover><mn>0</mn></msup><mi>\u03B7</mi><mo>+</mo><mi
        mathvariant=\\\"normal\\\">c</mi><mo>.</mo><mi mathvariant=\\\"normal\\\">c</mi><mo>.</mo><mo
        stretchy=\\\"false\\\">)</mo><mo>=</mo><mo stretchy=\\\"false\\\">(</mo><mn>3.44</mn><mo>\xB1</mo><mn>0.11</mn><mo>\xB1</mo><mn>0.13</mn><mo
        stretchy=\\\"false\\\">)</mo><mo>\xD7</mo><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>5</mn></mrow></msup></math>.
        The\_first uncertainties are statistical and the second systematic.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Collaboration\",\"name\":\"BESIII
