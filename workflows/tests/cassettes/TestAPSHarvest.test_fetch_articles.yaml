        Rev. X\",\"name\":\"Physical Review X\"},\"title\":{\"value\":\"Deterministic
        1D Domain Wall Motion with Nucleation-Free Nature in Sliding Ferroelectric
        Switching\",\"format\":\"html\"},\"volume\":{\"number\":\"16\"}},{\"abstract\":{\"value\":\"<p>We
        study the nonmaximal symmetry breaking patterns of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mrow><mrow><mi mathvariant=\\\"fraktur\\\">s</mi><mi
        mathvariant=\\\"fraktur\\\">u</mi></mrow><mo stretchy=\\\"false\\\">(</mo><mn>8</mn><mo
        stretchy=\\\"false\\\">)</mo><mo stretchy=\\\"false\\\">\u2192</mo><msub><mrow><mi
        mathvariant=\\\"fraktur\\\">g</mi></mrow><mrow><mn>531</mn></mrow></msub><mo>/</mo><msub><mrow><mi
        mathvariant=\\\"fraktur\\\">g</mi></mrow><mrow><mn>351</mn></mrow></msub></mrow></math>
        allowed in a supersymmetric theory with the affine Lie algebra of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mover accent=\\\"true\\\"><mrow><mi mathvariant=\\\"fraktur\\\">s</mi><mi
        mathvariant=\\\"fraktur\\\">u</mi></mrow><mo stretchy=\\\"true\\\">^</mo></mover><mo
        stretchy=\\\"false\\\">(</mo><mn>8</mn><msub><mo stretchy=\\\"false\\\">)</mo><mrow><msub><mi>k</mi><mi>U</mi></msub><mo>=</mo><mn>1</mn></mrow></msub></math>,
        which was recently proposed to explain the three-generational standard model
        quark/lepton mass hierarchies as well as the Cabbibo-Kobayashi-Maskawa mixing
        pattern. Three gauge couplings are found to achieve the unification below
        the Planck scales, according to the unification relations determined by the
        affine Lie algebra at a level of 1. We also prove that a separate nonmaximal
        symmetry breaking pattern of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mrow><mi mathvariant=\\\"fraktur\\\">s</mi><mi mathvariant=\\\"fraktur\\\">u</mi></mrow><mo
        stretchy=\\\"false\\\">(</mo><mn>8</mn><mo stretchy=\\\"false\\\">)</mo><mo
        stretchy=\\\"false\\\">\u2192</mo><msub><mi mathvariant=\\\"fraktur\\\">g</mi><mn>621</mn></msub></math>
        is unrealistic due to the additional massless vectorlike quarks in the spectrum.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Ning
