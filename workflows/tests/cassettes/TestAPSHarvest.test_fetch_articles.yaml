        Swash\",\"firstname\":\"Alex\",\"surname\":\"Swash\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"Institute
        for Theoretical Physics (IFT), <a href=\\\"https://ror.org/00yae6e25\\\">University
        of Wroc\u0142aw</a> plac Maxa Borna 9, 50-204 Wroc\u0142aw, Poland\",\"id\":\"a1\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
