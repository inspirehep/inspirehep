        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Determining
        the nature of magnetism in altermagnetic candidate <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>RuO</mi><mn>2</mn></msub></math>\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>We
        study the emergence of the nonlocal Josephson effect in a system composed
        of three laterally coupled minimal Kitaev chains and exploit it to realize
        the nonlocal Josephson diode effect. We find that an imbalance between crossed
        Andreev reflections and electron cotunneling in the middle Kitaev chain gives
        rise to an asymmetric <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mn>2</mn><mi>\u03C0</mi></mrow></math>-periodic
        phase-dependent Andreev spectrum, controlled by the superconducting phases
        across the left and right junctions. We then show that the asymmetric Andreev
        spectrum, formed by hybridized Andreev bound states at the left and right
        junctions, enables a supercurrent across one junction via the phase difference
        at the other junction, thereby signaling the nonlocal Josephson effect. Notably,
        these nonlocal Josephson supercurrents exhibit distinct positive and negative
        critical currents, demonstrating the realization of the nonlocal Josephson
        diode effect with highly tunable polarity and efficiencies exceeding 50%.
        The nonlocal Josephson diode effect requires breaking local time-reversal
        and local charge-conjugation symmetries, with the latter being unique to minimal
        Kitaev chains. Our results establish minimal Kitaev chains as a highly controllable
        platform for engineering nonlocal Josephson phenomena.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Jorge
        Cayao\",\"firstname\":\"Jorge\",\"surname\":\"Cayao\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Masatoshi
        Sato\",\"firstname\":\"Masatoshi\",\"surname\":\"Sato\",\"affiliationIds\":[\"a2\"]}],\"affiliations\":[{\"name\":\"Department
