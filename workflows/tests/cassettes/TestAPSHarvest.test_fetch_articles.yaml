        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRC\",\"abbreviatedName\":\"Phys.
        Rev. C\",\"name\":\"Physical Review C\"},\"title\":{\"value\":\"<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>(</mo><mn>2</mn><mo>+</mo><mn>2</mn><mo>)</mo><mi
        mathvariant=\\\"normal\\\">D</mi></mrow></math> collective model based on
        a relativistic Boltzmann equation\_in the isotropization-time approximation:
        <span class=\\\"sc\\\">CoMBolt-ITA</span>\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Relativistic
        Nuclear Collisions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        demonstrate the implementation of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi
        mathvariant=\\\"normal\\\">\u039B</mi></math>-enhanced gray molasses cooling
        on the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>D</mi><mn>2</mn></msub></math>
        line of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mmultiscripts><mi>Rb</mi><mprescripts></mprescripts><none></none><mn>85</mn></mmultiscripts></math>
        atoms in an optical tweezer array. This technique yields lower atomic temperatures
        of 4.0(2) \xB5K compared with red-detuned polarization gradient cooling, and
        consequently extends the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msubsup><mi>T</mi><mn>2</mn><mo>*</mo></msubsup></math>
        coherence time of the hyperfine clock qubit by a factor of 1.5. The method
        is alignment-free and can be readily implemented on laser beams used for magneto-optical
        trapping because it only requires frequency and phase modulation control.
        Our experimental observations are corroborated by a numerical model based
        on a semiclassical force approach extended to a four-level system, including
        two hyperfine states of the upper manifold that are <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mn>120</mn><mspace
        width=\\\"0.28em\\\"></mspace><mi mathvariant=\\\"normal\\\">M</mi><mi>Hz</mi></mrow></math>
        apart.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"D.
