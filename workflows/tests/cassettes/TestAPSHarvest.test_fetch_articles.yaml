        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Shock
        compression of liquid helium to 360 GPa\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>Andreev
        levels localized in a weak link between two superconductors can trap a superconducting
        quasiparticle. If there is a spin-orbit coupling in the link, the spin of
        the quasiparticle couples to the Josephson current. This effect can be leveraged
        to control and read out the spin of the quasiparticle, thus using it as a
        qubit. One of the factors limiting the performance of such an Andreev spin
        qubit is spin relaxation. Here, we theoretically demonstrate that the relaxation
        lifetime can be enhanced by utilizing the coupling between the Andreev spin
        and the supercurrent in a transmon circuit. The coupling ensures that the
        flip of the quasiparticle spin can only happen if it is accompanied by the
        excitation of multiple plasmons, as dictated by the Franck-Condon principle.
        This blocks spin relaxation at temperatures small compared to plasmon energy.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"P.
        D. Kurilovich\",\"firstname\":\"P. D.\",\"surname\":\"Kurilovich\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"T.
        Vakhtel\",\"firstname\":\"T.\",\"surname\":\"Vakhtel\",\"affiliationIds\":[\"a2\"]},{\"type\":\"Person\",\"name\":\"T.
        Connolly\",\"firstname\":\"T.\",\"surname\":\"Connolly\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"C.
        G. L. B\xF8ttcher\",\"firstname\":\"C. G. L.\",\"surname\":\"B\xF8ttcher\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"B.
        van Heck\",\"firstname\":\"B.\",\"surname\":\"van Heck\",\"affiliationIds\":[\"a3\"]}],\"affiliations\":[{\"name\":\"Departments
