        display=\\\"inline\\\"><mrow><mi>SU</mi><mo stretchy=\\\"false\\\">(</mo><mi>N</mi><mo
        stretchy=\\\"false\\\">)</mo></mrow></math> lattice gauge theories with physics-informed
        neural networks\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Lattice
        field theories, lattice QCD\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        report a search for ultraheavy dark matter (UHDM) with the CDEX-10 experiment
        at the China Jinping Underground Laboratory. Using a Monte\_Carlo framework
        that incorporates Earth shielding effects, we simulated UHDM propagation and
        energy deposition in p-type point-contact germanium detectors. Analysis of
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mrow><mn>205.4</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>kg</mi><mo>\xB7</mo><mi>day</mi></mrow></math>
        exposure in the 0.16\u20134.16\_keVee range showed no excess above background.
        Our results exclude the spin-independent UHDM-nucleon scattering with two
        cross section scales, with the UHDM mass from <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mn>10</mn><mn>6</mn></msup></math> to <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mn>10</mn><mn>11</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>GeV</mi></math>,
        and provide the most stringent constraints with solid-state detectors below
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mn>10</mn><mn>8</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>GeV</mi></math>.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Collaboration\",\"name\":\"CDEX
