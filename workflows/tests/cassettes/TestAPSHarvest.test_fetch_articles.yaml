        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Magnetic
        evolution, phase transitions, and electronic band structure of the ferrotoroidic
        candidate <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>Ba</mi><mn>6</mn></msub><msub><mi>Cr</mi><mn>2</mn></msub><msub><mi
        mathvariant=\\\"normal\\\">S</mi><mn>10</mn></msub></mrow></math>\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>We
        report a rich anisotropic magnetic phase diagram of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>Na</mi><mn>3</mn></msub><msub><mi>Co</mi><mn>2</mn></msub><msub><mi>SbO</mi><mn>6</mn></msub></mrow></math>,
        a previously proposed cobaltate Kitaev candidate, based on field- and temperature-dependent
        magnetization, specific heat, and magnetocaloric effect studies. At low temperatures,
        our experiments uncover a low-lying <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>j</mi><mtext>eff</mtext></msub><mo>=</mo><mfrac><mn>1</mn><mn>2</mn></mfrac></mrow></math>
        state with an antiferromagnetic (AFM) ground state and pronounced in-plane
        versus out-of-plane anisotropy. The experimentally identified magnetic phases
        are theoretically characterized through classical Monte Carlo simulations
        within an extended Kitaev-Heisenberg model with additional ring exchange interactions.
        The resulting phase diagram reveals a variety of exotic field-induced magnetic
        phases, including double-<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi
        mathvariant=\\\"bold\\\">q</mi><mo>,</mo><mo>\_</mo><mfrac><mn>1</mn><mn>3</mn></mfrac></math>-AFM,
        zigzag, and vortex phases.</p>\",\"format\":\"html\"},\"articleType\":\"letter\",\"authors\":[{\"type\":\"Person\",\"name\":\"Kranthi
