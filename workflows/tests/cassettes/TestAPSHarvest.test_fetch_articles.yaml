        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRAPPLIED\",\"abbreviatedName\":\"Phys.
        Rev. Applied\",\"name\":\"Physical Review Applied\"},\"title\":{\"value\":\"Electrical
        detection and control of synthetic antiferromagnets via perpendicular nanoscale
        magnetic tunnel junctions\",\"format\":\"html\"},\"volume\":{\"number\":\"25\"}},{\"abstract\":{\"value\":\"<p>Quantum
        learning encounters fundamental challenges when estimating nonlinear properties,
        owing to the inherent linearity of quantum mechanics. Although recent advances
        in single-copy randomized measurement protocols have achieved optimal sample
        complexity for specific tasks like state purity estimation, generalizing these
        protocols to estimate broader classes of nonlinear properties without sacrificing
        optimality remains an open problem. In this work, we introduce the observable-driven
        randomized measurement (ORM) protocol enabling the estimation of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>Tr</mi><mo stretchy=\\\"false\\\">(</mo><mi>O</mi><msup><mi>\u03C1</mi><mn>2</mn></msup><mo
        stretchy=\\\"false\\\">)</mo></math> for an arbitrary observable <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>O</mi></math>\u2014an essential quantity in quantum
        computing and many-body physics. We establish an upper bound for ORM\u2019s
        sample complexity and show its optimality for observables with a large trace-norm,
        including Pauli and local observables, closing a gap in the literature. For
        these observables, ORM admits an efficient implementation with Clifford circuits.
        Numerical experiments validate that ORM requires substantially fewer state
        samples to achieve the same precision compared to classical shadows. Additionally,
        we introduce a braiding randomized measurement protocol for multiple low-rank
        nonlinear observables, reducing circuit complexities in practical applications.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Zhenyu
        Du\",\"firstname\":\"Zhenyu\",\"surname\":\"Du\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Yifan
