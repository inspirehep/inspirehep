        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Stochastic
        Pairwise Forces Enhance Tracer Diffusion in Nonmotile Active Matter\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Polymers,
        Chemical Physics, Soft Matter, and Biological Physics\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>The
        binary black hole signal GW250114, the clearest gravitational wave detected
        to date, offers a unique opportunity to test general relativity in the relativistic
        strong-gravity regime. How well does GW250114 agree with Einstein\u2019s predictions
        in the plunge-merger-ringdown stage? To address this point, we constrain deviations
        from general relativity across the plunge-merger-ringdown stage of spin-precessing
        binaries with a parametrized waveform model within the effective-one-body
        formalism. We find that deviations from the peak gravitational-wave amplitude
        and instantaneous frequency of the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mo stretchy=\\\"false\\\">(</mo><mo>\u2113</mo><mo>,</mo><mo
        stretchy=\\\"false\\\">|</mo><mi>m</mi><mo stretchy=\\\"false\\\">|</mo><mo
        stretchy=\\\"false\\\">)</mo><mo>=</mo><mo stretchy=\\\"false\\\">(</mo><mn>2</mn><mo>,</mo><mn>2</mn><mo
        stretchy=\\\"false\\\">)</mo></math> mode are constrained to about 10% and
        4%, respectively, at 90% credible level. These constraints are, respectively,
        2 and 4 times more stringent than those obtained by analyzing GW150914. We
        also constrain, for the first time, the instantaneous frequency of the <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mo
        stretchy=\\\"false\\\">(</mo><mo>\u2113</mo><mo>,</mo><mo stretchy=\\\"false\\\">|</mo><mi>m</mi><mo
        stretchy=\\\"false\\\">|</mo><mo stretchy=\\\"false\\\">)</mo><mo>=</mo><mo
        stretchy=\\\"false\\\">(</mo><mn>4</mn><mo>,</mo><mn>4</mn><mo stretchy=\\\"false\\\">)</mo></math>
        mode at merger to about 6% and the time at which the gravitational-wave amplitude
        peaks to about 5\_ms. These results provide exquisitely precise tests of general
        relativity in the strong-gravity regime and can be employed to constrain extensions
        of Einstein\u2019s theory.</p>\",\"format\":\"html\"},\"articleType\":\"letter\",\"authors\":[{\"type\":\"Person\",\"name\":\"Leonardo
