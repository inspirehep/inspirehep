        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Ensemble
        inequivalence in long-range quantum spin systems\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>We
        present an analysis of parton distribution functions (PDFs) of the proton
        using Markov chain Monte\_Carlo (MCMC) methods. The MCMC approach naturally
        implements Bayes\u2019 theorem and, thus, provides a means to directly sample
        the underlying probability distribution\u2014in this case, the probability
        distribution of the PDF parameters. This allows for a straightforward propagation
        of the resulting uncertainties into any PDF-dependent observable, preserving
        their simple probabilistic interpretation. In our analysis we include a broad
        set of deep inelastic scattering data from HERA, BCDMS and NMC experiments
        along with the Drell-Yan, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>W</mi></math> and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>Z</mi></math> boson data from LHC and Tevatron
        experiments, which combined with theoretical calculations at next-to-next-to-leading
        order in QCD allow for realistic determination of PDFs. The main focus of
        this analysis is to explore alternative methods for PDF uncertainty estimation
        that are more firmly grounded in statistical principles. We show that the
        flexibility of the Bayes framework, allowing one, e.g., to account for non-Gaussianity
        or inconsistencies of datasets, is crucial to extract realistic uncertainties
        when such assumptions are not fulfilled. We also demonstrate that MCMC allows
        one to determine the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi mathvariant=\\\"normal\\\">\u0394</mi><msup><mi>\u03C7</mi><mn>2</mn></msup></math>
        value corresponding to a given confidence level in the sample, which can,
        in turn, be used as a statistically well-founded tolerance criterion used
        in the Hessian method, thus addressing one of its main long-standing drawbacks.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"P.
