        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRE\",\"abbreviatedName\":\"Phys.
        Rev. E\",\"name\":\"Physical Review E\"},\"title\":{\"value\":\"Consistent
        kinetic modeling of compressible flows with variable Prandtl numbers: Double-distribution
        quasiequilibrium approach\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Computational
        Physics, Machine Learning, and Artificial Intelligence\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Plants
        often exhibit regular arrangements of seeds or leaves, known as phyllotaxis,
        and can famously exhibit Fibonacci spirals, as in sunflower heads or on pine
        cones. While there are many models which can reproduce a spiral formation,
        the actual mechanism of arrangement remains unclear. Here, we test a more
        general class of model, based on the Keller-Segel model, in which a diffusing
        chemical signal produces its own transport signal and can form local instabilities.
        By modeling the plant as a disk with a signal source at the center and radial
        growth, we show that we can reproduce both Fibonacci spirals and alternating
        patterns, depending on a balance between growth and source. Finally, using
        linear stability analysis, we show how the pattern arises due to a balance
        between the growth of instabilities and the growth of the plant. Overall,
        this work demonstrates how the Keller-Segel model can reproduce a wide range
        of observed patterns, and may act as a phenomenological description of a number
        of processes in plants.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Michael
        F. Staddon\",\"firstname\":\"Michael F.\",\"surname\":\"Staddon\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"<a
        href=\\\"https://ror.org/05b8d3w18\\\">Max Planck Institute of Molecular Cell
        Biology and Genetics</a>, Dresden, Germany; <a href=\\\"https://ror.org/05hrn3e05\\\">Center
        for Systems Biology Dresden</a>, Dresden, Germany; and Cluster of Excellence,
        Physics of Life, <a href=\\\"https://ror.org/042aqky30\\\">TU Dresden</a>,
        Dresden, Germany\",\"id\":\"a1\"}],\"date\":\"2026-03-27\",\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-27T13:45:32+0000\",\"last_modified_at\":\"2026-03-27T13:45:32+0000\",\"id\":\"10.1103/9yk5-b4q2\",\"identifiers\":{\"doi\":\"10.1103/9yk5-b4q2\",\"arxiv\":\"arXiv:2509.06498\"},\"issue\":{\"number\":\"3\"},\"pageStart\":\"034407\",\"hasArticleId\":true,\"numPages\":6,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"9c136a51-04ad-4752-84f1-5c508214f321\",\"facet\":{\"id\":\"f45b3c40-959c-4e90-ba0e-38232980802a\"},\"primary\":false},{\"id\":\"52f3dfc6-36cf-4fbd-8706-562f660f4a72\",\"facet\":{\"id\":\"b96dac97-ab85-4320-892d-9b245caf097f\"},\"primary\":false},{\"id\":\"8e35265c-459a-43fc-9eb8-73e1dd82b47c\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"5be420fe-48f0-4430-a63d-9d611d837d6e\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true}],\"disciplines\":[\"0e9db8ef-5aa8-40bc-a0c8-9d93f5fcc2eb\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
        by the American Physical Society\",\"copyrightYear\":2026,\"copyrightHolders\":[],\"creativeCommons\":true,\"licenses\":[{\"url\":\"https://creativecommons.org/licenses/by/4.0/\",\"licenseStatement\":\"Published
        by the American Physical Society under the terms of the <a href=\\\"https://creativecommons.org/licenses/by/4.0/\\\">Creative
        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI. Open access publication funded by Max Planck
        Society.\"}]},\"journal\":{\"id\":\"PRE\",\"abbreviatedName\":\"Phys. Rev.
        E\",\"name\":\"Physical Review E\"},\"title\":{\"value\":\"Phyllotaxis in
        a Keller-Segel model\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Biological
        Physics\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>The
        near-threshold photo- and electroproduction of heavy vector quarkonia off
        the proton provides direct access to its gluonic structure. In particular,
        the cross section for <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>J</mi><mo>/</mo><mi mathvariant=\\\"normal\\\">\u03A8</mi></math>
        photoproduction near threshold is governed by the proton\u2019s gluon gravitational
        form factors (GFFs). In this work, we employ the leading-order generalized
        parton distribution framework, together with gluon GFFs calculated in a light-front
        gluon-spectator model inspired by soft-wall AdS/QCD to predict both the differential
        and total cross sections for near-threshold <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>J</mi><mo>/</mo><mi mathvariant=\\\"normal\\\">\u03A8</mi></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"normal\\\">\u03D2</mi></math> photoproduction. Our results
        for <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>J</mi><mo>/</mo><mi>\u03C8</mi></math>
        photoproduction show good agreement with the low-momentum-transfer data from
        the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mrow><mi>J</mi><mo>/</mo><mi>\u03C8</mi><mtext>\u2212</mtext><mn>007</mn></mrow></math>
        experiment and the GlueX Collaboration at Jefferson Lab. However, at large
        momentum transfer, the next-to-leading order QCD effects are necessary to
        describe the data.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Amrita
        Sain\",\"firstname\":\"Amrita\",\"surname\":\"Sain\",\"affiliationIds\":[\"a1\",\"a2\",\"a3\"]},{\"type\":\"Person\",\"name\":\"Bheemsehan
