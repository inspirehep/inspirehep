        by the American Physical Society under the terms of the <a href=\\\"https://creativecommons.org/licenses/by/4.0/\\\">Creative
        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article\u2019s
        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Supersymmetric
        lattice theories on curved space\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Lattice
        field theories, lattice QCD\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>In
        this paper, we propose to test quantum entanglement and Bell nonlocality at
        an electron-ion collider (EIC). By computing the spin correlations in quark-antiquark
        pairs produced via photon-gluon fusion, we find that longitudinally polarized
        photons produce maximal entanglement at leading order, while transversely
        polarized photons generate significant entanglement near the threshold and
        in the ultrarelativistic regime. Compared to hadron colliders, the EIC provides
        a cleaner experimental environment for measuring entanglement through the
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mi>\u03B3</mi><mo>*</mo></msup><mi>g</mi><mo
        stretchy=\\\"false\\\">\u2192</mo><mi>q</mi><mover accent=\\\"true\\\"><mi>q</mi><mo
        stretchy=\\\"false\\\">\xAF</mo></mover></math> channel, offering a strong
        signal and a promising avenue to verify Bell nonlocality. This study extends
        entanglement measurements to the EIC, presenting new opportunities to explore
        the interplay of quantum information phenomena and hadronic physics in the
        EIC era.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Wei
        Qi\",\"firstname\":\"Wei\",\"surname\":\"Qi\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Zijing
        Guo\",\"firstname\":\"Zijing\",\"surname\":\"Guo\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Bo-Wen
        Xiao\",\"firstname\":\"Bo-Wen\",\"surname\":\"Xiao\",\"affiliationIds\":[\"a1\",\"a3\"]}],\"affiliations\":[{\"name\":\"School
