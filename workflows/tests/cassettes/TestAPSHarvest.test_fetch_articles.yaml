        Trust\",\"awards\":[\"LIP-202-014\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-26T12:31:07+0000\",\"last_modified_at\":\"2026-03-26T12:31:07+0000\",\"id\":\"10.1103/b974-mpkc\",\"identifiers\":{\"doi\":\"10.1103/b974-mpkc\",\"arxiv\":\"arXiv:2502.02650\"},\"issue\":{\"number\":\"12\"},\"pageStart\":\"126504\",\"hasArticleId\":true,\"numPages\":6,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"ea5486d7-baba-459b-bf6a-145a4f675537\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"7dd874c0-5ab0-4de4-9919-10775f22748a\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"1384cf6f-6b2c-4bc6-ab8f-60f200af3eed\",\"facet\":{\"id\":\"f45b3c40-959c-4e90-ba0e-38232980802a\"},\"primary\":false},{\"id\":\"1cf824c7-0d79-44df-9d04-099e1d771679\",\"facet\":{\"id\":\"b96dac97-ab85-4320-892d-9b245caf097f\"},\"primary\":false}],\"disciplines\":[\"a48f173e-6459-4642-a711-a6e731807625\",\"419d860e-ce5c-42f1-b6ad-4dee9f4fbf60\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
