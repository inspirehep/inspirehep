        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRB\",\"abbreviatedName\":\"Phys.
        Rev. B\",\"name\":\"Physical Review B\"},\"title\":{\"value\":\"Field-induced
        magnetic phases in the Kitaev candidate <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>Na</mi><mn>3</mn></msub><msub><mi>Co</mi><mn>2</mn></msub><msub><mi>SbO</mi><mn>6</mn></msub></mrow></math>\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Magnetism\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Cartan
        geometry provides a unifying algebraic construction of curvature and torsion,
        based on an underlying model Lie algebra; a viewpoint that can be extended
        naturally to the higher algebraic structures underlying supergravity. We present
        a Cartan-geometric framework for generalized geometries governed by a differential
        graded Lie algebra, extending previous results. The extended tangent bundle
        admits the action of both a global duality group <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi mathvariant=\\\"script\\\">G</mi></math> and a
        local gauge group <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>H</mi></math>.
        This algebraic structure is implemented via a brane current algebra; the phase
        space Poisson structure of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>p</mi></math>-branes. Within this Cartan-inspired
        framework, we define a hierarchy of generalized connections and compute their
        linearized torsion and curvature tensors, including the higher curvatures
        required by the tensor hierarchy. This provides a systematic construction
        of curvature and torsion tensors in generic generalized geometries.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Falk
