        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Regular black
        hole cores via gravitational evanescence of collapsing matter\",\"format\":\"html\"},\"tocSection\":{\"label\":\"General
        relativity, alternative theories of gravity\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        present the diagrammatic theory of the irreducible self-energy and Bethe-Salpeter
        kernel that naturally arises within the Green\u2019s function formalism for
        a general <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>N</mi></math>-body
        non-Hermitian interaction. In this work, we focus specifically on the coupled-cluster
        (CC) self-energy generated by the similarity transformation of the electronic
        structure Hamiltonian. The main result of this work is a Green\u2019s function
        formalism for non-Hermitian many-body quantum systems. We develop the biorthogonal
        quantum theory to construct dynamical correlation functions where the time
        dependence of operators is governed by a non-Hermitian Hamiltonian. We extend
        the Gell-Mann and Low theorem to include non-Hermitian interactions and to
        generate perturbative expansions of many-body Green\u2019s functions. We introduce
        the single-particle coupled-cluster Green\u2019s function and derive the perturbative
        diagrammatic expansion for the non-Hermitian coupled-cluster self-energy in
        terms of the \u201Cnoninteracting\u201D reference Green\u2019s function, <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mover accent=\\\"true\\\"><mi
        mathvariant=\\\"normal\\\">\u03A3</mi><mo>\u0303</mo></mover><mrow><mo>[</mo><msub><mi>G</mi><mn>0</mn></msub><mo>]</mo></mrow></mrow></math>.
        From the exact equation of motion of the single-particle coupled-cluster Green\u2019s
        function, we derive the self-consistent renormalized coupled-cluster self-energy,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mover accent=\\\"true\\\"><mi
        mathvariant=\\\"normal\\\">\u03A3</mi><mo>\u0303</mo></mover><mrow><mo>[</mo><mover
        accent=\\\"true\\\"><mi>G</mi><mo>\u0303</mo></mover><mo>]</mo></mrow></mrow></math>,
        and demonstrate its relationship to the perturbative expansion of the self-energy,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mover accent=\\\"true\\\"><mi
        mathvariant=\\\"normal\\\">\u03A3</mi><mo>\u0303</mo></mover><mrow><mo>[</mo><msub><mi>G</mi><mn>0</mn></msub><mo>]</mo></mrow></mrow></math>.
        Subsequently, we show that the usual electronic self-energy can be recovered
        from the coupled-cluster self-energy by neglecting the effects of the similarity
        transformation. We show how the coupled-cluster ground-state energy can be
        obtained from the coupled-cluster self-energy and provide an overview of the
        relationship between approximations for the coupled-cluster self-energy, ionization
        potential/electron affinity equation-of-motion coupled-cluster theory, and
        the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>G</mi><mn>0</mn></msub><msub><mi>W</mi><mn>0</mn></msub></mrow></math>
        approximation. As a result, we introduce the CC-<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><msub><mi>G</mi><mn>0</mn></msub><msub><mi>W</mi><mn>0</mn></msub></mrow></math>
        self-energy by leveraging the connections between Green\u2019s function and
        coupled-cluster theory. Finally, we derive the diagrammatic expansion of the
        coupled-cluster Bethe-Salpeter kernel.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Christopher
