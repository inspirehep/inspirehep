        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Torsion
        Balance Experiments Enable Direct Detection of Sub-eV Dark Matter\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Particles
        and Fields\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>The
        factorization proposal claims that the codimension one \u201Cpinning defect,\u201D
        on which a local relevant operator is integrated, factorizes the space into
        two halves in general conformal field theories in the infrared limit. In this
        paper, we study a two-dimensional long-range Ising model at criticality with
        a line defect or an interface, which physically corresponds to changing the
        local temperature on it. We show that in the perturbative regime, it is not
        factorizing even in the infrared limit. An intuitive explanation of the nonfactorization
        is that the long-range Ising model is equivalent to a local conformal field
        theory in higher dimensions. In this picture, the space is still connected
        through the \u201Cextra dimension\u201D across the defect line.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Dongsheng
        Ge\",\"firstname\":\"Dongsheng\",\"surname\":\"Ge\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Yu
