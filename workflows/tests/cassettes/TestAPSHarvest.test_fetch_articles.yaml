        theory\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Beyond the standard
        model\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Modified
        Einstein\u2019s equations implementing both an energy-dependent Newtonian
        and cosmological constant can be obtained via a modified action characterized
        by a nonminimal gravity-matter coupling. We\_show how different dynamics for
        the high energy regime\u2014that nevertheless have in common the vanishing
        of the Newton constant\u2014result in models of gravitational collapse which
        source the formation of nonsingular geometries with different types of asymptotic
        core: de Sitter, Minkowski, and with \u201Csteep pressure.\u201D As we categorise
        their defining properties, one feature, which we prove to be actually independent
        of both the specific form of the nonminimal coupling and the equation of state
        of the collapsing fluid, stands out: the formation of a geometry with Minkowski
        core occurs only if the Newton constant, before finally vanishing, assumes
        negative values.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Antonio
        Panassiti\",\"firstname\":\"Antonio\",\"surname\":\"Panassiti\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"INAF,
