        this work must maintain attribution to the author(s) and the published article\u2019s
        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Confronting
        a dilaton model with LHC measurements\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Beyond
        the standard model\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        apply the light-cone QCD sum rules with chiral currents to compute transition
        form factors of the semileptonic decay of the charmed and bottom scalar mesons
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>D</mi><mo>/</mo><mi>B</mi></math>
        to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>a</mi><mn>0</mn></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>980</mn><mo stretchy=\\\"false\\\">)</mo><msup><mi>l</mi><mo>+</mo></msup><msub><mi>\u03BD</mi><mi>l</mi></msub></math>
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mrow><mo
        stretchy=\\\"false\\\">(</mo><mi>l</mi><mo>=</mo><mi>e</mi><mo>,</mo><mi>\u03BC</mi><mo
        stretchy=\\\"false\\\">)</mo></mrow></math>, where the scalar meson <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>a</mi><mn>0</mn></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>980</mn><mo stretchy=\\\"false\\\">)</mo></math>
        are firstly regarded as two quark states, and contributions from the tetraquark
        component are then added via proper modulation of four distribution amplitudes
        considered. The obtained transition form factors and branching fraction are
        free of the contribution from the light-cone distribution amplitudes at the
        level of twist-three and two simple relations connecting their form factors
        are obtained. Our computations indicates that the decay branch fractions are
        on the margin of the measurements reported by the Beijing Spectrometer III
        in the pure two-quark scenario and are in good agreement with observations
