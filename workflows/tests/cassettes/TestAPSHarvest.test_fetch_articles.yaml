        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRA\",\"abbreviatedName\":\"Phys.
        Rev. A\",\"name\":\"Physical Review A\"},\"title\":{\"value\":\"Exploring
        the fidelity of flux-qubit measurement in different bases via the quantum
        flux parametron\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Quantum
        technologies\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        report on the cosmic ray mass composition measured by the Telescope Array
        Low-energy Extension (TALE) hybrid detector. The TALE detector consists of
        a fluorescence detector (FD) station with 10 FD telescopes located at the
        Telescope Array (TA) Middle Drum FD Station (itself made up of 14 FD telescopes),
        and a surface detector (SD) array of scintillators. The array consists of
        40 SDs with 400\_m spacing and 40 SDs with 600\_m spacing. In this paper,
        we present results on the measurement of the depth of shower maxima (<math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>X</mi><mi>max</mi></msub></math>)
        in the energy range from <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mn>10</mn><mn>16.5</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>eV</mi></math>
        to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mn>10</mn><mn>18.5</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>eV</mi></math>
        collected over five years of the TALE hybrid detector. The <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>X</mi><mi>max</mi></msub></math> distributions
        were analyzed and compared with Monte\_Carlo simulations of proton, helium,
        nitrogen, and iron primaries, using the QGSJet II-04 hadronic interaction
        model. Our results indicate that the elongation rate of the mean <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>X</mi><mi>max</mi></msub></math>, which is
        defined as the slope of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mo stretchy=\\\"false\\\">\u27E8</mo><msub><mi>X</mi><mi>max</mi></msub><mo
        stretchy=\\\"false\\\">\u27E9</mo></math> versus cosmic ray energy, exhibits
        a break around <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mn>10</mn><mn>17</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>eV</mi></math>.
        Up to this energy, the composition becomes increasingly heavy, characterized
        by a growing dominance of heavy nuclei and a steadily decreasing fraction
        of light primaries. Beyond this energy, the proton fraction increases significantly
        with energy. These findings suggest a transition from Galactic to extra-Galactic
        cosmic ray sources around the so-called second knee.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Collaboration\",\"name\":\"Telescope
