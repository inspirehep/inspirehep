        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Gravitational
        waves from supermassive right-handed neutrinos produced at preheating\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Beyond
        the standard model\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        have developed an extension of the inert doublet model in which the <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>C</mi><mi>P</mi></math>
        phases in the weak sector are generated from one-loop level corrections mediated
        by dark fields, while the strong <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>C</mi><mi>P</mi></math> phase remains vanishing
        at three loops. In this framework, the tiny masses of the active neutrinos
        are produced through a radiative inverse seesaw mechanism at a two-loop level,
        the masses of the first and second families of Standard Model (SM) charged
        fermions arise from a one-loop level radiative seesaw mechanism, and the third
        generation of SM charged fermion masses are generated at tree level. We have
        demonstrated that the\_proposed model successfully accounts for SM fermion
        masses and mixings. The radiative nature of the seesaw mechanisms is attributed
        to preserved discrete symmetries, which are required for ensuring the stability
        of fermionic and scalar dark matter candidates. The preserved discrete symmetries
        also allow for\_multicomponent dark matter, whose annihilation processes permit
        one to successfully reproduce the measured amount of dark matter relic abundance
        for an appropriate region of parameter space, which has been shown to be compatible
        with current dark matter direct detection limits. Besides that, we explore
        the model\u2019s ability to explain the 95\_GeV diphoton excess observed by
        the CMS Collaboration, showing that it readily accommodates this anomaly.
        We also have shown that charged lepton flavor violating decays acquire rates
        within the current experimental sensitivity.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"D.\u2009T.
