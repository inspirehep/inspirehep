        Rev. C\",\"name\":\"Physical Review C\"},\"title\":{\"value\":\"High-precision
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03B1</mi></math>-induced
        cross sections\_and half-life measurements for terbium radioisotopes produced
        using natural europium\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Nuclear
        Reactions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Data
        for the shock equation\_of state of helium are obtained up to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mn>360</mn><mspace
        width=\\\"0.16em\\\"></mspace><mi mathvariant=\\\"normal\\\">G</mi><mi>Pa</mi></mrow></math>,
        nearly doubling the pressure of previous experimental measurements. The helium
        samples are first precompressed to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mn>2.7</mn><mspace
        width=\\\"0.16em\\\"></mspace><mi mathvariant=\\\"normal\\\">g</mi><mspace
        width=\\\"0.16em\\\"></mspace><mi mathvariant=\\\"normal\\\">c</mi><msup><mi
        mathvariant=\\\"normal\\\">m</mi><mrow><mo>\u2212</mo><mn>3</mn></mrow></msup><mspace
        width=\\\"0.16em\\\"></mspace></mrow></math> in a diamond anvil cell prior
        to laser-driven shock compression at the Omega Laser Facility. Time-resolved
        Doppler velocimetry and pyrometry reveal significant reflectivity and greater
        compressibility compared to the predictions of existing broad-range tabular
        equation\_of state models, which may be caused by the onset of ionization.
        These experimental observations, however, are largely captured with molecular-dynamics
        simulations based on density functional theory, affirming the ability of first-principles
        techniques to capture complex physics, while enabling critical insight for
        the behavior of warm dense helium in Jovian interiors and white dwarf atmospheres.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"M.
