      string: "{\"data\":[{\"abstract\":{\"value\":\"<p>We report measurements of
        the astrophysically predominant <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>K</mi><mi>\u03B1</mi></mrow></math>
        emission from <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>Ca</mi></math>
        XIX (He-like ion) and its satellite lines resonantly excited by dielectronic
        recombination (DR). We achieve an electron-energy resolution of 8\_eV in a
        cryogenic electron beam ion trap, and determine the energies of the exciting
        electrons and the emitted photons up to the <i>KLN</i> (<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>n</mi><mo>\u2264</mo><mn>8</mn></mrow></math>)
        manifold with 0.05 and 0.1% respective uncertainties. For the <i>KLL</i> satellites,
        energies agree very well with our predictions using the Flexible Atomic Code
        (<span class=\\\"sc\\\">fac</span>) and previous state-of-the-art calculations.
        Our calculations also agree with our experimental direct excitation cross
        sections for <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>K</mi><mi>\u03B1</mi></mrow></math>
        within their 10% uncertainty. We extract DR coefficient rates from our <span
        class=\\\"sc\\\">fac</span> calculations and find good agreement with values
        tabulated in the OPEN-ADAS database. Moreover, we compare <span class=\\\"sc\\\">fac</span>
        synthetic spectra, incorporating the DR atomic data benchmarked in the present
        work, with recent x-ray imaging and spectroscopy mission observations. This
        comparison highlights the contributions of DR satellites to the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>Ca</mi></math>
        <span class=\\\"sc\\\">xix</span> main lines.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Filipe
