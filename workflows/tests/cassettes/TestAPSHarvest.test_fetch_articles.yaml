        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Cosmic ray
        mass composition measurement in the energy range from <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mn>10</mn><mn>16.5</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>eV</mi></math>
        to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mn>10</mn><mn>18.5</mn></msup><mtext>\u2009</mtext><mtext>\u2009</mtext><mi>eV</mi></math>
        observed with the TALE hybrid detector\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Experiments
        in gravity, cosmology, cosmic rays\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>This
        Letter reports the first measurement of photonuclear <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>D</mi><mn>0</mn></msup></math> meson production
        in ultraperipheral heavy ion collisions. The study is performed using lead-lead
        collision data, with an integrated luminosity of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mn>1.34</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><msup><mi>nb</mi><mrow><mo>\u2212</mo><mn>1</mn></mrow></msup></math>,
        collected by the CMS experiment at a nucleon-nucleon center-of-mass energy
        of 5.36\_TeV. Photonuclear events, where one of the colliding nuclei breaks
        up and the other remains intact, are selected based on breakup neutron emissions
        and by requiring no particle activity in a large rapidity interval in the
        direction of the photon-emitting nucleus. The <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>D</mi><mn>0</mn></msup></math> mesons are
        reconstructed via the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>D</mi><mn>0</mn></msup><mo stretchy=\\\"false\\\">\u2192</mo><msup><mi>K</mi><mo>\u2212</mo></msup><msup><mi>\u03C0</mi><mo>+</mo></msup></math>
        decay channel, with the cross section measured as a function of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>D</mi><mn>0</mn></msup></math> meson transverse
        momentum and rapidity. The results are compared with next-to-leading-order
        perturbative QCD calculations that employ recent parametrizations of the lead
        nuclear parton distribution functions, as well as with predictions based on
        the color glass condensate framework. This measurement is the first photonuclear
        collision study characterizing parton distribution functions of lead nuclei
        for parton fractional momenta <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>x</mi></math> (relative to the nucleon) ranging
        approximately from a few <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>4</mn></mrow></msup></math>
        to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mn>10</mn><mrow><mo>\u2212</mo><mn>2</mn></mrow></msup></math>
        for different hard energy scale <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>Q</mi><mn>2</mn></msup></math> selections.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Collaboration\",\"name\":\"CMS
