        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Studying maximal
        entanglement and Bell nonlocality at an electron-ion collider\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Strong
        Interactions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>The
        mass spectrum of hadrons in magnetic fields features avoided level-crossing
        structures arising from the mixing of spin eigenstates. In this work, we investigate
        the impact of level-crossing dynamics of charmonia subjected to time-dependent
        magnetic fields, where we particularly focus on the occupation probabilities
        of two or more states as they undergo transitions at avoided crossings. Using
        a static spectrum of charmonia in magnetic fields, we construct a multichannel
        Landau-Zener Hamiltonian. Within this framework, we analyze the time evolution
        under several representative magnetic-field profiles, including linear ramps
        and Gaussian decays corresponding to single-passage dynamics, as well as Gaussian
        pulses realizing double-passage dynamics, and compute the occupation probabilities
        over a wide range of sweep rates and initial conditions. Our results show
        that nonadiabatic dynamics, including Landau-Zener transitions and St\xFCckelberg
        interference, strongly influences the occupation probabilities of charmonia.
        These findings provide new insights into the real-time dynamics of magnetized
        hadrons and offer useful guidance for future lattice simulation studies.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Ahmad
        Jafar Arifi\",\"firstname\":\"Ahmad Jafar\",\"surname\":\"Arifi\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Kei
