        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Measurement
        of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mi>D</mi><mn>0</mn></msup></math>
        Meson Photoproduction in Ultraperipheral Heavy Ion Collisions\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Nuclear
        Physics\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>We
        report on a profession-oriented course we offered at the University of Vienna,
        aimed at physics education teacher students. The course on theoretical classical
        mechanics was conceived and designed from the outset with the explicit goal
        of bridging the gap between the abstract, mathematical notions employed in
        theoretical physics and the concrete future needs of prospective teachers
        in their profession. We aimed to counter both the negative attitudes of students
        toward theoretical physics and the interrelated skepticism of professors regarding
        the students\u2019 mathematical proficiency. Our main findings are that these
        goals can indeed be achieved through a careful selection of course material
        and the associated mathematical tools, through closely interwoven lecture
        topics and exercises, and through thorough planning according to principles
        for high-school teaching known from science education research. Establishing
        close connections between the material taught in the course and\_the students\u2019
        future occupation as high-school teachers has proven to be of utmost importance.
        This is possible without any sacrifice of mathematical rigor or the quality
        of physics presented.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Marianne
        Korner\",\"firstname\":\"Marianne\",\"surname\":\"Korner\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Christos
        N. Likos\",\"firstname\":\"Christos N.\",\"surname\":\"Likos\",\"affiliationIds\":[\"a2\"]}],\"affiliations\":[{\"name\":\"<a
        href=\\\"https://ror.org/03prydq77\\\">University of Vienna</a>, Faculty of
        Physics, Experimental Basic Training and University Didactics, Porzellangasse
        4, 1090 Vienna, Austria\",\"id\":\"a1\"},{\"name\":\"<a href=\\\"https://ror.org/03prydq77\\\">University
        of Vienna</a>, Faculty of Physics, Computational and Soft Matter Physics,
        Kolingasse 14-16, 1090 Vienna, Austria\",\"id\":\"a2\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
        author: marianne.korner@univie.ac.at</p>\",\"label\":\"*\",\"id\":\"n1\",\"type\":\"contrib\"}],\"date\":\"2026-03-26\",\"fundings\":[{\"funderId\":\"http://dx.doi.org/10.13039/501100003065\",\"funderName\":\"Universit\xE4t
        Wien\",\"awards\":[]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-26T13:30:32+0000\",\"last_modified_at\":\"2026-03-26T13:30:32+0000\",\"id\":\"10.1103/1lc2-2372\",\"identifiers\":{\"doi\":\"10.1103/1lc2-2372\"},\"issue\":{\"number\":\"1\"},\"pageStart\":\"010131\",\"hasArticleId\":true,\"numPages\":15,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"51b7feeb-da35-4a0b-b0bf-ff6ba0aa1cc7\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"1ad4c70d-5644-4a14-a97e-973953744ade\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"45348f65-04ba-45a1-8d14-bbc7a025737a\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false}],\"disciplines\":[\"88db3168-1ae3-4ee7-a7f8-b83018cc5f17\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
