        of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mmultiscripts><mi>Rb</mi><mprescripts></mprescripts><none></none><mn>85</mn></mmultiscripts></math>
        atoms in tweezers using the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>D</mi><mn>2</mn></msub></math>
        line\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Light-induced processes
        in atomic-scale systems\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>How
        can we perform a metrological task if only limited control over a quantum
        system is given? Here, we present systematic methods for conducting nonlinear
        quantum metrology in scenarios lacking a common reference frame. Our approach
        involves preparing multiple copies of quantum systems and then performing
        local measurements with randomized observables. First, we derive the metrological
        precision using an error-propagation formula based solely on local unitary
        invariants, which are independent of the chosen basis. Next, we provide analytical
        expressions for the precision scaling in various examples of nonlinear metrology
        involving two-body interactions, like the one-axis twisting Hamiltonian. Finally,
        we analyze our results in the context of local decoherence and discuss its
        influences on the observed scaling.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Satoya
        Imai\",\"firstname\":\"Satoya\",\"surname\":\"Imai\",\"affiliationIds\":[\"a1\",\"a2\",\"a3\",\"a4\"]},{\"type\":\"Person\",\"name\":\"Otfried
