        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Investigating
        the leptonic couplings of doubly charged scalars at the muon collider\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Beyond
        the standard model\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        study nonequilibrium initial states of quantum fields in curved spacetime
        and develop a framework for describing global quenches as unitary perturbations
        of the initial density matrix. Using the Keldysh-Schwinger functional integral,
        we derive expressions for postquench correlators in arbitrary geometries and
        apply the method to both Minkowski and de Sitter backgrounds. In flat space,
        the approach reproduces the known relaxation behavior for massive fields and
        reveals qualitatively distinct dynamics in the massless case. In de Sitter
        space, we find that the late-time decay of quench-induced corrections depends
        sensitively on the mass and may influence the behavior of cosmological observables
        such as the power spectrum. The framework also extends straightforwardly to
        non-Gaussian initial states, providing a basis for future studies of loop
        effects and primordial non-Gaussianities.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Ivan
        A. Belkovich\",\"firstname\":\"Ivan A.\",\"surname\":\"Belkovich\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Damir
        Sadekov\",\"firstname\":\"Damir\",\"surname\":\"Sadekov\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Gleb
        S. Zverev\",\"firstname\":\"Gleb S.\",\"surname\":\"Zverev\",\"affiliationIds\":[\"a2\"]}],\"affiliations\":[{\"name\":\"<a
