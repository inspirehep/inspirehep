        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRL\",\"abbreviatedName\":\"Phys.
        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Smooth
        String Vacua in a Gravitationally Nonperturbative Regime\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Particles
        and Fields\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>We
        study the lepton flavor conserving and violating couplings of a doubly charged
        scalar at a 3\_TeV muon collider. Using a model-independent Lagrangian, we
        analyze the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>e</mi><mi>e</mi></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03BC</mi><mi>\u03BC</mi></math>,
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03C4</mi><mi>\u03C4</mi></math>
        final states mediated by the doubly charged scalar to probe individual couplings
        to <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03BC</mi><mi>e</mi></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03BC</mi><mi>\u03BC</mi></math>,
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>\u03BC</mi><mi>\u03C4</mi></math>.
        We find that for a doubly charged scalar of mass greater than 1\_TeV and <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"script\\\">O</mi><mo stretchy=\\\"false\\\">(</mo><mn>1</mn><mo
        stretchy=\\\"false\\\">)</mo></math> couplings, we achieve high signal significance
        in these channels. We delineate the collider\u2019s sensitivity in the mass-coupling
        plane, highlighting the extensive reach of the muon collider in probing these
        couplings far beyond the current experimental limits. We also propose an angular
        distribution variable to discriminate between the exchange of a doubly charged
        scalar from that of a neutral scalar, which gives identical signals.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Nivedita
