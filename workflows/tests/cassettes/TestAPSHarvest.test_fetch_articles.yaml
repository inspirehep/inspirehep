        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Constraints
        on ultraheavy dark matter from the CDEX-10 experiment at the China Jinping
        Underground Laboratory\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Particle
        Physics Experiments\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>High-fidelity
        qubit readout is a fundamental requirement for practical quantum computing
        systems. In this work, we investigate methods to enhance the measurement fidelity
        of flux qubits via a quantum flux parametron-mediated readout scheme. Through
        theoretical modeling and numerical simulations, we analyze the impact of different
        measurement bases on fidelity in single-qubit and coupled two-qubit systems.
        For single-qubit systems, we show that energy bases consistently outperform
        flux bases in achieving higher fidelity. In coupled two-qubit systems, we
        explore two measurement models: sequential and simultaneous measurements,
        both aimed at reading out a single target qubit. Our results indicate that
        the highest fidelity can be achieved either by performing sequential measurement
        in a dressed basis over a longer duration or by conducting simultaneous measurement
        in a bare basis over a shorter duration. Importantly, the sequential measurement
        model consistently yields more robust and higher-fidelity readouts compared
        to the simultaneous approach. These findings quantify achievable fidelities
        and provide valuable guidance for optimizing measurement protocols in emerging
        quantum computing architectures.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Yanjun
        Ji\",\"firstname\":\"Yanjun\",\"surname\":\"Ji\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Susanna
        Kirchhoff\",\"firstname\":\"Susanna\",\"surname\":\"Kirchhoff\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Frank
        K. Wilhelm\",\"firstname\":\"Frank K.\",\"surname\":\"Wilhelm\",\"affiliationIds\":[\"a1\",\"a2\"]}],\"affiliations\":[{\"name\":\"Institute
