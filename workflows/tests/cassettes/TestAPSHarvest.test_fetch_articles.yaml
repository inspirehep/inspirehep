        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Determination
        of proton PDF uncertainties with Markov chain Monte\_Carlo\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Strong
        Interactions\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>For
        high-efficiency inertial confinement fusion implosions, it is predicted that
        a burning hot spot will successfully encompass all surrounding fuel and then
        transition into a thermal runaway where the internal energy increase from
        fusion occurs on a timescale faster than the expansion of the fuel is able
        to quench the fusion chain reaction after ignition occurs. Observation of
        this dynamic phase transition would indicate distinct burn properties and
        indicate an implosion's robustness. A technique for diagnosing the presence
        of thermal runaway from measurements of nuclear reaction history is presented.
        The technique is based on taking the logarithmic derivative of the nuclear
        reaction history, called the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03B1</mi></math>
        curve, and allowing a mathematical decoupling of the mass, volume, and thermal
        reactivity in the fusion reaction rate equation. During thermal runaway, where
        the thermal temperature dominates the burn dynamics, a maximum in the <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03B1</mi></math> curve
        is found where there is a maximum in the first derivative of the thermal fusion
        reactivity, an effect to the deuterium-tritium (DT) fusion cross-section resonance.
        This provides a distinct signature related to the fundamental nature of the
        DT fusion nuclear resonance and signifies the transition into the fusion thermal
        instability. Impacts of charged particle transport on the effect are also
        assessed and the analytical formulas are compared and found to be in agreement
        with radiation hydrodynamic codes.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Robert
