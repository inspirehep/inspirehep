        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRB\",\"abbreviatedName\":\"Phys.
        Rev. B\",\"name\":\"Physical Review B\"},\"title\":{\"value\":\"Andreev spin
        qubit protected by Franck-Condon blockade\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Surface
        physics, nanoscale physics, low-dimensional systems\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Biology
        stores information and computes at the molecular scale, yet the ways in which
        it does so are often distinct from human-engineered computers. Mapping biological
        computation onto architectures familiar to computer science remains an outstanding
        challenge. Here, inspired by Crick's proposal for molecular memory, we analyze
        a thermodynamically consistent model of a protein complex subject to driven,
        nonequilibrium enzymatic reactions. In the strongly driven limit, we find
        that the system maps onto a stochastic, asynchronous variant of cellular automata,
        where each rule corresponds to a different set of enzymes being present. We
        find a broad class of phenomena in these \u201Cmolecular automata\u201D that
        can be exploited for molecular computation, including error-tolerant memory
        via multistable attractors, and long transients that can be used as molecular
        stopwatches. By systematically enumerating all possible dynamical rules, we
        identify those that allow molecular automata to implement simple computational
        architectures such as finite-state machines. Overall, our results provide
        a framework for engineering synthetic molecular automata and offer a route
        to building protein-based computation in living cells.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Jan
        Kocka\",\"firstname\":\"Jan\",\"surname\":\"Kocka\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Kabir
        Husain\",\"firstname\":\"Kabir\",\"surname\":\"Husain\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"Jaime
        Agudo-Canalejo\",\"firstname\":\"Jaime\",\"surname\":\"Agudo-Canalejo\",\"affiliationIds\":[\"a1\"]}],\"affiliations\":[{\"name\":\"Department
