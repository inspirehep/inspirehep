        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article\u2019s
        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Physical running
        of the electric charge in a dimensionless theory of gravity\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Formal
        aspects of field theory, field theory in curved space\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Utilizing
        comprehensive experimental data on charmed mesons, we systematically investigate
        masses of the higher radial and orbital excitations of the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>D</mi></math> and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>D</mi><mi>s</mi></msub></math> meson families
        using the relativistic flux-tube model. Our study employs mass splitting induced
        by spin-dependent interactions within the j-j coupling scheme. Our predicted
        masses align well with the experimental measurements for the well-established
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>D</mi></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>D</mi><mi>s</mi></msub></math>
        states. However, anomalous resonances such as <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>D</mi><mrow><mi>s</mi><mn>0</mn></mrow></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>2317</mn><mo stretchy=\\\"false\\\">)</mo></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>D</mi><mrow><mi>s</mi><mn>1</mn></mrow></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>2460</mn><mo stretchy=\\\"false\\\">)</mo></math>
        do not align with conventional meson states within our theoretical framework.
        We also study strong decays using an effective Lagrangian formalism that combines
        heavy-quark symmetry with chiral dynamics, focusing on two-body modes into
        a charmed meson plus a light pseudoscalar (<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03C0</mi></math>, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>K</mi></math>, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03B7</mi></math>). Using the combined constraints
        from masses and decay patterns we propose spectroscopic assignments for several
        recently observed resonances, including <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>D</mi><mn>2</mn></msub><mo stretchy=\\\"false\\\">(</mo><mn>2740</mn><msup><mo
        stretchy=\\\"false\\\">)</mo><mn>0</mn></msup></math>, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msubsup><mi>D</mi><mn>3</mn><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>2750</mn><mo stretchy=\\\"false\\\">)</mo></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>D</mi><mn>0</mn></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>2550</mn><msup><mo stretchy=\\\"false\\\">)</mo><mn>0</mn></msup></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msubsup><mi>D</mi><mn>1</mn><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>2600</mn><msup><mo stretchy=\\\"false\\\">)</mo><mn>0</mn></msup></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msubsup><mi>D</mi><mn>1</mn><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>2760</mn><msup><mo stretchy=\\\"false\\\">)</mo><mn>0</mn></msup></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msubsup><mi>D</mi><mi>J</mi><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>3000</mn><mo stretchy=\\\"false\\\">)</mo></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>D</mi><mi>J</mi></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>3000</mn><mo stretchy=\\\"false\\\">)</mo></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msubsup><mi>D</mi><mn>2</mn><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>3000</mn><mo stretchy=\\\"false\\\">)</mo></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msubsup><mi>D</mi><mrow><mi>s</mi><mn>1</mn></mrow><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>2860</mn><msup><mo stretchy=\\\"false\\\">)</mo><mo>\xB1</mo></msup></math>,
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msubsup><mi>D</mi><mrow><mi>s</mi><mn>3</mn></mrow><mo>*</mo></msubsup><mo
        stretchy=\\\"false\\\">(</mo><mn>2860</mn><msup><mo stretchy=\\\"false\\\">)</mo><mo>\xB1</mo></msup></math>.
        We also identify <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi>D</mi><mrow><mi>s</mi><mi>J</mi></mrow></msub><mo
        stretchy=\\\"false\\\">(</mo><mn>3040</mn><msup><mo stretchy=\\\"false\\\">)</mo><mo>+</mo></msup></math>
        as a <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mn>2</mn><mi>P</mi></math>
        excitation with <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msup><mi>J</mi><mi>P</mi></msup><mo>=</mo><msup><mn>1</mn><mo>+</mo></msup></math>.
        Extending our model, we also calculate the mass spectra of doubly charmed
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi
        mathvariant=\\\"normal\\\">\u039E</mi><mrow><mi>c</mi><mi>c</mi></mrow></msub></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><msub><mi
        mathvariant=\\\"normal\\\">\u03A9</mi><mrow><mi>c</mi><mi>c</mi></mrow></msub></math>
        baryons within the heavy diquark\u2013light quark picture. These theoretical
        predictions provide crucial guidance for ongoing and future experimental searches
        for higher radial and orbital excitations in the charmed meson and doubly
        charmed baryon sectors.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Pooja
