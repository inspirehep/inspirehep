        Rev. B\",\"name\":\"Physical Review B\"},\"title\":{\"value\":\"Real critical
        exponents from the <i>\u03B5</i>-expansion in an interacting <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>U</mi><mo>(</mo><mn>1</mn><mo>)</mo></mrow></math>
        model with non-Hermitian <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>Z</mi><mn>4</mn></msub></math>
        anisotropy\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Electronic structure
        and strongly correlated systems\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>The
        ultrafast magnetization dynamics of an epitaxial <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mrow><mi>Fe</mi><mo>/</mo><mi>CoO</mi></mrow></math>
        bilayer on Ag(001) is examined in an element-resolved way by resonant soft-x-ray
        reflectivity. The transient magnetic linear dichroism at the Co <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>L</mi><mn>2</mn></msub></math> edge and the
        magnetic circular dichroism at the Fe <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>L</mi><mn>3</mn></msub></math> edge measured
        in reflection in a pump\u2013probe experiment with 120\_fs temporal resolution
        show the loss of antiferromagnetic and ferromagnetic order in CoO and Fe,
        respectively, both within 300\_fs after excitation with 60\_fs light pulses
        of 800 and 400\_nm wavelengths. A comparison to spin-dynamics simulations
        using an atomistic spin model shows that direct energy transfer from the laser-excited
        electrons in Fe to the magnetic moments in CoO provides the dominant demagnetization
        channel in the case of 800-nm excitation.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Chowdhury
