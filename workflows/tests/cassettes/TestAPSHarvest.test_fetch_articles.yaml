        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Nonfactorizing
        interface in the two-dimensional long-range Ising model\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Formal
        aspects of field theory, field theory in curved space\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>The
        postinflationary production of supermassive particles can have profound implications
        for the thermal history of the Universe and may leave observable imprints
        in the gravitational wave (GW) background. In scenarios where the inflaton
        couples predominantly to heavy fields, say right-handed neutrinos (RHNs),
        nonperturbative mechanisms such as parametric resonance can lead to their
        efficient production, even when their masses exceed the inflaton mass. Once
        produced, the RHNs emit gravitons through bremsstrahlung as they decay into
        the Standard Model (SM) particles via <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>N</mi><mo stretchy=\\\"false\\\">\u2192</mo><mo>\u2113</mo><mo>+</mo><mi>H</mi></math>,
        enabled by the unavoidable minimal coupling to gravity, sourcing a stochastic
        GW background. We study this mechanism within the framework of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mi>\u03B1</mi></math>-attractor inflationary models,
        highlighting how the resulting GW spectrum carries indirect imprints of the
        heavy sector and the postinflationary dynamics. This offers an observational
        window into otherwise inaccessible supermassive particles and provides a powerful
        probe of high-scale physics beyond the SM.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Shinya
