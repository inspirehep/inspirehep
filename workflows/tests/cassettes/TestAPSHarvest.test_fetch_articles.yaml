        stretchy=\\\"false\\\">\u2192</mo><msup><mi>\u03B7</mi><mo>\u2032</mo></msup><mi>\u03B3</mi></math>
        form factors to NNLO accuracy in perturbative QCD\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Phenomenological
        aspects of field theory, general methods\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>Inhomogeneous
        domain nucleation and stochastic motion of the domain wall (DW) during the
        polarization switching process in conventional ferroelectrics introduce a
        spectrum of intricate kinetic challenges for the reliable and precise manipulation
        of polarization states, a prerequisite for many ferroelectric implementations.
        Combining deep-learning-assisted molecular dynamics simulations, microscopic-scale
        <i>in\_situ</i> observations, and device-scale electrical measurements, it
        reveals that sliding ferroelectrics inherently circumvent these issues, with
        an intrinsic domain-nucleation-free polarization reversal. Using <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mrow><mrow><mn>3</mn><mi>R</mi></mrow><mtext>\u2212</mtext><msub><mrow><mi>MoS</mi></mrow><mrow><mn>2</mn></mrow></msub></mrow></math>
        as a model system, we demonstrate that DW motion occurs along a well-defined
        1D pathway in a collective manner, without domain nucleation. Leveraging this
        predictable domain dynamics, we demonstrate deterministic multistate polarization
        switching, achieving remarkable precision and repeatability with a variation
        coefficient of less than 0.2%, 10 times improved over conventional ferroelectrics.
        This work provides valuable insights into the unique kinetics of DW motion
        in sliding ferroelectrics and offers opportunities for ferroelectric multistate
        devices with ultraprecision control.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Jiangang
