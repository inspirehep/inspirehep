      string: "{\"data\":[{\"abstract\":{\"value\":\"<p>Perhaps the simplest approach
        to constructing models with subdimensional particles or fractons is to require
        the conservation of dipole or higher multipole moments. We generalize this
        approach to allow for moments in phase space and classify all possible classical
        fracton models with phase-space multipole conservation laws. We focus on a
        new self-dual model that conserves both dipole and quadrupole moments in position
        and momentum; we analyze its dynamics and find quasiperiodic orbits in phase
        space that evade ergodic exploration of the full phase space.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"Ylias
        Sadki\",\"firstname\":\"Ylias\",\"surname\":\"Sadki\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Abhishodh
        Prakash\",\"firstname\":\"Abhishodh\",\"surname\":\"Prakash\",\"affiliationIds\":[\"a1\",\"a2\"]},{\"type\":\"Person\",\"name\":\"S.\u2009L.
        Sondhi\",\"firstname\":\"S.\u2009L.\",\"surname\":\"Sondhi\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Daniel
        P. Arovas\",\"firstname\":\"Daniel P.\",\"surname\":\"Arovas\",\"affiliationIds\":[\"a3\"]}],\"affiliations\":[{\"name\":\"Rudolf
        Peierls Centre for Theoretical Physics, <a href=\\\"https://ror.org/052gg0110\\\">University
        of Oxford</a>, Oxford OX1 3PU, United Kingdom\",\"id\":\"a1\"},{\"name\":\"<a
        href=\\\"https://ror.org/0165d9303\\\">Harish-Chandra Research Institute</a>,
        Prayagraj (Allahabad) 211019, India\",\"id\":\"a2\"},{\"name\":\"Department
        of Physics, <a href=\\\"https://ror.org/0168r3w48\\\">University of California
        at San Diego</a>, La Jolla, California 92093, USA\",\"id\":\"a3\"}],\"notes\":[{\"format\":\"html\",\"value\":\"<p>Contact
