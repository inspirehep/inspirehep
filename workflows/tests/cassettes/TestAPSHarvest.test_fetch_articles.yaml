        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"From
        chaotic itinerancy to intermittent synchronization in complex networks\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>Determining
        the weak charge form factor, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>F</mi><mi>W</mi></msub><mo stretchy=\\\"false\\\">(</mo><msup><mi>Q</mi><mn>2</mn></msup><mo
        stretchy=\\\"false\\\">)</mo></math>, of nuclei over a continuous range of
        momentum transfers, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mn>0</mn><mo>\u2272</mo><msup><mi>Q</mi><mn>2</mn></msup><mo>\u2272</mo><mn>0.1</mn><mtext>\u2009</mtext><mtext>\u2009</mtext><msup><mrow><mi>GeV</mi></mrow><mrow><mn>2</mn></mrow></msup></math>,
        is essential for mapping out the distribution of neutrons in nuclei. The neutron
        density distribution has significant implications for a broad range of areas,
        including studies of nuclear structure, neutron stars, and physics beyond
        the Standard Model. Currently, our knowledge of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msub><mi>F</mi><mi>W</mi></msub><mo stretchy=\\\"false\\\">(</mo><msup><mi>Q</mi><mn>2</mn></msup><mo
        stretchy=\\\"false\\\">)</mo></math> comes primarily from fixed target experiments
        that measure the parity-violating asymmetry in coherent elastic electron-ion
        scattering. Fixed target experiments, such as CREX and PREX-1,2, have provided
        high-precision weak charge form factor extractions for the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><mrow><mmultiscripts><mrow><mi>Ca</mi></mrow><mprescripts></mprescripts><none></none><mrow><mn>48</mn></mrow></mmultiscripts></mrow></math>
        and <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mrow><mmultiscripts><mrow><mi>Pb</mi></mrow><mprescripts></mprescripts><none></none><mrow><mn>208</mn></mrow></mmultiscripts></mrow></math>
        nuclei, respectively. However, a major limitation of fixed target experiments
        is that they each provide data only at a single value of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>Q</mi><mn>2</mn></msup></math>. With the
        proposed electron-ion collider (EIC) on the horizon, we explore its potential
        to impact the determination of the weak charge form factor. While it cannot
        compete with the precision of fixed target experiments, it can provide data
        over a wide and continuous range of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>Q</mi><mn>2</mn></msup></math> values, and
        for a wide variety of nuclei. We show that with data corresponding to an integrated
        luminosity of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi
        mathvariant=\\\"script\\\">L</mi><mo>\u223C</mo><mn>500</mn><mo>/</mo><mi>A</mi><mtext>\u2009</mtext><mtext>\u2009</mtext><mrow><msup><mrow><mi>fb</mi></mrow><mrow><mo>\u2212</mo><mn>1</mn></mrow></msup></mrow></math>,
        where <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\" display=\\\"inline\\\"><mi>A</mi></math>
        is the nucleus atomic weight, the EIC can significantly impact constraints
        by lifting degeneracies in theoretical models of the neutron density distribution.
        Ensuring EIC detector coverage at low <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
        display=\\\"inline\\\"><msup><mi>Q</mi><mn>2</mn></msup></math> and large
        negative pseudorapidities will be essential for such <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"
