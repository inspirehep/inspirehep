        title, journal citation, and DOI. Funded by SCOAP<sup>3</sup>.\"}]},\"journal\":{\"id\":\"PRD\",\"abbreviatedName\":\"Phys.
        Rev. D\",\"name\":\"Physical Review D\"},\"title\":{\"value\":\"Extended inert
        doublet model with low scale seesaw mechanisms\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Beyond
        the standard model\"},\"volume\":{\"number\":\"113\"}},{\"abstract\":{\"value\":\"<p>We
        show how to construct Hamiltonian lattice theories with one exact supersymmetry
        on arbitrary triangulations of curved space in any number of dimensions. Both
        bosons and fermions satisfy discrete K\xE4hler-Dirac equations. The quantization
        of the fermions proceeds by imposing conventional anticommutation relations
        while the bosons require a modification of the usual canonical commutator.
        On regular lattices we construct parity, time reversal and translation-by-one
        (shift) symmetries. We argue that the latter are generically noninvertible
        symmetries. We also show how to couple these degrees of freedom to background
        gauge fields which leads to a theory with enhanced supersymmetry.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"David
        Berenstein\",\"firstname\":\"David\",\"surname\":\"Berenstein\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Simon
        Catterall\",\"firstname\":\"Simon\",\"surname\":\"Catterall\",\"affiliationIds\":[\"a2\"]}],\"affiliations\":[{\"name\":\"Department
        of Physics, <a href=\\\"https://ror.org/02t274463\\\">University of California,
        Santa Barbara</a>, California 93106, USA\",\"id\":\"a1\"},{\"name\":\"Department
        of Physics, <a href=\\\"https://ror.org/025r5qe02\\\">Syracuse University</a>,
        Syracuse, New York 13244, USA\",\"id\":\"a2\"}],\"date\":\"2026-03-26\",\"fundings\":[{\"funderId\":\"http://dx.doi.org/10.13039/100000015\",\"funderName\":\"U.S.
        Department of Energy\",\"awards\":[\"DE-SC 0011702\",\"DE-SC-0009998\"]}],\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-26T12:31:14+0000\",\"last_modified_at\":\"2026-03-26T12:31:14+0000\",\"id\":\"10.1103/z3qg-nlxc\",\"identifiers\":{\"doi\":\"10.1103/z3qg-nlxc\",\"arxiv\":\"arXiv:2509.08885\"},\"issue\":{\"number\":\"5\"},\"pageStart\":\"054513\",\"hasArticleId\":true,\"numPages\":9,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"81b06dce-2254-4dd1-99ad-cf1e3db77cdf\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"639669e6-7ffb-474f-8aea-0bfb5175c495\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"2eb80948-a4d0-4b3c-b196-1e722da4c96f\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"8999260c-1728-4643-8a2d-0f5b6012664d\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false}],\"disciplines\":[\"9f5c878e-b7b7-4030-bdb9-21a24ad97422\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
