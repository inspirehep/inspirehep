        author: f.wilhelm-mauch@fz-juelich.de</p>\",\"label\":\"\u2020\",\"id\":\"n2\",\"type\":\"contrib\"}],\"date\":\"2026-03-26\",\"type\":\"article\",\"metadata_last_modified_at\":\"2026-03-26T12:46:08+0000\",\"last_modified_at\":\"2026-03-26T12:46:08+0000\",\"id\":\"10.1103/86jt-by9x\",\"identifiers\":{\"doi\":\"10.1103/86jt-by9x\"},\"issue\":{\"number\":\"3\"},\"pageStart\":\"032623\",\"hasArticleId\":true,\"numPages\":19,\"classificationSchemes\":{\"physh\":{\"concepts\":[{\"id\":\"c9f142c1-4ecb-437a-8586-97957a1ebdba\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"f464ad01-629c-41f3-98bc-195c920e4d42\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":true},{\"id\":\"6beb8b63-e263-43d9-a1f6-2d9ddead05e5\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false},{\"id\":\"076ac9ef-5d09-42b3-a0ea-b99b6ab4f5df\",\"facet\":{\"id\":\"bdb1ef91-b776-4e36-8f8f-3e93666bac1e\"},\"primary\":false}],\"disciplines\":[\"510fc218-8774-4547-ab09-fc6cef0c9a03\"]}},\"publisher\":{\"name\":\"APS\"},\"rights\":{\"rightsStatement\":\"Published
