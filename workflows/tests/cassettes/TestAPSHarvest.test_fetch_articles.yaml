        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRRESEARCH\",\"abbreviatedName\":\"Phys.
        Rev. Research\",\"name\":\"Physical Review Research\"},\"title\":{\"value\":\"Geometric
        criticality in scale-invariant networks\",\"format\":\"html\"},\"volume\":{\"number\":\"8\"}},{\"abstract\":{\"value\":\"<p>The
        terminology \u201Caltermagnetism\u201D has recently been adopted to describe
        collinear magnetic order with no net magnetization and nonrelativisitic, momentum-dependent
        spin splitting. The archetypal material used to theoretically explore altermagnetism
        is <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>RuO</mi><mn>2</mn></msub></math>,
        but there has been significant debate as to whether <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>RuO</mi><mn>2</mn></msub></math>
        possesses magnetic, let alone altermagnetic, order. To address questions surrounding
        the nature of magnetism in <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>RuO</mi><mn>2</mn></msub></math>,
        we combine symmetry-sensitive torque magnetometry and magnetization measurements
        in single crystals up to 31 T. The data are inconsistent with collinear magnetic
        order possessing a N\xE9el vector along the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>c</mi></math>
        axis. Torque magnetometry further demonstrates an isotropic, field-independent
        magnetic susceptibility within the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>a</mi><mi>b</mi></mrow></math>
        plane, indicative of neither a N\xE9el vector within the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>a</mi><mi>b</mi></mrow></math>
        plane nor a field-induced N\xE9el vector reorientation. Magnetic quantum oscillations
        from both techniques reveal a nearly spherical Fermi surface pocket at the
        Brillouin zone center, in agreement with paramagnetic electronic structure
        calculations. Taken together, these data indicate that high-quality <math
        xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>RuO</mi><mn>2</mn></msub></math>
        single crystals are itinerant paramagnets with no detectable long-range magnetic
        order and, by extension, no altermagnetism.</p>\",\"format\":\"html\"},\"articleType\":\"letter\",\"authors\":[{\"type\":\"Person\",\"name\":\"Tiema
        Qian\",\"firstname\":\"Tiema\",\"surname\":\"Qian\",\"affiliationIds\":[\"a1\"]},{\"type\":\"Person\",\"name\":\"Aya
