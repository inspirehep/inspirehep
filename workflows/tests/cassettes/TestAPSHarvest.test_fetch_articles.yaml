        Rev. Lett.\",\"name\":\"Physical Review Letters\"},\"title\":{\"value\":\"Element-Selective
        Probing of Ultrafast Ferromagnetic-Antiferromagnetic Order Dynamics in Fe/CoO
        Bilayers\",\"format\":\"html\"},\"tocSection\":{\"label\":\"Condensed Matter
        and Materials\"},\"volume\":{\"number\":\"136\"}},{\"abstract\":{\"value\":\"<p>This
        paper reports on high-precision measurements of terbium half-lives and cross-section\_data
        using <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03B1</mi></math>
        beams on natural europium targets. Energy uncertainties have been minimized
        through accurate measurement of the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03B1</mi></math>-beam
        energy and high-precision cross sections\_obtained by a combination of foil
        thickness characterization, two independent measurement and acquisition systems,
        and careful monitoring of the irradiated foils over at least four weeks. This
        has resulted in the most precise cross-section\_data to-date for natural europium
        targets with <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mi>\u03B1</mi></math>
        beams in the 25\u201340 MeV range. <span class=\\\"sc\\\">talys</span>-2.0
        calculations have been performed, and comparisons made with other available
        cross-section\_data, with good agreement attained. Half-lives with increased
        precision for <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mmultiscripts><mi>Tb</mi><mprescripts></mprescripts><none></none><mrow><mn>152</mn></mrow></mmultiscripts><mo>(</mo><mtext>g.s.</mtext><mo>)</mo></mrow></math>,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mmultiscripts><mi>Tb</mi><none></none><mrow><mi>m</mi><mn>1</mn></mrow><mprescripts></mprescripts><none></none><mn>152</mn></mmultiscripts><mo>(</mo><mtext>g.s.</mtext><mo>)</mo></mrow><mo>,</mo><mo>\_</mo><mrow><mmultiscripts><mi>Tb</mi><mprescripts></mprescripts><none></none><mn>153</mn></mmultiscripts><mo>(</mo><mtext>g.s.</mtext><mo>)</mo></mrow><mo>,</mo><mo>\_</mo><mmultiscripts><mi>Tb</mi><none></none><mrow><mi>m</mi><mn>1</mn></mrow><mprescripts></mprescripts><none></none><mn>154</mn></mmultiscripts><mo>,</mo><mo>\_</mo><mmultiscripts><mi>Tb</mi><none></none><mrow><mi>m</mi><mn>2</mn></mrow><mprescripts></mprescripts><none></none><mn>154</mn></mmultiscripts></math>,
