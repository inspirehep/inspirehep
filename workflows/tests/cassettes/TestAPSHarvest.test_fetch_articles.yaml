        by the American Physical Society under the terms of the <a href=\\\"https://creativecommons.org/licenses/by/4.0/\\\">Creative
        Commons Attribution 4.0 International</a> license. Further distribution of
        this work must maintain attribution to the author(s) and the published article's
        title, journal citation, and DOI.\"}]},\"journal\":{\"id\":\"PRXQUANTUM\",\"abbreviatedName\":\"PRX
        Quantum\",\"name\":\"PRX Quantum\"},\"title\":{\"value\":\"Optimal Randomized
        Measurements for a Family of Nonlinear Quantum Properties\",\"format\":\"html\"},\"volume\":{\"number\":\"7\"}},{\"abstract\":{\"value\":\"<p>A
        new model based on the relativistic Boltzmann equation\_in the isotropization
        time approximation is developed to investigate the collective behavior of
        the quark-gluon plasma produced in high-energy heavy-ion collisions. The equation\_is
        solved in <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mo>(</mo><mn>2</mn><mo>+</mo><mn>2</mn><mo>)</mo><mi
        mathvariant=\\\"normal\\\">D</mi></mrow></math> (two spatial and two momentum-space
        dimensions). This framework couples preequilibrium dynamics with hydrodynamic
        evolution to simulate the dynamics of quasiparticle evolution. A numerical
        scheme based on the method of characteristics enables the evolution to begin
        from a specified initial Boltzmann distribution. In this work, the spatial
        structure of the initial distribution is modeled using the <span class=\\\"sc\\\">Trento</span>
        framework. Our results show that a medium initialized at <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>\u03C4</mi><mn>0</mn></msub></math>
        on the order of <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mn>1</mn><mspace
        width=\\\"0.16em\\\"></mspace><mi>fm</mi><mo>/</mo><mi>c</mi></mrow></math>
        with a small shear viscosity to entropy density ratio (<math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03B7</mi><mo>/</mo><mi>s</mi><mo>=</mo><mn>0.008</mn></mrow></math>)
        evolves consistently with hydrodynamic simulations, such as those performed
        using the <span class=\\\"sc\\\">vish</span>2+1 code, while discrepancies
        arise for a medium with <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03B7</mi><mo>/</mo><mi>s</mi><mo>=</mo><mn>0.8</mn></mrow></math>.
        Furthermore, when initialized with a highly anisotropic momentum distribution
        in the longitudinal direction at early times, the system exhibits spatially
        nonuniform thermalization in the transverse plane, leading to the emergence
        of a nontrivial hypersurface that marks the onset of hydrodynamic applicability.
        Finally, we compute the <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><msub><mi>p</mi><mi>T</mi></msub></math>-spectra
        for a nonfluctuating initial condition using the hybrid version of <span class=\\\"sc\\\">CoMBolt-ITA</span>.
        In this hybrid setup, the description is switched from quasiparticles to hadrons,
        and <span class=\\\"sc\\\">UrQMD</span> is used to model the hadron gas dynamics.
        We compare these results with those obtained from the hybrid <span class=\\\"sc\\\">vish</span>2+1
        initialized within the same setup. For a small shear viscosity, <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03B7</mi><mo>/</mo><mi>s</mi><mo>=</mo><mn>0.08</mn></mrow></math>,
        the two results show a good level of consistency, whereas for a larger value,
        <math xmlns=\\\"http://www.w3.org/1998/Math/MathML\\\"><mrow><mi>\u03B7</mi><mo>/</mo><mi>s</mi><mo>=</mo><mn>0.8</mn></mrow></math>,
        a noticeable discrepancy emerges.</p>\",\"format\":\"html\"},\"articleType\":\"article\",\"authors\":[{\"type\":\"Person\",\"name\":\"S.
