        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2407.08799</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>P\xF6gel</keyname>\n                        <forenames>Sebastian</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Wang</keyname>\n
        \                       <forenames>Xing</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Weinzierl</keyname>\n
        \                       <forenames>Stefan</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Wu</keyname>\n                        <forenames>Konglong</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Xu</keyname>\n
        \                       <forenames>Xiaofeng</forenames>\n                </author>\n
        \       </authors>\n        <title>Self-dualities and Galois symmetries in
        Feynman integrals</title>\n            <categories>hep-th hep-ph math-ph math.MP</categories>\n
        \           <comments>41 pages, v2: version to be published, v3: additional
        acknowledgement for financial support added</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>It is well-known that all Feynman integrals within a
        given family can be expressed as a finite linear combination of master integrals.
        The master integrals naturally group into sectors. Starting from two loops,
        there can exist sectors made up of more than one master integral. In this
        paper we show that such sectors may have additional symmetries. First of all,
        self-duality, which was first observed in Feynman integrals related to Calabi--Yau
        geometries, often carries over to non-Calabi--Yau Feynman integrals. Secondly,
        we show that in addition there can exist Galois symmetries relating integrals.
        In the simplest case of two master integrals within a sector, whose definition
        involves a square root $r$, we may choose a basis $(I_1,I_2)$ such that $I_2$
        is obtained from $I_1$ by the substitution $r \\rightarrow -r$. This pattern
        also persists in sectors, which a priori are not related to any square root
        with dependence on the kinematic variables. We show in several examples that
        in such cases a suitable redefinition of the integrals introduces constant
        square roots like $\\sqrt{3}$. The new master integrals are then again related
        by a Galois symmetry, for example the substitution $\\sqrt{3} \\rightarrow
        -\\sqrt{3}$. To handle the case where the argument of a square root would
        be a perfect square we introduce a limit Galois symmetry. Both self-duality
        and Galois symmetries constrain the differential equation.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
