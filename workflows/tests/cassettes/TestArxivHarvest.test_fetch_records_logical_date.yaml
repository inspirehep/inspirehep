        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20440</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Inzunza</keyname>\n                        <forenames>Luis</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Guilarte</keyname>\n
        \                       <forenames>Juan Mateos</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Pais</keyname>\n                        <forenames>Pablo</forenames>\n
        \               </author>\n        </authors>\n        <title>Confining kinks.
        $\u03B6$-regularized one-loop kink mass shifts in exotic field theories</title>\n
        \           <categories>hep-th math-ph math.MP</categories>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>By combining stability analysis of scalar field theories
        with the Darboux transformation technique, we create models featuring kink-like
        solutions whose quantum perturbations are all bounded. On the one hand, the
        stability analysis relates scalar theories with Schr\xF6dinger equations,
        whose solutions serve as quantum perturbation modes. On the other hand, the
        Darboux transformation allows for constructing new exotic but solvable Schr\xF6dinger
        equations. This framework relates the quantum harmonic oscillator and its
        rational deformations to exotic scalar theories featuring non-trivial potentials.
        Depending on the structure of the spectrum of perturbation frequencies, these
        potentials may have various local maximums, minimums, and inflection points.
        The stationary solutions take the form of the definite integral over a finite
        interval of a function times the Gaussian bell distribution, including the
        Error and the Owen $T$ functions. Such models do not propagate quantum perturbations
        around the respective vacuums, so zero-point renormalization does not take
        place. However, Riemann$-\u03B6$ function regularization allows us to achieve
        finite one-loop quantum corrections to the classical mass.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20462</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20462</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Terashima</keyname>\n
        \                       <forenames>Seiji</forenames>\n                </author>\n
        \       </authors>\n        <title>Stretched Horizon Dissipation and the Fate
        of Echoes</title>\n            <categories>hep-th gr-qc</categories>\n            <comments>18
        pages, 2 figures</comments>\n            <report-no>YITP-25-95</report-no>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We examine the dissipation of infalling particles near
        black holes under the assumption that the equivalence principle breaks down
        at the stretched horizon. This violation allows partial reflection of particles
        just outside the event horizon, as suggested by models such as the fuzzball
        and firewall proposals. We show that scattering with blue-shifted Hawking
        radiation leads to moderate dissipation when the particle energy is comparable
        to the Hawking temperature. The decay rate is independent of the Planck mass,
        and therefore gravitational wave echoes-arising from such partial reflection-may
        survive despite the presence of quantum gravitational effects. Our result
        is universal and does not rely on the detailed microphysics of the horizon.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20500</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \           <setSpec>physics:nucl-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20500</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Abbasi</keyname>\n
        \                       <forenames>Navid</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Kaminski</keyname>\n
        \                       <forenames>Matthias</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Rischke</keyname>\n
        \                       <forenames>Dirk H.</forenames>\n                </author>\n
        \       </authors>\n        <title>Comparison between Causal and Acausal Diffusion:
        a Schwinger-Keldysh Effective Field Theory Perspective</title>\n            <categories>hep-th
        cond-mat.stat-mech cond-mat.str-el nucl-th</categories>\n            <comments>31
        pages, 12 figures, 1 table</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In Fick&#39;s time-honored theory of diffusion, the
        system responds instantaneously to external perturbations, resulting in acausal
        behavior. Maxwell-Cattaneo theory addresses this issue by introducing a relaxation
        time, rendering the diffusion process causal. We focus on systems where this
        relaxation time is comparable to the diffusion time and significantly larger
        than the relaxation times of all other non-conserved operators. In such systems,
        late-time diffusion is influenced by this relaxation process, leading to a
        theory of quasi-diffusion. Using the Schwinger-Keldysh Effective Field Theory
        (SK-EFT) framework, we compare the theories of diffusion and quasi-diffusion
        by analyzing the real-time dynamics of correlation functions both in linear
        response and at one-loop order. In particular, we show that the one-loop corrections
        in the causal (quasi-diffusion) theory, in both the underdamped and the overdamped
        cases, are governed by two universal functions. In the overdamped case, the
        behavior mirrors that of the acausal (diffusion) theory, which has recently
        been applied for precision tests of SK-EFT in diffusive systems. We suggest
        that our results in the underdamped limit can also be used for precision tests
        in quasi-diffusive systems.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20517</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20517</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Sailis</keyname>\n
        \                       <forenames>Fabio</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Castro-Alvaredo</keyname>\n
        \                       <forenames>Olalla A.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Negro</keyname>\n                        <forenames>Stefano</forenames>\n
        \               </author>\n        </authors>\n        <title>Complete Minimal
        Form Factors for Irrelevant Deformations of Integrable Quantum Field Theory</title>\n
        \           <categories>hep-th math-ph math.MP</categories>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this paper, we present a method to compute the minimal
        form factors of diagonal integrable field theories perturbed by generalized
        $T \\bar{T}$ perturbations. Building on existing results by the same authors,
        these MFFs are constructed in such a way as not to allow for any free parameters,
        an issue that plagued previous solutions. The MFFs are derived from a generalization
        of the standard integral representation which has been used since the birth
        of the form factor bootstrap program. Their asymptotics is characterized by
        exponential decay at large rapidities. By computing higher particle form factors,
        we find that any natural higher-particle solutions involve the cancellation
        of parts of the newly found MFF. We conclude that the assumption that the
        form factor equations, particularly the kinematic residue equation, remain
        unchanged in the presence of $T \\bar{T}$ perturbations, is too strong. There
        is a trade-off between having MFFs satisfying desirable analyticity and asymptotic
        properties and finding analytic solutions to the form factor equations, which
        is likely solved by nontrivial changes to the form factor equations, especially
        those where locality or semilocality of fields are essential assumptions.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20526</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:math-ph</setSpec>\n            <setSpec>math:math:MP</setSpec>\n
        \           <setSpec>physics:nucl-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20526</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Samad</keyname>\n
        \                       <forenames>Gohin Shaikh</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Polyzou</keyname>\n
        \                       <forenames>W. N.</forenames>\n                </author>\n
        \       </authors>\n        <title>Reflection positivity in Euclidean formulations
        of relativistic quantum mechanics of particles</title>\n            <categories>hep-th
        math-ph math.MP nucl-th</categories>\n            <comments>22 pages</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>This paper discusses the general structure of reflection
        positive Euclidean covariant distributions that can be used to construct Euclidean
        representations of relativistic quantum mechanical models of systems of a
        finite number of degrees of freedom. Because quantum systems of a finite number
        of degrees of freedom are not local, reflection positivity is not as restrictive
        as it is in a local field theory. The motivation for the Euclidean approach
        is that it is straightforward to construct exactly Poincar\xE9 invariant quantum
        models of finite number of degrees of freedom systems that satisfy cluster
        properties and a spectral condition. In addition the quantum mechanical inner
        product can be computed without requiring an analytic continuation. Whether
        these distributions can be generated by a dynamical principle remains to be
        determined, but understanding the general structure of the Euclidean covariant
        distributions is an important first step.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20528</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20528</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Miyashita</keyname>\n                        <forenames>Shoichiro</forenames>\n
        \               </author>\n        </authors>\n        <title>Many phases
        in a hairy box in three dimensions</title>\n            <categories>gr-qc
        hep-th</categories>\n            <comments>23 pages, many figures; Invited
        contribution to the Special Issue on &#34;Celebrating the 110th Anniversary
        of General Relativity: Advances, Challenges and Perspectives&#34; in Universe</comments>\n
        \           <journal-ref>Universe 11 (2025) 208</journal-ref>\n            <doi>10.3390/universe11070208</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In this paper, I investigate gravitational thermodynamics
        of the Einstein-Maxwell-scalar system in three dimensions without a cosmological
        constant. In the previous work by Krishnan,Shekhar, and Bala Subramanian (Nucl.
        Phys. B 958 (2020) 115115 [33]), it was argued that this system has no BH
        saddles, but has only empty (flat space) saddles and boson star saddles. It
        was then concluded that the structure of the thermodynamic phase space is
        much simpler than in the higher dimensional cases. I will show that, in addition
        to the known boson star and empty saddles, three more types of saddles exist
        in this system: the BG saddle, its hairy generalization, and a novel configuration
        called the boson star-PL saddle. As a result, the structure is richer than
        one might naively expect and is very similar to the higher dimensional ones.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20538</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:astro-ph:CO</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20538</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Iarygina</keyname>\n                        <forenames>Oksana</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Sfakianakis</keyname>\n
        \                       <forenames>Evangelos I.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Brandenburg</keyname>\n
        \                       <forenames>Axel</forenames>\n                </author>\n
        \       </authors>\n        <title>Schwinger effect in axion inflation on
        a lattice</title>\n            <categories>astro-ph.CO hep-ph hep-th</categories>\n
        \           <comments>6 pages, 4 figures</comments>\n            <report-no>NORDITA-2025-030</report-no>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We present the first lattice simulations of the nonlinear
        evolution after axion inflation by self-consistently incorporating currents
        arising from Schwinger pair production. The tachyonically amplified gauge
        fields trigger the growth of Schwinger currents, leading to universal values
        for the conductivity and magnetic field at the onset of strong backreaction
        and subsequent quenching of gauge field production. We show that the Schwinger
        effect (prematurely) saturates gauge field production, thereby diminishing
        the prospects of axion inflation magnetogenesis as a viable solution for blazar
        observations.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.20542</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20542</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Anous</keyname>\n                        <forenames>Tarek</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Hofman</keyname>\n
        \                       <forenames>Diego M.</forenames>\n                </author>\n
        \       </authors>\n        <title>The Phases of Chaos</title>\n            <categories>hep-th</categories>\n
        \           <comments>32 pages (+ 26 pages of appendices), 10 figures</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We develop a novel physical picture to understand certain
        universal properties of the GUE matrix model which are typically ascribed
        to quantum chaos, i.e. the ramp and the plateau. We argue that these features
        should instead be associated with a pattern of spontaneous (or weak explicit)
        symmetry breaking. In this language, the GUE matrix model corresponds to an
        effective theory that describes the symmetry-broken phase, and where the Hermitian
        matrix of the GUE should be understood as a massive $\u03C3$ field. The physics
        of this symmetry-broken phase governs certain particular features of the ramp
        such as its length and shape. However, the simple existence of a ramp is more
        universal and phase independent; it is related to sum rules obeyed by a large
        class of matrix models that constrain the interpolation to the plateau regime.
        Finally, the plateau is controlled by the symmetry-restored phase, which we
        call confined chaos.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20547</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20547</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Cotler</keyname>\n                        <forenames>Jordan</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Jensen</keyname>\n
        \                       <forenames>Kristan</forenames>\n                </author>\n
        \       </authors>\n        <title>Norm of the no-boundary state</title>\n
        \           <categories>hep-th gr-qc</categories>\n            <comments>36+9
        pages, 6 figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We consider Einstein gravity with positive cosmological
        constant coupled to matter in an asymptotically de Sitter universe with sphere
        boundary at timelike infinity. In this setting we show that, to one-loop order
        and at late time, the norm of the no-boundary state vanishes, going as $ e^{S_0}
        \\frac{Z S_0^{-d(d+1)/4}}{\\text{vol}(SO(d,1))}$ with $S_0$ the tree-level
        entropy of the static patch, $d$ the spacetime dimension, and $Z$ non-negative.
        While we expect a non-zero norm to arise at two loops, the presence of an
        observer already stabilizes it to a large, finite value at one loop.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20580</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20580</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Okada</keyname>\n
        \                       <forenames>Nobuchika</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Raut</keyname>\n                        <forenames>Digesh</forenames>\n
        \               </author>\n        </authors>\n        <title>Analytic formulation
        of Leptogenesis with neutrino oscillation data employing the general parametrization
        for neutrino mass matrix</title>\n            <categories>hep-ph hep-th</categories>\n
        \           <comments>20 pages with references, 10 Figures, 2 Tables</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The observed neutrino oscillations and baryon asymmetry,
        unexplained by the Standard Model (SM), can both be accounted for by extending
        the SM to include Majorana right-handed neutrinos (RHNs). Tiny neutrino masses
        naturally arise through the Type-I seesaw mechanism, which involves lepton
        number violation. Meanwhile, the baryon asymmetry can be generated via leptogenesis,
        where the out-of-equilibrium decay of RHNs produces a lepton asymmetry that
        is partially converted into a baryon asymmetry through sphaleron processes.
        The Dirac Yukawa couplings play the crucial role for both Type-I seesaw and
        leptogenesis. In this work, we derive an analytic expression for the CP asymmetry
        parameter in a general parametrization. Focusing on a hierarchical RHN mass
        spectrum, we evaluate the lowest mass of the lightest RHN that reproduce both
        neutrino oscillation data and the observed baryon asymmetry. We study the
        case with two and three generations of RHNs for both thermal and non-thermal
        leptogenesis scenarios. Besides the standard Type-I seesaw involving SM Higgs
        doublet, we also examine the Type-I seesaw with a new neutrinophillic Higgs
        doublet. In this case for non-thermal leptogenesis, the minimum value for
        the lightest RHN mass can be as low as sphaleron decoupling temperature.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20602</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:cond-mat:soft</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20602</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Armas</keyname>\n                        <forenames>Jay</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Jain</keyname>\n
        \                       <forenames>Akash</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lier</keyname>\n                        <forenames>Ruben</forenames>\n
        \               </author>\n        </authors>\n        <title>On the temperature
        of an active nematic</title>\n            <categories>cond-mat.soft cond-mat.stat-mech
        hep-th</categories>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We employ a novel hydrodynamic framework for active
        matter coupled to an environment to study the local temperature of an active
        nematic, assuming proximity to thermal equilibrium. We show that, due to the
        mechanosensitivity of fuel consumption, linearized temperature correlations
        in a homogeneous active nematic steady state remain unaffected by activity.
        However, we demonstrate that local shearing and twisting cause a confined
        active nematic undergoing a spontaneous flow transition to develop a distinctive
        inhomogeneous temperature profile, serving as a thermal signature of activity.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20643</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20643</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Mogull</keyname>\n
        \                       <forenames>Gustav</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Plefka</keyname>\n
        \                       <forenames>Jan</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Stoldt</keyname>\n
        \                       <forenames>Kathrin</forenames>\n                </author>\n
        \       </authors>\n        <title>Radiated Angular Momentum from Spinning
        Black Hole Scattering Trajectories</title>\n            <categories>hep-th
        gr-qc</categories>\n            <comments>20 pages, 2 figures</comments>\n
        \           <report-no>HU-EP-25/20-RTG, QMUL-PH-25-10</report-no>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Using the worldline quantum field theory approach we
        derive solutions to the equations of motion for spinning massive bodies up
        to quadratic order in spins. At leading post-Minkowskian (PM) order these
        trajectories are obtained in the time domain, and at sub-leading order in
        the frequency domain. Our approach incorporates diagrammatic techniques and
        modern Feynman integration technologies, and includes a new family of loop
        integrals different to those seen in asymptotic PM calculations. Our results
        provide a new mechanism for computing the radiated angular momentum involved
        in gravitational scattering, which we reproduce at 2PM order up to linear
        spins. We have established a framework for computing higher-order effects
        to further extend the high-precision frontier in analytical gravitational
        wave physics, and push predictions for the radiated angular momentum to higher
        perturbative orders.</abstract>\n    </arXiv>\n\n            </metadata>\n
