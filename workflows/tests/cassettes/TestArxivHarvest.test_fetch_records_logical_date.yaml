        \           <comments>v3: final version</comments>\n            <report-no>MPIM-Bonn-2022</report-no>\n
        \           <journal-ref>\xC3\u2030pijournal de G\xC3\xA9om\xC3\xA9trie Alg\xC3\xA9brique,
