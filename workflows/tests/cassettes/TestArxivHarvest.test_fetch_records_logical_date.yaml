        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2502.20822</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Auzzi</keyname>\n                        <forenames>Roberto</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Bolognesi</keyname>\n
        \                       <forenames>Stefano</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Nardelli</keyname>\n
        \                       <forenames>Giuseppe</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Tallarita</keyname>\n
        \                       <forenames>Gianni</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Zenoni</keyname>\n
        \                       <forenames>Nicol\xF2</forenames>\n                </author>\n
        \       </authors>\n        <title>Solitonic vortices and black holes with
        vortex hair in AdS$_3$</title>\n            <categories>hep-th</categories>\n
        \           <comments>34 pages, 18 figures; v2: journal version</comments>\n
        \           <report-no>YITP-25-31</report-no>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We study soliton and black hole solutions with scalar
        hair in AdS$_3$ in a theory with a Maxwell field and a charged scalar field
        with double trace boundary conditions, which can trigger the dual boundary
        theory to become a superconductor. We investigate the phase diagram as a function
        of the temperature $T$ and of the double trace coupling $\u03BA$ and we find
        a rich pattern of phase transitions, which can be of the Hawking-Page kind
        or can be due to the condensation of the order parameter. We also find a transition
        between vortex solutions and the zero temperature limit of the black hole
        for a critical value of the double trace coupling $\u03BA$. The Little-Park
        periodicity is realized for the dual of the black hole solution with hair
        as a shift in the winding number and in the gauge field.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
