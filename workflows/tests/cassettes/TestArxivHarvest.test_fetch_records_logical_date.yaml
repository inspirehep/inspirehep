        \           <setSpec>physics:math-ph</setSpec>\n            <setSpec>math:math:MP</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2503.10400</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Sone</keyname>\n                        <forenames>Akira</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Touil</keyname>\n
        \                       <forenames>Akram</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Maeda</keyname>\n                        <forenames>Kenji</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Cappellaro</keyname>\n
        \                       <forenames>Paola</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Deffner</keyname>\n
        \                       <forenames>Sebastian</forenames>\n                </author>\n
        \       </authors>\n        <title>No-go theorem for environment-assisted
        invariance in non-unitary dynamics</title>\n            <categories>quant-ph
        cond-mat.stat-mech hep-th math-ph math.MP</categories>\n            <comments>v3:
        7.5 + 2 pages, 2 figures, final version for publication</comments>\n            <report-no>LA-UR-24-30981</report-no>\n
        \           <journal-ref>New J. Phys. 27 064509 (2025)</journal-ref>\n            <doi>10.1088/1367-2630/ade46f</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We elucidate the requirements for quantum operations
        that achieve environment-assisted invariance (envariance), a symmetry of entanglement.
        While envariance has traditionally been studied within the framework of local
        unitary operations, we extend the analysis to consider non-unitary local operations.
        First, we investigate the conditions imposed on operators acting on pure bipartite
        entanglement to attain envariance. We show that the local operations must
        take a direct-sum form in their Kraus operator representations, establishing
        decoherence-free subspaces. Furthermore, we prove that this also holds for
        the multipartite scenario. As an immediate consequence, we demonstrate that
        environment-assisted shortcuts to adiabaticity cannot be achieved through
        non-unitary operations. In addition, we show that the static condition of
        the eternal black hole in AdS/CFT is violated when the CFTs are coupled to
        the external baths.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2503.17999</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:cond-mat:stat-mech</setSpec>\n
        \           <setSpec>physics:cond-mat:str-el</setSpec>\n    </header>\n\n
        \           <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2503.17999</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Kumar</keyname>\n                        <forenames>Srijan</forenames>\n
        \               </author>\n        </authors>\n        <title>Large $N$ Wess-Zumino
        model at finite temperature and large chemical potential in $3d$</title>\n
        \           <categories>hep-th cond-mat.stat-mech cond-mat.str-el</categories>\n
        \           <comments>39 pages, 5 figures, typos corrected, detailed Conclusions
        added</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We consider the supersymmetric Wess-Zumino model at
        large $N$ in $(2+1)$ dimension. We introduce a chemical potential($\u03BC$)
        at finite temperature($T$). The non-trivial fixed point of this model is described
        by a pair of coupled gap equations. This fixed point behaves as a thermal
        CFT for all values of the coupling. We find that at large chemical potential
        these coupled equations simplify and solutions become analytically tractable.
        We solve them analytically for all values of the coupling at this limit. The
        solutions admit a systematic series expansion in $\\frac{T}\u03BC$. Thus,
        using the solutions of the gap equation at large chemical potential we can
        evaluate the analytic form of the partition function, stress tensor and spin-1
        current as a perturbative expansion in orders of $\\frac{T}\u03BC$. Applying
        the OPE inversion formula on the scalar and fermion two point functions of
        the theory, we compute higher spin currents at large $\u03BC$.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2503.18818</identifier>\n
