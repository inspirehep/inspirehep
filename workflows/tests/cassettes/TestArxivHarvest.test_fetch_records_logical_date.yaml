        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2505.04573</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Albertini</keyname>\n
        \                       <forenames>Emma</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Platt</keyname>\n                        <forenames>Daniel</forenames>\n
        \               </author>\n        </authors>\n        <title>Local uniqueness
        of the Black String with small circle size</title>\n            <categories>hep-th
        gr-qc</categories>\n            <comments>Revised argument in section 3.4
        and 4.3, results unchanged</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In this article we study uniqueness of the Black String,
        i.e. the product of 4-dimensional Schwarzschild space with a circle of length
        L.\n  In arXiv:2410.20967, this was reduced to a non-linear elliptic PDE,
        and we use this setup to show that for small L the Black String is infinitesimally
        rigid as a Ricci-flat metric.\n  Using a fixed point theorem, we prove that
        this implies local uniqueness, i.e. there exist no other Ricci-flat metrics
        near the Black String, and we give bounds for the size of the neighborhood
        in which the Black String is unique.\n  We compare this with the toy problem
        of a scalar field satisfying an elliptic equation that was already solved
        in arXiv:2410.20967 using different methods.\n  In this case we can use the
        fixed point theorem method to prove not just a local but a global statement.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
