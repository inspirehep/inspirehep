        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Loginov</keyname>\n                        <forenames>A.
        Yu.</forenames>\n                </author>\n        </authors>\n        <title>A
        nontopological soliton in an $\\mathcal{N} = 1$ supersymmetric gauge Abelian
        model</title>\n            <categories>hep-th</categories>\n            <comments>9
        pages, 3 figures</comments>\n            <journal-ref>Phys. Lett. B 848 (2024)
        138336</journal-ref>\n            <doi>10.1016/j.physletb.2023.138336</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>A version of $\\mathcal{N} = 1$ supersymmetric scalar
        electrodynamics is considered here, and it is shown that an electrically charged
        nontopological soliton exists in this model. In addition to the long-range
        electric field, the soliton also possesses a long-range scalar field, which
        leads to a modification of the intersoliton interaction potential at large
        distances. The supersymmetry of the model makes it possible to express fermionic
        zero modes of the soliton in terms of bosonic fields. The properties of the
        nontopological soliton are investigated using analytical and numerical methods.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2312.03073</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:cond-mat:stat-mech</setSpec>\n
        \           <setSpec>physics:cond-mat:quant-gas</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:quant-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2312.03073</id>\n        <created>2023-12-05</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Sieberer</keyname>\n
        \                       <forenames>Lukas M.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Buchhold</keyname>\n
        \                       <forenames>Michael</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Marino</keyname>\n
        \                       <forenames>Jamir</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Diehl</keyname>\n                        <forenames>Sebastian</forenames>\n
        \               </author>\n        </authors>\n        <title>Universality
        in driven open quantum matter</title>\n            <categories>cond-mat.stat-mech
        cond-mat.quant-gas hep-th quant-ph</categories>\n            <comments>83
        pages, 15 figures</comments>\n            <journal-ref>Rev. Mod. Phys. 97,
        025004 (2025)</journal-ref>\n            <doi>10.1103/RevModPhys.97.025004</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Universality is a powerful concept, which enables making
        qualitative and quantitative predictions in systems with extensively many
        degrees of freedom. It finds realizations in almost all branches of physics,
        including in the realm of nonequilibrium systems. Our focus here is on its
        manifestations within a specific class of nonequilibrium stationary states:
        driven open quantum matter. Progress in this field is fueled by a number of
        uprising platforms ranging from light-driven quantum materials over synthetic
        quantum systems like cold atomic gases to the functional devices of the noisy
        intermediate scale quantum era. These systems share in common that, on the
        microscopic scale, they obey the laws of quantum mechanics, while detailed
        balance underlying thermodynamic equilibrium is broken due to the simultaneous
        presence of Hamiltonian unitary dynamics and nonunitary drive and dissipation.
        The challenge is then to connect this microscopic physics to macroscopic observables,
        and to identify universal collective phenomena that uniquely witness the breaking
        of equilibrium conditions, thus having no equilibrium counterparts. In the
        framework of a Lindblad-Keldysh field theory, we discuss on the one hand the
        principles delimiting thermodynamic equilibrium from driven open stationary
        states, and on the other hand show how unifying concepts such as symmetries,
        the purity of states, and scaling arguments are implemented. We then present
        instances of universal behavior structured into three classes: new realizations
        of paradigmatic nonequilibrium phenomena, including a survey of first experimental
        realizations; novel instances of nonequilibrium universality found in these
        systems made of quantum ingredients; and genuinely quantum phenomena out of
        equilibrium, including in fermionic systems. We also discuss perspectives
        for future research on driven open quantum matter.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2402.02422</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2402.02422</id>\n        <created>2024-02-04</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Loginov</keyname>\n                        <forenames>A.
        Yu.</forenames>\n                </author>\n        </authors>\n        <title>Fermion-soliton
        scattering in a modified $\\mathbb{CP}^{1}$ model</title>\n            <categories>hep-th</categories>\n
        \           <comments>17 pages, 5 figures</comments>\n            <journal-ref>Eur.
        Phys. J. C (2024) 84:545</journal-ref>\n            <doi>10.1140/epjc/s10052-024-12894-4</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The scattering of fermions in the background field of
        a topological soliton of the modified $(2 + 1)$-dimensional $\\mathbb{CP}^{1}$
        model is studied here both analytically and numerically. Unlike the original
        $\\mathbb{CP}^{1}$ model, the Lagrangian of the modified model contains a
        potential term. Due to this, a dilatation zero mode of the topological soliton
        disappears, which results in stability of the fermion-soliton system. The
        symmetry properties of the fermion-soliton system are established, and the
        asymptotic forms of fermionic radial wave functions are studied. Questions
        related to the bound states of the fermion-soliton system are then discussed.
        General formulae describing the scattering of fermions are presented. The
        amplitudes of the fermion-soliton scattering are obtained in an analytical
        form within the framework of the Born approximation, and their symmetry properties
        and asymptotic forms are studied. The energy levels of the fermionic bound
        states and the partial phase shifts of fermionic scattering are obtained by
        numerical methods, and the ultrarelativistic limits of the partial phase shifts
        are found.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2402.09503</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-ex</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2402.09503</id>\n        <created>2025-05-25</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Glioti</keyname>\n                        <forenames>Alfredo</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Rattazzi</keyname>\n
        \                       <forenames>Riccardo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Ricci</keyname>\n                        <forenames>Lorenzo</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Vecchi</keyname>\n
        \                       <forenames>Luca</forenames>\n                </author>\n
        \       </authors>\n        <title>Exploring the Flavor Symmetry Landscape</title>\n
        \           <categories>hep-ph hep-ex hep-th</categories>\n            <comments>Resubmission
        matches the version sent to the Journal. 109 pages, 9 figures, 16 tables</comments>\n
        \           <journal-ref>SciPost Phys. 18, 201 (2025)</journal-ref>\n            <doi>10.21468/SciPostPhys.18.6.201</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We explore flavor dynamics in the broad scenario of
        a strongly interacting light Higgs (SILH). Our study focuses on the mechanism
        of partial fermion compositeness, but is otherwise as systematic as possible.
        Concretely, we classify the options for the underlying flavor (and CP) symmetries,
        which are necessary in order to bring this scenario safely within the range
        of present or future explorations. Our main goal in this context is to provide
        a practical map between the space of hypotheses (the models) and the experimental
        ground that will be explored in the medium and long term, in both indirect
        and direct searches, in practice at HL-LHC and Belle II, in EDM searches and
        eventually at FCC-hh. Our study encompasses scenarios with the maximal possible
        flavor symmetry, corresponding to minimal flavor violation (MFV), scenarios
        with no symmetry, corresponding to the so-called flavor anarchy, and various
        intermediate cases that complete the picture. One main result is that the
        scenarios that allow for the lowest new physics scale have intermediate flavor
        symmetry rather than the maximal symmetry of MFV models. Such optimal models
        are rather resilient to indirect exploration via flavor and CP violating observables,
        and can only be satisfactorily explored at a future high-energy collider.
        On the other hand, the next two decades of indirect exploration will significantly
        stress the parameter space of a large swath of less optimal but more generic
        models up to mass scales competing with those of the FCC-hh.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2404.10149</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:astro-ph:CO</setSpec>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2404.10149</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Levy</keyname>\n
        \                       <forenames>G. L. L. W.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Ramos</keyname>\n                        <forenames>Rudnei
        O.</forenames>\n                </author>\n        </authors>\n        <title>$\u03B1$-attractor
        potentials in loop quantum cosmology</title>\n            <categories>gr-qc
        astro-ph.CO hep-ph hep-th</categories>\n            <comments>11 pages, 6
        figures. Replaced with the version matching the published one in the Physical
        Review D. Version 3: fixed a typo in the Eq. (3.13)</comments>\n            <journal-ref>Phys.
        Rev. D 110, 043507 (2024)</journal-ref>\n            <doi>10.1103/PhysRevD.110.043507</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We perform in this work an analysis of the background
        dynamics for $\u03B1$-attractor models in the context of loop quantum cosmology.
        Particular attention is given to the determination of the duration of the
        inflationary phase that is preceded by the quantum bounce in these models.
        From an analysis of the general predictions for these models, it is shown
        that we can be able to put constraints in the parameter $\u03B1$ of the potentials
        and also on the quantum model itself, especially the Barbero-Immirzi parameter.
        In particular, the constraints on the tensor-to-scalar ratio and spectral
        tilt of the cosmological perturbations limit the $\u03B1$ parameter of the
        potentials to values such that $\u03B1_{n=0} \\lesssim 10$, $\u03B1_{n=1}
        \\lesssim 17$ and $\u03B1_{n=2} \\lesssim 67$, for the $\u03B1$ attractors
        T, E, and $n=2$ models, respectively. Using the constraints on the minimal
        amount of e-folds of expansion from the quantum bounce up to the end of inflation
        leads to the upper bounds for the Barbero-Immirzi parameter for the $\u03B1$-attractor
        models studied in this work: $\u03B3_{n=0} \\lesssim 51.2$, $\u03B3_{n=1}\\lesssim
        63.4$ and $\u03B3_{n=2} \\lesssim 64.2$, which are obtained when fixing the
        parameter $\u03B1$ in the potential at the values saturating the upper bounds
        given above for each model.</abstract>\n    </arXiv>\n\n            </metadata>\n
