        \               <author>\n                    <keyname>Santos</keyname>\n
        \                       <forenames>C. dos</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Simas</keyname>\n                        <forenames>F.
        C.</forenames>\n                </author>\n        </authors>\n        <title>Geometrically
        constrained sine-Gordon field: BPS solitons and their collisions</title>\n
        \           <categories>hep-th nlin.PS nlin.SI</categories>\n            <comments>30
        pages, 12 figures. Extended revised version published</comments>\n            <journal-ref>Commun.
        Nonlinear Sci. Numer. Simulat. 151 (2025) 109070</journal-ref>\n            <doi>10.1016/j.cnsns.2025.109070</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We consider an enlarged $(1+1)$-dimensional model with
        two real scalar fields, $\u03D5$ and $\u03C7$ whose scalar potential $V(\u03D5,\u03C7)$
        has a standard $\u03C7^4$ sector and a sine-Gordon one for $\u03D5$. These
        fields are coupled through a generalizing function $f(\u03C7)$ that appears
        in the scalar potential and controls the nontrivial dynamics of $\u03D5$.
        We minimize the effective energy via the implementation of the BPS technique.
        We then obtain the Bogomol&#39;nyi bound for the energy and the first-order
        equations whose solutions saturate that bound. We solve these equations for
        a nontrivial $f(\u03C7)$. As the result, BPS kinks with internal structures
        emerge. They exhibit a two-kink profile. i.e. an effect due to geometrical
        constrictions. We consider the linear stability of these new configurations.
        In this sense, we study the existence of internal modes that play an important
        role during the scattering process. We then investigate the kink-antikink
        collisions, and present the numerical results for the most interesting cases.
        We also comment about their most relevant features.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
