        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19705</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Bjerrum-Bohr</keyname>\n
        \                       <forenames>N. Emil J.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Chen</keyname>\n                        <forenames>Gang</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Eriksen</keyname>\n
        \                       <forenames>Carl Jordan</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Shah</keyname>\n                        <forenames>Nabha</forenames>\n
        \               </author>\n        </authors>\n        <title>The gravitational
        Compton amplitude from flat and curved spacetimes at second post-Minkowskian
        order</title>\n            <categories>hep-th gr-qc</categories>\n            <comments>32
        pages, 1 figure</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We utilize various computational techniques in flat
        and curved backgrounds to calculate the classical gravitational Compton amplitude
        up to the second post-Minkowskian order. Our novel result supports the use
        of worldline quantum field theory in non-trivial background spacetimes to
        obtain new theoretical insights that can both enhance computational efficiency
        and provide useful cross-checks of results, particularly in the context of
        classical binary black hole mergers.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19709</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19709</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Buchbinder</keyname>\n
        \                       <forenames>I. L.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Fedoruk</keyname>\n
        \                       <forenames>S. A.</forenames>\n                </author>\n
        \       </authors>\n        <title>Continuous spin superparticle model</title>\n
        \           <categories>hep-th</categories>\n            <comments>1+15 pages</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We construct a new model of a particle propagating in
        $4D$, ${\\cal N}=1$ superspace that describes the dynamics of a continuous
        spin irreducible representation of the Poincar\xE9 supergroup. The model is
        characterized by two-component Weyl spinor additional even variables playing
        the role of extra coordinates. A canonical formulation, specific local fermionic
        $\u03BA$-symmetry, and a compete system of bosonic and fermionic constraints
        are derived. All bosonic constrains are first-class, while fermionic constraints
        are a mixture of first and second classes. Using additional variables inherent
        in to the model, we split the fermionic constraints into first and second
        classes in a covariant way. Quantization of the model is carried out according
        to Dirac prescription imposing all the first-class constraints and half of
        the second-class constraints (Gupta-Bleuler procedure) on the wave function.
        At quantization, the fermionic constraints are written in terms of spinor
        supercovariant derivatives acting on superfields. The corresponding wave function,
        which is either a chiral or antichiral superfield, depends on additional variables
        and obeys the superfield constraints that define the continuous spin irreducible
        representation of the Poincar\xE9 supergroup in the superspace.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19710</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19710</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Wan</keyname>\n                        <forenames>Zheyan</forenames>\n
        \               </author>\n        </authors>\n        <title>Anomaly of 4d
        Weyl fermion with discrete charge</title>\n            <categories>hep-th</categories>\n
        \           <comments>10 pages</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We derive the anomaly indices of 4d Weyl fermions with
        symmetry $\\mathrm{Spin}\\times\\mathbb{Z}_n$ and $\\mathrm{Spin}\\times_{\\mathbb{Z}_2}\\mathbb{Z}_{2m}$
        by reducing the continuous $\\mathrm{Spin} \\times \\mathrm{U}(1)$ and $\\mathrm{Spin}^c$
        anomaly indices on five-dimensional manifolds to discrete sectors subject
        to flux quantization. We calculate the values of the 5d invertible theories
        on the corresponding manifold generators. We express the values of the 5d
        invertible theories on general manifolds in terms of their values on the manifold
        generators.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.19720</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19720</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Blair</keyname>\n                        <forenames>Chris
        D. A.</forenames>\n                </author>\n                <author>\n                    <keyname>Obers</keyname>\n
        \                       <forenames>Niels A.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Yan</keyname>\n                        <forenames>Ziqi</forenames>\n
        \               </author>\n        </authors>\n        <title>Carroll Geometry
        Meets De Sitter Space via Holography</title>\n            <categories>hep-th</categories>\n
        \           <comments>5 pages + appendix</comments>\n            <report-no>IFT-UAM/CSIC-25-66,
        NORDITA 2025-029</report-no>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We explain how to relate the ideas of Carroll geometry,
        matrix theory on instantonic objects, and infinite boost limits of M-theory.
        Based on these new insights, we explore the implications for possible holographic
        constructions involving a de Sitter or flat space bulk. We show that Carroll-like
        geometry in a hypothetical de Sitter holography mirrors the recently realized
        important role played by Galilei-like geometry in matrix theory and the AdS/CFT
        correspondence. This also allows us to generate examples of holography with
        a Carroll-like bulk.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19771</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \           <setSpec>physics:math-ph</setSpec>\n            <setSpec>math:math:MP</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19771</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Pasnoori</keyname>\n                        <forenames>Parameshwar
        R.</forenames>\n                </author>\n                <author>\n                    <keyname>Azaria</keyname>\n
        \                       <forenames>Patrick</forenames>\n                </author>\n
        \       </authors>\n        <title>Interplay between Symmetry Breaking and
        Interactions in a Symmetry Protected Topological Phase</title>\n            <categories>hep-th
        cond-mat.str-el math-ph math.MP</categories>\n            <comments>arXiv
        admin note: substantial text overlap with arXiv:2503.14776</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We solve the one dimensional massive Thirring model
        or equivalently the sine-Gordon model in the repulsive regime with general
        Dirichlet boundary conditions, which are characterized by two boundary fields
        $\u03D5_{L,R}$ associated with the left and right boundaries respectively.
        In the presence of these boundary fields, which explicitly break the charge
        conjugation symmetry, the system exhibits a duality symmetry which changes
        the sign of the mass parameter $m_0$ and shifts the values of the boundary
        fields by $\u03D5_{L,R}\\rightarrow \u03D5_{L,R}+\u03C0$. When the mass parameter
        $m_0&lt;0$ and the boundary fields $\u03D5_{L,R}=0$, or equivalently due to
        duality symmetry, when the mass parameter $m_0&gt;0$ and the boundary fields
        $\u03D5_{L,R}=\u03C0$, the system is at a trivial point. Here, the ground
        state is unique just as in the case of periodic boundary conditions. In contrast,
        when the mass parameter $m_0&lt;0$ and the boundary fields $\u03D5_{L,R}=\u03C0$,
        and equivalently due to the duality symmetry, when the mass parameter $m_0&gt;0$
        and the boundary fields $\u03D5_{L,R}=0$, the system is at a topological point
        where it exhibits a symmetry protected topological (SPT) phase, which is characterized
        by the existence of zero energy bound states at both the boundaries. For a
        given value of the mass parameter $m_0$, we find that these phases remain
        stable in the presence of symmetry breaking fields at the boundary, provided
        they are smaller than certain critical values which depend on the strength
        of the interactions in the bulk. Hence, we show that the stability of the
        SPT and trivial phases depends on the interplay of the symmetry breaking boundary
        field values and the bulk interaction strength.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19786</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:nucl-th</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19786</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Abboud</keyname>\n                        <forenames>Nick</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Gavassino</keyname>\n
        \                       <forenames>Lorenzo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Singh</keyname>\n                        <forenames>Rajeev</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Speranza</keyname>\n
        \                       <forenames>Enrico</forenames>\n                </author>\n
        \       </authors>\n        <title>The perfect spinfluid</title>\n            <categories>nucl-th
        hep-ph hep-th</categories>\n            <comments>26 pages, 2 figures</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We present a new formulation of non-dissipative relativistic
        spin hydrodynamics that incorporates spin degrees of freedom into the divergence-type
        theory framework. Due to the divergence-type structure, it is straightforward
        to enforce non-linear causality and symmetric hyperbolicity of the equations
        of motion, ensuring local well-posedness of the initial-value problem and
        stability of the theory. Furthermore, in a specific realization based on spin
        kinetic theory, we prove that the equations of motion remain non-linearly
        causal and symmetric-hyperbolic to all orders in the spin potential, provided
        a specific thermodynamic constraint is satisfied. This framework can be applied
        for numerical simulations to study the dynamics of spin-polarized fluids,
        such as the quark-gluon plasma in heavy-ion collisions.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19817</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19817</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Jafferis</keyname>\n
        \                       <forenames>Daniel L.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Rozenberg</keyname>\n
        \                       <forenames>Liza</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Wang</keyname>\n                        <forenames>Diandian</forenames>\n
        \               </author>\n        </authors>\n        <title>Open-closed
        3d gravity as a random ensemble</title>\n            <categories>hep-th gr-qc</categories>\n
        \           <comments>42 pages, many figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We investigate an ensemble of boundary CFTs within the
        framework of a tensor model recently constructed to model 3d quantum gravity.
        The incorporation of CFT borders introduces new elements to the gravity theory.
        In particular, it leads to an open-closed extension of Virasoro TQFT, which
        in the classical limit gives rise to 3d gravity with tensionful end-of-the-world
        branes. It also provides predictions for off-shell manifolds with bordered
        asymptotic boundaries, such as the annulus wormhole. As an application, we
        construct a purely open variant of the tensor model to study a purely open
        bootstrap problem in the context of CFT triangulation. We also briefly discuss
        the extension to non-orientable CFTs.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19849</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:astro-ph:HE</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19849</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Hod</keyname>\n
        \                       <forenames>Shahar</forenames>\n                </author>\n
        \       </authors>\n        <title>Marginally stable Schwarzschild-black-hole-non-minimally-coupled-Proca-field
        bound-state configurations</title>\n            <categories>gr-qc astro-ph.HE
        hep-th</categories>\n            <comments>6 pages</comments>\n            <journal-ref>Physical
        Review D 111, 124034 (2025)</journal-ref>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>It has recently been revealed that, in curved black-hole
        spacetimes, non-minimally coupled massive Proca fields may be characterized
        by the existence of poles in their linearized perturbation equations and may
        therefore develop exponentially growing instabilities. Interestingly, recent
        numerical computations [H. W. Chiang, S. Garcia-Saenz, and A. Sang, arXiv:2504.04779]
        have provided compelling evidence that the onset of monopole instabilities
        in the composed black-hole-field system is controlled by the dimensionless
        physical parameter $\u03BCr_-$, where $\u03BC$ is the proper mass of the non-minimally
        coupled Proca field and $r_-\\equiv (-2\u03B1)^{1/3}r_{\\text{H}}$ is the
        radial location of the pole [here $\u03B1$ is the non-minimal coupling parameter
        of the Einstein-Proca theory and $r_{\\text{H}}$ is the radius of the black-hole
        horizon]. In the present paper we use {\\it analytical} techniques in order
        to explore the physical properties of critical (marginally-stable) composed
        Schwarzschild-black-hole-nonminimally-coupled-monopole-Proca-field configurations.
        In particular, we derive a remarkably compact analytical formula for the discrete
        spectrum $\\{\u03BC(r_{\\text{H}},r_-;n) \\}^{n=\\infty}_{n=1}$ of Proca field
        masses which characterize the critical black-hole-monopole-Proca-field configurations
        in the dimensionless regime ${r_- -r_{\\text{H}}\\over{r_{\\text{H}}}}\\ll1$
        of near-horizon poles. The physical significance of the analytically derived
        resonance spectrum stems from the fact that the critical field mass $\u03BC_{\\text{c}}\\equiv\u03BC(r_{\\text{H}},r_-;n=1)$
        marks the onset of instabilities in the Schwarzschild-black-hole-nonminimally-coupled-monopole-Proca-field
        system. In particular, composed black-hole-linearized-Proca-field configurations
        in the small-mass regime $\u03BC\\leq\u03BC_{\\text{c}}$ of the Proca field
        are stable.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:1205.3855</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>1205.3855</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Anninos</keyname>\n
        \                       <forenames>Dionysios</forenames>\n                </author>\n
        \       </authors>\n        <title>De Sitter Musings</title>\n            <categories>hep-th
        gr-qc</categories>\n            <comments>Based on several talks given by
        the author. To be published in Int. J. Mod. Phys. A. v2: Minor typos corrected
        v3: Minor typos corrected</comments>\n            <doi>10.1142/S0217751X1230013X</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We discuss some of the issues that arise when considering
        the physics of asymptotically de Sitter spacetimes, and attempts to address
        them. Our development begins at the classical level, where several initial
        value problems are discussed, and ends with several proposals for holography
        in asymptotically de Sitter spacetimes. Throughout the paper we give a review
        of some basic notions such as the geometry of the Schwarzschild-de Sitter
        black hole, the Nariai limit, and quantum field theory in a fixed de Sitter
        background. We also briefly discuss some semiclassical aspects such as the
        nucleation of giant black holes and the Hartle-Hawking wavefunctional. We
        end by giving an overview of some open questions. An emphasis is placed on
        the differences between a static patch observer confined to live in a thermal
        cavity and the metaobserver who has access to a finite region of the future
        boundary.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2310.16887</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2310.16887</id>\n        <created>2024-01-22</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Polychronakos</keyname>\n
        \                       <forenames>Alexios P.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sfetsos</keyname>\n
        \                       <forenames>Konstantinos</forenames>\n                </author>\n
        \       </authors>\n        <title>Phase transitions in the decomposition
        of $SU(N)$ representations</title>\n            <categories>hep-th cond-mat.stat-mech
        math-ph math.MP</categories>\n            <comments>Version published in NPB,
        extra references; 35 pages, 6 figures</comments>\n            <journal-ref>Nuclear
        Physics B 999, February 2024, 116434</journal-ref>\n            <doi>10.1016/j.nuclphysb.2023.116434</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We study the multiplicity of irreducible representations
        in the decomposition of $n$ fundamentals of $SU(N)$ weighted by a power of
        their dimension in the large $n$ and large $N$ double scaling limit. A nontrivial
        scaling is obtained by keeping $n/N^2$ fixed, which plays the role of an order
        parameter. We find that the system generically undergoes a fourth order phase
        transition in this parameter, from a dense phase to a dilute phase. The transition
        is enhanced to third order for the unweighted multiplicity, and disappears
        altogether when weighting with the first power of the dimension. This corresponds
        to the infinite temperature partition function of non-Abelian ferromagnets,
        and the results should be relevant to the thermodynamic limit of such ferromagnets
        at high temperatures.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2312.17341</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>math:math:AG</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2312.17341</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Moshin</keyname>\n                        <forenames>Sumayya</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Nazir</keyname>\n
        \                       <forenames>Shaheen</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Qureshi</keyname>\n
        \                       <forenames>Muhammad Imran</forenames>\n                </author>\n
        \       </authors>\n        <title>Constructions and deformations of Calabi--Yau
        3-folds in codimension 4</title>\n            <categories>math.AG hep-th</categories>\n
        \           <comments>29 pages, 2 tables, Final version</comments>\n            <msc-class>14J32,
        14J30, 14Q15</msc-class>\n            <journal-ref>Journal of Algebra Journal
        of Algebra, Volume 657, 1 November 2024, Pages 773-803</journal-ref>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We construct polarized Calabi--Yau 3-folds with at worst
        isolated canonical orbifold points in codimension 4 that can be described
        in terms of the equations of the Segre embedding of $\\mathbb P^2 \\times
        \\mathbb P^2$ in $\\mathbb P^8$. We investigate the existence of other deformation
        families in their Hilbert scheme by either studying Tom and Jerry degenerations
        or by comparing their Hilbert series with those of existing low codimension
        Calabi--Yau 3-folds. Among other interesting results, we find a family of
        Calabi--Yau 3-fold with five distinct Tom and Jerry deformation families,
        a phenomenon not seen for $\\mathbb Q$-Fano 3-folds. We compute the Hodge
        numbers of $\\mathbb P^2 \\times \\mathbb P^2 $ Calabi--Yau 3-folds and corresponding
        manifolds obtained by performing crepant resolutions. We obtain a manifold
        with a pair of Hodge numbers that does not appear in the famously known list
        of 30108 distinct Hodge pairs of Kruzer--Skarke, in the list of 7890 distinct
        Hodge pairs corresponding to complete intersections in the product of projective
        spaces and in Hodge paris obtained from Calabi--Yau 3-folds having low codimension
        embeddings in weighted projective spaces.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2404.12109</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2404.12109</id>\n        <created>2024-04-18</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Fu</keyname>\n                        <forenames>Qingxuan</forenames>\n
        \               </author>\n                <author>\n                    <keyname>He</keyname>\n
        \                       <forenames>Song</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Li</keyname>\n                        <forenames>Li</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Li</keyname>\n
        \                       <forenames>Zhibin</forenames>\n                </author>\n
        \       </authors>\n        <title>Revisiting holographic model for thermal
        and dense QCD with a critical point</title>\n            <categories>hep-ph
        hep-th</categories>\n            <journal-ref>J. High Energ. Phys. 2025, 221
        (2025)</journal-ref>\n            <doi>10.1007/JHEP06(2025)221</doi>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>To quantitatively provide reliable predictions for the
        hot and dense QCD matter, a holographic model should be adjusted to describe
        first-principles lattice results available at vanishing baryon chemical potential.
        The equation of state from two well-known lattice groups, the HotQCD collaboration
        and the Wuppertal-Budapest (WB) collaboration, shows visible differences at
        high temperatures. We revisit the Einstein-Maxwell-dilaton (EMD) holographic
        model for hot QCD with 2+1 flavors and physical quark masses by fitting lattice
        QCD data from the WB collaboration. Using the parameterization for the scalar
        potential and gauge coupling proposed in our work [Phys.Rev.D 106 (2022) 12,
        L121902], the equation of state, the higher order baryon number susceptibilities,
        and the chiral condensates are in quantitative agreement with state-of-the-art
        lattice results. We find that the critical endpoint (CEP) obtained from fitting
        the WB collaboration data is nearly identical to the one from the HotQCD collaboration,
        suggesting the robustness of the location of the CEP. Moreover, our holographic
        prediction for the CEP location is in accord with more recent Bayesian analysis
        on a large number of holographic EMD models and an effective potential approach
        of QCD from gap equations.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2404.19726</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:astro-ph:CO</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2404.19726</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Kamada</keyname>\n                        <forenames>Kohei</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Kume</keyname>\n
        \                       <forenames>Jun&#39;ya</forenames>\n                </author>\n
        \       </authors>\n        <title>On the inefficiency of fermion level-crossing
        under the parity-violating spin-2 gravitational field</title>\n            <categories>hep-ph
        astro-ph.CO gr-qc hep-th</categories>\n            <comments>37 pages, 5 figures;
        v2: matched to the version published in JHEP</comments>\n            <report-no>RESCEU-9/24</report-no>\n
        \           <journal-ref>JHEP06(2025)203</journal-ref>\n            <doi>10.1007/JHEP06(2025)203</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Gravitational chiral anomaly connects the topological
        charge of spacetime and the chirality of fermions. It has been known that
        the chirality is carried by the particles (or the excited states) and also
        by vacuum. While the gravitational anomaly equation has been applied to cosmology,
        distinction between these two contributions has been rarely discussed. In
        the study of gravitational leptogenesis, for example, lepton asymmetry associated
        with the chiral gravitational waves (GWs) sourced during inflation is evaluated
        only by integrating the anomaly equation. This approach, however, does not
        reveal how these two contributions are distributed in this scenario. Meanwhile,
        the dominance of vacuum contribution is observed in some specific types of
        Bianchi spacetime with parity-violating gravitational fields. One may wonder
        whether such a vacuum dominance takes place also in the system with chiral
        GWs around the flat background, which is more suitable for application to
        realistic cosmology. In this work, we apply an analogy between U(1) electromagnetism
        and the weak gravity to the spacetime that captures the characteristics of
        the one considered in the gravitational leptogenesis. With this approach,
        we try to obtain intuitive understanding of the fermion chirality generation
        under the parity-violating spin-2 gravitational field. By assuming the emergence
        of Landau level-like dispersion relation in our setup, we observe that spin-2
        nature seems to make the level-crossing inefficient, indicating that the chrial
        charge is likely to accumulate in the vacuum. On this basis, phenomenological
        implications for gravitational leptogenesis are discussed.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2405.20855</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2405.20855</id>\n        <created>2025-04-01</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Brito</keyname>\n                        <forenames>L.
        C. T.</forenames>\n                </author>\n                <author>\n                    <keyname>Felipe</keyname>\n
        \                       <forenames>J. C. C.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lehum</keyname>\n                        <forenames>A.
        C.</forenames>\n                </author>\n                <author>\n                    <keyname>Nascimento</keyname>\n
        \                       <forenames>J. R.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Petrov</keyname>\n
        \                       <forenames>A. Yu.</forenames>\n                </author>\n
        \       </authors>\n        <title>Modified Euler-Heisenberg effective action
        and Proper-Time Method in Lorentz-Violating Scalar QED</title>\n            <categories>hep-th</categories>\n
        \           <comments>10 pages, version accepted to International Journal
        of Modern Physics A</comments>\n            <journal-ref>Int. J. Mod. Phys.
        A40, 255067 (2025)</journal-ref>\n            <doi>10.1142/S0217751X25500678</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Quantum photon effects in vacuum provide an interesting
        setting to test quantum electrodynamics, serving as a source for predictions
        about physics beyond the Standard Model. In this paper, we investigate these
        effects by calculating the one-loop Euler-Heisenberg-like effective action
        within a Lorentz-violating scalar quantum electrodynamics framework. In both
        CPT-even and CPT-odd scenarios, we obtain the exact result in all orders of
        the stress tensor $F_{\u03BC\u03BD}$ and evaluate explicitly the lower orders
        of this effective action. We identify the quantum effects coming from Lorentz
        violation in an explicitly gauge invariant way. Nonlinear Lorentz-violating
        contributions that may affect photon-photon scattering are explicitly evaluated.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2406.14616</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2406.14616</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Schuster</keyname>\n
        \                       <forenames>Philip</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sundaresan</keyname>\n
        \                       <forenames>Gowri</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Toro</keyname>\n                        <forenames>Natalia</forenames>\n
        \               </author>\n        </authors>\n        <title>Thermodynamics
        of Continuous Spin photons</title>\n            <categories>hep-ph hep-th</categories>\n
        \           <comments>13 pages + 4 appendix pages, 7 figures</comments>\n
        \           <journal-ref>Phys.Rev.D 111 (2025) 5, 056019</journal-ref>\n            <doi>10.1103/PhysRevD.111.056019</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Special relativity allows massless particles to have
        states of different integer (or half-integer) helicities that mix under boosts,
        much like the spin-states of a massive particle. Such massless particles are
        known as continuous spin particles (CSPs), a term coined by Wigner, and they
        are notable for their infinite tower of spin polarizations. The mixing under
        boosts is controlled by a spin-scale $\u03C1$ with units of momentum. Normally,
        we assume $\u03C1=0$. The interactions of CSPs are known to satisfy certain
        simple properties, one of which is that the $\u03C1\\rightarrow 0$ limit generically
        recovers familiar interactions of massless scalars, photons, or gravitons,
        with all other polarizations decoupling in this limit. Thus, one can ask if
        the photon of the Standard Model is a CSP at small but non-zero $\u03C1$.
        One concern about this possibility -- originally raised by Wigner -- is that
        the infinite tower of polarizations could pose problems for thermodynamics.
        To address this question, we study the thermal evolution of a CSP photon gas
        coupled to isothermal matter, across CSP helicity modes and phase space. We
        find that the structure of the interactions dictated by Lorentz symmetry imply
        well behaved thermodynamics. When the CSP photon&#39;s interactions to charged
        matter are turned on, the primary $h=\\pm 1$ helicity modes thermalize quickly,
        while the other modes require increasingly long time-scales to thermalize,
        set by powers of $T/\u03C1$. In familiar thermal systems, the CSP photon behaves
        like the QED photon with small $\u03C1$- and time- dependent corrections to
        its effective relativistic degrees of freedom. Sizable departures from familiar
        thermal behavior arise at energy scales comparable to $\u03C1$ and could have
        testable experimental consequences.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2408.15711</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:math-ph</setSpec>\n            <setSpec>math:math:MP</setSpec>\n
        \           <setSpec>physics:quant-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2408.15711</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Sen</keyname>\n
        \                       <forenames>Sauvik</forenames>\n                </author>\n
        \       </authors>\n        <title>Quantum tunneling driven by quintessence
        and the role of GUP</title>\n            <categories>gr-qc hep-th math-ph
        math.MP quant-ph</categories>\n            <comments>28 pages, 6 figures,
        1 table. Updated references and discussions. The current version is published
        in the journal &#39;General Relativity and Gravitation&#39;</comments>\n            <journal-ref>Gen.
        Relativ. Gravit. 57, 102 (2025)</journal-ref>\n            <doi>10.1007/s10714-025-03440-y</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In this paper, we studied quantum tunneling of massless
        and massive particles pertaining to a Schwarzschild black hole in a quintessence
        background, and explored the consequences emerging from a generalized uncertainty
        principle (GUP). For the quintessence scenario, we considered two specific
        cases of $w$, which is the ratio of the pressure and energy density, namely
        $w=-1/3$ and $w=-2/3$. For the GUP, we used a modified Schwarzschild metric
        and employed a unique choice of contour integration to compute the tunneling
        amplitudes. An analysis and comparative study of the respective temperature
        profiles has been made. The energy emission rate has also been analysed.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2409.09033</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>math:math:RA</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:quant-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2409.09033</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Singh</keyname>\n
        \                       <forenames>Aadarsh</forenames>\n                </author>\n
        \       </authors>\n        <title>Rank-Preserving Index-Dependent Matrix
        Transformations: Applications to Clockwork and Deconstruction Theory Space
        Models</title>\n            <categories>math.RA hep-ph hep-th quant-ph</categories>\n
        \           <comments>Major revision from previous version, Added applications
        to HEP</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We introduce a versatile framework of index-dependent
        element-wise matrix transformations, $b_{ij} = a_{ij} / g_f(i,j)$, with direct
        applications to hierarchy generating mass hierarchies in high-energy physics.
        This paper establishes the precise mathematical conditions on $g_f(i,j)$ that
        preserve the rank and nullity of the original matrix. Our study reveals that
        such transformations provide a powerful method for engineering specific properties
        of a matrix&#39;s null space; by appropriately selecting the function $g_f(i,j)$,
        one can generate null vectors (or eigenvectors) with diverse and controllable
        localization patterns. The broad applicability of this technique is discussed,
        with detailed examples drawn from high-energy physics. We demonstrate how
        our framework can be used to tailor 0-mode profiles and fermionic mass spectra
        in clockwork and dimensional deconstruction models, showing that the standard
        clockwork mechanism arises as a particular case $(g_f(i,j) = f^{(i-j)})$,
        thereby offering new tools for particle physics BSM model building. This work
        illustrates the potential of these transformations in model building across
        various fields where localized modes or specific spectral properties are crucial.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
