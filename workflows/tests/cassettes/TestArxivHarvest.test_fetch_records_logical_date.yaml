        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2411.07467</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>He</keyname>\n                        <forenames>Jesse</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Jenne</keyname>\n
        \                       <forenames>Helen</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Chau</keyname>\n                        <forenames>Herman</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Brown</keyname>\n
        \                       <forenames>Davis</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Raugas</keyname>\n
        \                       <forenames>Mark</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Billey</keyname>\n
        \                       <forenames>Sara</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Kvinge</keyname>\n
        \                       <forenames>Henry</forenames>\n                </author>\n
        \       </authors>\n        <title>Machines and Mathematical Mutations: Using
        GNNs to Characterize Quiver Mutation Classes</title>\n            <categories>cs.LG
        hep-th math.CO</categories>\n            <comments>ICML 2025</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Machine learning is becoming an increasingly valuable
        tool in mathematics, enabling one to identify subtle patterns across collections
        of examples so vast that they would be impossible for a single researcher
        to feasibly review and analyze. In this work, we use graph neural networks
        to investigate \\emph{quiver mutation} -- an operation that transforms one
        quiver (or directed multigraph) into another -- which is central to the theory
        of cluster algebras with deep connections to geometry, topology, and physics.
        In the study of cluster algebras, the question of \\emph{mutation equivalence}
        is of fundamental concern: given two quivers, can one efficiently determine
        if one quiver can be transformed into the other through a sequence of mutations?
        In this paper, we use graph neural networks and AI explainability techniques
        to independently discover mutation equivalence criteria for quivers of type
        $\\tilde{D}$. Along the way, we also show that even without explicit training
        to do so, our model captures structure within its hidden representation that
        allows us to reconstruct known criteria from type $D$, adding to the growing
        evidence that modern machine learning models are capable of learning abstract
        and parsimonious rules from mathematical data.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2411.19155</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2411.19155</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Kim</keyname>\n                        <forenames>Hee-Cheol</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Vafa</keyname>\n
        \                       <forenames>Cumrun</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Xu</keyname>\n                        <forenames>Kai</forenames>\n
        \               </author>\n        </authors>\n        <title>Finite Landscape
        of 6d N=(1,0) Supergravity</title>\n            <categories>hep-th</categories>\n
        \           <comments>42 pages, 1 figure; v2 : minor edits, typos fixed, references
        added; v3 : additional proofs added to Sections 3.2 and 3.3</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We present a bottom-up argument showing that the number
        of massless fields in six-dimensional quantum gravitational theories with
        eight supercharges is uniformly bounded. Specifically, we show that the number
        of tensor multiplets is bounded by $T\\leq 193$, and the rank of the gauge
        group is restricted to $r(V)\\leq 480$. Given that F-theory compactifications
        on elliptic CY 3-folds are a subset, this provides a bound on the Hodge numbers
        of elliptic CY 3-folds: $h^{1,1}({\\rm CY_3})\\leq 491$, $h^{1,1}({\\rm Base})\\leq
        194$ which are saturated by special elliptic CY 3-folds. This establishes
        that our bounds are sharp and also provides further evidence for the string
        lamppost principle. These results are derived by a comprehensive examination
        of the boundaries of the tensor moduli branch, showing that any consistent
        supergravity theory with $T\\neq0$ must include a BPS string in its spectrum
        corresponding to a &#34;little string theory&#34; (LST) or a critical heterotic
        string. From this tensor branch analysis, we establish a containment relationship
        between SCFTs and LSTs embedded within a gravitational theory. Combined with
        the classification of 6d SCFTs and LSTs, this then leads to the above bounds.
        Together with previous works, this establishes the finiteness of the supergravity
        landscape for $d\\geq 6$.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2412.00582</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:astro-ph:HE</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2412.00582</id>\n        <created>2025-06-09</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>R\xF3is</keyname>\n
        \                       <forenames>Gabriel I.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Junior</keyname>\n
        \                       <forenames>Jos\xE9 Tarciso S. S.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lobo</keyname>\n                        <forenames>Francisco
        S. N.</forenames>\n                </author>\n                <author>\n                    <keyname>Rodrigues</keyname>\n
        \                       <forenames>Manuel E.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Harko</keyname>\n                        <forenames>Tiberiu</forenames>\n
        \               </author>\n        </authors>\n        <title>Charged black
        hole solutions in $f(R,T)$ gravity coupled to nonlinear electrodynamics</title>\n
        \           <categories>gr-qc astro-ph.HE hep-th</categories>\n            <comments>16
        pages, 7 figures. V2: 18 pages, 9 figures; discussion and references added.
        Accepted for publication in PRD</comments>\n            <journal-ref>Phys.
        Rev. D 111, 124044 (2025)</journal-ref>\n            <doi>10.1103/srr5-t81h</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this work, we investigate static and spherically
        symmetric black hole solutions in $f(R,T)$ gravity, where $R$ is the curvature
        scalar and $T$ is the trace of the energy-momentum tensor, coupled to nonlinear
        electrodynamics (NLED). To construct our solutions, we adopt a linear functional
        form, $f(R,T) = R + \u03B2T$. In the limit $\u03B2= 0$, the theory reduces
        to General Relativity (GR), recovering $f(R,T) \\approx R$. We propose a power-law
        Lagrangian of the form $\\mathcal{L} = f_0 + F + \u03B1F^p$, where $\u03B1=f_0=
        0$ corresponds to the linear electrodynamics case. Using this setup, we derive
        the metric functions and determine an effective cosmological constant. Our
        analysis focuses on specific cases with $p = 2$, $p = 4$, and $p = 6$, where
        we formulate analytic expressions for the matter fields supporting these solutions
        in terms of the Lagrangian as a function of $F$. Additionally, we verify the
        regularity of the solutions and study the structure of the event horizons.
        Furthermore, we examine a more specific scenario by determining the free forms
        of the first and second derivatives $\\mathcal{L}_F(r)$ and $\\mathcal{L}_{FF}(r)$
        of the Lagrangean of the nonlinear electromagnetic field. From these relations,
        we derive the general form of $\\mathcal{L}_{\\text{NLED}}(r)$ using consistency
        relations. This Lagrangian exhibits an intrinsic nonlinearity due to the influence
        of two constants, $\u03B1$ and $\u03B2$. Specifically, $\u03B1$ originates
        from the power-law term in the proposed Lagrangian, while $\u03B2$ arises
        from the assumed linear function $f(R,T)$. The interplay of these constants
        ensures that the nonlinearity of the Lagrangian is governed by both $\u03B1$
        and $\u03B2$, rather than $\u03B1$ alone.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2412.01900</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-lat</setSpec>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:nucl-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2412.01900</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Chakraborty</keyname>\n                        <forenames>Debsubhra</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Sood</keyname>\n
        \                       <forenames>Dhruv</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Radhakrishnan</keyname>\n
        \                       <forenames>Archana</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Mathur</keyname>\n
        \                       <forenames>Nilmani</forenames>\n                </author>\n
        \       </authors>\n        <title>Estimating energy levels from lattice QCD
        correlation functions using a transfer matrix formalism</title>\n            <categories>hep-lat
        hep-ph hep-th nucl-th</categories>\n            <comments>27 pages, 24 figures,
        Adaptive KDE method is introduced for filtration of spurious eigenvalues</comments>\n
        \           <report-no>TIFR/TH/24-24</report-no>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We present an efficient method for extracting energy
        levels from lattice QCD correlation functions by computing the eigenvalues
        of the transfer matrix associated with the lattice QCD Hamiltonian. While
        mathematically and numerically equivalent to the recently introduced Lanczos
        procedure, our approach introduces a novel prescription for removing spurious
        eigenvalues using a kernel density estimator (KDE) and Gaussian-convoluted
        histogram method. This strategy yields a robust and stable estimate of the
        energy spectrum, outperforming the Cullum-Willoughby filtering technique in
        efficiency. In addition, we detail how this method can be applied to extract
        overlap factors from two-point correlation functions, as well as matrix elements
        from three-point functions with a current insertion. Furthermore, we extend
        the methodology to accommodate correlation matrices constructed from a variational
        basis of operators, with its Block formulation. We demonstrate the efficacy
        of this framework by computing the two lowest energy levels for a broad range
        of hadrons, including several nuclei. Although the signal-to-noise ratio is
        not significantly improved, the extracted energy levels are found to be more
        reliable than those obtained with conventional techniques. Within a given
        statistical ensemble, the proposed method effectively captures both statistical
        uncertainties and systematic errors, including those arising from the choice
        of fitting window, making it a robust and practical tool for lattice QCD analysis.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2412.07709</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:astro-ph:CO</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2412.07709</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Fumagalli</keyname>\n                        <forenames>Jacopo</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Garriga</keyname>\n
        \                       <forenames>Jaume</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Germani</keyname>\n
        \                       <forenames>Cristiano</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sheth</keyname>\n                        <forenames>Ravi
        K.</forenames>\n                </author>\n        </authors>\n        <title>Unexpected
        shape of the primordial black hole mass function</title>\n            <categories>astro-ph.CO
        gr-qc hep-th</categories>\n            <comments>7 pages, 3 figures. v2: minor
        editing; v3: layout typos corrected</comments>\n            <journal-ref>Phys.Rev.D
        111 (2025) 12, 123518</journal-ref>\n            <doi>10.1103/k75n-3qz4</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In a Universe with nearly-Gaussian initial curvature
        perturbations, the abundance of primordial black holes can be derived from
        the curvature power spectrum. When the latter is enhanced within a narrow
        range around a characteristic scale, the resulting mass function has a single
        distinct peak, corresponding to Schwarzschild radii set by the horizon entry
        time of that scale. In contrast, we show (both numerically and by providing
        an analytic estimation) that a broad enhancement - such as a plateau bounded
        by infrared and ultraviolet scales - produces a bimodal mass function, with
        a primary peak close to the infrared scale. We find that the typical initial
        gravitational potential (compaction function), conditioned on meeting the
        threshold for critical collapse, is generated by a thin spherical shell with
        infrared radius and a thickness comparable to the ultraviolet scale. This
        suggests a higher-than-expected abundance of PBH originating from Type II
        initial fluctuations. Our results significantly impact overproduction bounds
        on the amplitude of the power spectrum, and tighten the viable mass range
        for primordial black holes as dark matter.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2412.15048</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2412.15048</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Filoche</keyname>\n
        \                       <forenames>Baptiste</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Hohenegger</keyname>\n
        \                       <forenames>Stefan</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Kimura</keyname>\n
        \                       <forenames>Taro</forenames>\n                </author>\n
        \       </authors>\n        <title>Surface Defects in $A$-type Little String
        Theories</title>\n            <categories>hep-th math-ph math.MP</categories>\n
        \           <comments>43 pages, 4 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>$A$-type Little String Theories (LSTs) are engineered
        from parallel M5-branes on a circle $\\mathbb{S}_\\perp^1$, probing a transverse
        $\\mathbb{R}^4/\\mathbb{Z}_M$ background. Below the scale of the radius of
        $\\mathbb{S}_\\perp^1$, these theories resemble a circular quiver gauge theory
        with $M$ nodes of gauge group $U(N)$ and matter in the bifundamental representation
        (or adjoint in the case of $M=1$). In this paper, we study these LSTs in the
        presence of a surface defect, which is introduced through the action of a
        $\\mathbb{Z}_N$ orbifold that breaks the gauge groups into $[U(1)]^N$. We
        provide a combinatoric expression for the non-perturbative BPS partition function
        for this system. This form allows us to argue that a number of non-perturbative
        symmetries, that have previously been established for the LSTs, are preserved
        in the presence of the defect. Furthermore, we discuss the Nekrasov-Shatashvili
        (NS) limit of the defect partition function: focusing in detail on the case
        $(M,N)=(1,2)$, we analyse two distinct proposals made in the literature. We
        unravel an algebraic structure that is responsible for the cancellation of
        singular terms in the NS limit, which we generalise to generic $(M,N)$. In
        view of the dualities of higher dimensional gauge theories to quantum many-body
        systems, we provide indications that our combinatoric expression for the defect
        partition are useful in constructing and analysing quantum integrable systems
        in the future.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2412.15857</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \           <setSpec>physics:cond-mat:mes-hall</setSpec>\n            <setSpec>physics:cond-mat:other</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2412.15857</id>\n        <created>2025-05-09</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Hansson</keyname>\n
        \                       <forenames>T. H.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Arouca</keyname>\n
        \                       <forenames>Rodrigo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Kvorning</keyname>\n
        \                       <forenames>Thomas Klein</forenames>\n                </author>\n
        \       </authors>\n        <title>On the relation between fractional charge
        and statistics</title>\n            <categories>cond-mat.str-el cond-mat.mes-hall
        cond-mat.other hep-th</categories>\n            <comments>6 pages (single
        column), no figures. Comments are welcome</comments>\n            <journal-ref>SciPost
        Phys. 18, 197 (2025)</journal-ref>\n            <doi>10.21468/SciPostPhys.18.6.197</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We revisit an argument, originally given by Kivelson
        and Ro\u010Dek, for why the existence of fractional charge necessarily implies
        fractional statistics. In doing so, we resolve a contradiction in the original
        argument, and in the case of a $\u03BD= 1/m$ Laughlin holes, we also show
        that the standard relation between fractional charge and statistics is necessary
        by an argument based on a t&#39;Hooft anomaly in a one-form global ${\\mathcal
        Z}_m$ symmetry.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2412.21058</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2412.21058</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Wen</keyname>\n                        <forenames>Qiang</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Xu</keyname>\n
        \                       <forenames>Mingshuai</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Zhong</keyname>\n                        <forenames>Haocheng</forenames>\n
        \               </author>\n        </authors>\n        <title>Timelike and
        gravitational anomalous entanglement from the inner horizon</title>\n            <categories>hep-th</categories>\n
        \           <comments>57 pages, 16 figures; v2: references added, typos fixed,
        minor revision in Sec.2; v3: minor revision, updated to match the published
        version</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In the context of the AdS$_3$/CFT$_2$, the boundary
        causal development and the entanglement wedge of any boundary spacelike interval
        can be mapped to a thermal CFT$_2$ and a Rindler $\\widetilde{\\text{AdS}_3}$
        respectively via certain boundary and bulk Rindler transformations. Nevertheless,
        the Rindler mapping is not confined in the entanglement wedges. While the
        outer horizon of the Rindler $\\widetilde{\\text{AdS}_3}$ is mapped to the
        RT surface, we also identify the pre-image of the inner horizon in the original
        AdS$_3$, which we call the inner RT surface. In this paper we give some new
        physical interpretation for the inner RT surface. First, the inner RT surface
        breaks into two pieces which anchor on the two tips of the causal development.
        Furthermore, we can take the two tips as the endpoints of a certain timelike
        interval and the inner RT surface is exactly the spacelike geodesic that represents
        the real part of the so-called holographic timelike entanglement entropy (HTEE).
        We also identify a timelike geodesic at boundary of the extended entanglement
        wedge, which represents the imaginary part of the HTEE. Second, in the duality
        between the topological massive gravity (TMG) and gravitational anomalous
        CFT$_2$, the entanglement entropy and the mixed state correlation that is
        dual to the entanglement wedge cross section (EWCS) receive correction from
        the Chern-Simons term in the TMG. We find that, the correction to the holographic
        entanglement entropy can be reproduced by the area of the inner RT surface
        with a proper regulation, while the mixed state correlation can be represented
        by the saddle geodesic chord connecting the two pieces of the inner RT surface
        of the mixed state we consider, which we call the inner EWCS. The equivalence
        between the twist on the RT surface and the length of inner RT surface is
        also discussed.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2501.11681</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2501.11681</id>\n        <created>2025-01-20</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Polychronakos</keyname>\n
        \                       <forenames>Alexios P.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sfetsos</keyname>\n
        \                       <forenames>Konstantinos</forenames>\n                </author>\n
        \       </authors>\n        <title>Ferromagnets from higher $SU(N)$ representations</title>\n
        \           <categories>hep-th cond-mat.stat-mech math-ph math.MP</categories>\n
        \           <comments>47 pages, 3 figures</comments>\n            <journal-ref>Nuclear
        Physics B 1014, May 2025, 116880</journal-ref>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We present a general formalism for deriving the thermodynamics
        of ferromagnets consisting of &#34;atoms&#34; carrying an arbitrary irreducible
        representation of $SU(N)$ and coupled through long-range two-body quadratic
        interactions. Using this formalism, we derive the thermodynamics and phase
        structure of ferromagnets with atoms in the doubly symmetric or doubly antisymmetric
        irreducible representations. The symmetric representation leads to a paramagnetic
        and a ferromagnetic phase with transitions similar to the ones for the fundamental
        representation studied before. The antisymmetric representation presents qualitatively
        new features, leading to a paramagnetic and two distinct ferromagnetic phases
        that can coexist over a range of temperatures, two of them becoming metastable.
        Our results are relevant to magnetic systems of atoms with reduced symmetry
        in their interactions compared to the fundamental case.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2502.03182</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2502.03182</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Corian\xF2</keyname>\n
        \                       <forenames>Claudio</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lionetti</keyname>\n
        \                       <forenames>Stefano</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Melle</keyname>\n                        <forenames>Dario</forenames>\n
        \               </author>\n        </authors>\n        <title>Topological
        Sum Rules and Spectral Flows of Chiral and Gravitational Axion-like Interactions</title>\n
        \           <categories>hep-ph hep-th</categories>\n            <comments>37
        pages, 5 figures, final version accepted for publication on Phys. Rev. D</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We examine the structure of off-shell effective actions
        arising from chiral and gravitational anomalies, focusing on the $JJJ_A$ (axial-vector/vector/vector)
        and $J_A TT $ (axial-vector/stress-energy tensors) correlators, relevant in
        the analysis of anomaly-driven interactions in perturbation theory. Our approach
        relies on conformal field theory in momentum space, extended to chiral anomalies.
        The analysis centers on the presence of both particle poles and anomaly poles
        within these interactions, characterizing their behavior both in the conformal
        and non conformal limits. Through explicit computations, we show that universal
        sum rules in the longitudinal sector regulate these interactions for all kinematic
        conditions, extending previous analysis, and we discuss the resulting spectral
        flow, an area law of the absorptive part of the anomaly form factors as one
        moves away from or returns to the conformal point. These features are absent
        in the local effective action of anomaly interactions, commonly used in the
        description of axion-like particles. The spectral densities in both cases
        are shown to be self-similar. Our results further show that anomaly poles
        correspond to true particle poles only in the conformal limit, when the interaction
        describes a massless S-matrix process supported on a null-surface. Under these
        conditions, they can be effectively described by two kinetically mixed pseudoscalar
        fields propagating on the light-cone. These studies find application in polarized
        deeply inelastic scattering, axion-like dark matter and analogue systems such
        as topological materials.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2502.07296</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2502.07296</id>\n        <created>2025-02-11</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Loginov</keyname>\n
        \                       <forenames>A. Yu.</forenames>\n                </author>\n
        \       </authors>\n        <title>Bound states of a fermion-dyon system</title>\n
        \           <categories>hep-th</categories>\n            <comments>17 pages,
        6 figures</comments>\n            <journal-ref>Eur. Phys. J. C (2025) 85:367</journal-ref>\n
        \           <doi>10.1140/epjc/s10052-025-14073-5</doi>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The bound states of fermions in the external field of
        an Abelian dyon are studied here both analytically and numerically. Their
        existence is due to the dyon&#39;s electric charge resulting from a polarization
        of the fermionic vacuum. The configuration of the dyon&#39;s field is not
        invariant under $P$ or $CP$ transformations. The dependence of the energy
        levels of the fermion-dyon system on a parameter of $CP$ violation is investigated.
        The absence of $P$ invariance results in nonzero electric dipole moments of
        the bound fermionic states. These depend nontrivially on the parameter of
        $CP$ violation. The bound fermionic states also possess nonzero magnetic dipole
        moments. Unlike the electric dipole moments, the magnetic dipole moments are
        practically independent of the parameter of $CP$ violation. In addition, the
        magnitudes of the electric dipole moments significantly exceed those of the
        magnetic dipole moments.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2502.13532</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \           <setSpec>physics:math-ph</setSpec>\n            <setSpec>math:math:MP</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2502.13532</id>\n        <created>2025-02-19</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Orii</keyname>\n                        <forenames>Ippo</forenames>\n
        \               </author>\n        </authors>\n        <title>On dimensions
        of (2+1)D abelian bosonic topological systems on unoriented manifolds</title>\n
        \           <categories>hep-th cond-mat.str-el math-ph math.MP</categories>\n
        \           <comments>22 pages</comments>\n            <journal-ref>Prog.
        Theor. Exp. Phys. 2025, 053B01 (2025)</journal-ref>\n            <doi>10.1093/ptep/ptaf056</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We give a framework to describe abelian bosonic topological
        systems with parity symmetry on a torus in terms of the representation of
        $GL(2,\\bZ)$. However, this information alone does not guarantee that we can
        assign Hilbert spaces to unoriented surfaces in a way compatible with the
        gluing axiom of topological quantum field theory. Here, we show that we can
        assign Hilbert spaces with integer dimensions to unoriented surfaces in the
        case of abelian bosonic topological systems with time-reversal symmetry.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2503.09502</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:nlin:SI</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2503.09502</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Vieyra</keyname>\n
        \                       <forenames>Juan Carlos L\xF3pez</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Turbiner</keyname>\n
        \                       <forenames>Alexander V</forenames>\n                </author>\n
        \       </authors>\n        <title>Tremblay-Turbiner-Winternitz (TTW) system
        at integer index $k$: polynomial algebras of integrals</title>\n            <categories>math-ph
        hep-th math.MP nlin.SI</categories>\n            <comments>51 pages, 4 Appendices,
        22 references: two new references added, typos fixed, several illuminating
        sentences added</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>An infinite 3-parametric family of superintegrable and
        exactly-solvable quantum models on a plane, admitting separation of variables
        in polar coordinates, marked by integer index $k$ was introduced in Journ
        Phys A 42 (2009) 242001 and was called in literature the TTW system. In this
        paper it is conjectured that the Hamiltonian and both integrals of TTW system
        have hidden algebra $g^{(k)}$ - it was checked for $k=1,2,3,4$ - having its
        finite-dimensional representation spaces as the invariant subspaces. It is
        checked that for $k=1,2,3,4$ that the Hamiltonian $H$, two integrals ${\\cal
        I}_{1,2}$ and their commutator ${\\cal I}_{12} = [{\\cal I}_1,{\\cal I}_2]$
        are four generating elements of the polynomial algebra of integrals of the
        order $(k+1)$: $[{\\cal I}_1,{\\cal I}_{12}] = P_{k+1}(H, {\\cal I}_{1,2},{\\cal
        I}_{12})$, $[{\\cal I}_2,{\\cal I}_{12}] = Q_{k+1}(H, {\\cal I}_{1,2},{\\cal
        I}_{12})$, where $P_{k+1},Q_{k+1}$ are polynomials of degree $(k+1)$ written
        in terms of ordered monomials of $H, {\\cal I}_{1,2},{\\cal I}_{12}$. This
        implies that polynomial algebra of integrals is subalgebra of $g^{(k)}$. It
        is conjectured that all is true for any integer $k$.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2503.09967</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2503.09967</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Tian</keyname>\n                        <forenames>Jiahua</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Wang</keyname>\n
        \                       <forenames>Xin</forenames>\n                </author>\n
        \       </authors>\n        <title>Higher Form and Higher Group Symmetries
        via Mirror Symmetry</title>\n            <categories>hep-th</categories>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In this work we uncover a connection that relates the
        1-form and the 2-group symmetries of 5D SCFTs derived from geometric engineering
        methods to monodromies of the corresponding B-models via mirror symmetry.
        Viewing defects as branes wrapping relative cycles in a non-compact CY3, we
        find that the defect groups can be read off from the VEVs of the corresponding
        line operators at the leading order. Via mirror map, we find that both the
        1-form and the 2-group symmetries of the SCFT are related to the monodromy
        at the large radius point in the B-model. Additionally, we recursively obtain
        closed-form expressions of instanton expansions of the VEV of Wilson lines
        of certain 5D theories among which some have not been obtained so far using
        localization methods. We further conjecture that the 2-group symmetry is given
        by the Mordell-Weil torsion of the universal special geometry associated to
        the theory, generalizing the conjecture for rank-1 theories.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
