        \       <authors>\n                <author>\n                    <keyname>Suzuki</keyname>\n
        \                       <forenames>Fumika</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Malla</keyname>\n                        <forenames>Rajesh
        K.</forenames>\n                </author>\n                <author>\n                    <keyname>Sinitsyn</keyname>\n
        \                       <forenames>Nikolai A.</forenames>\n                </author>\n
        \       </authors>\n        <title>Competing Bosonic Reactions: Insight from
        Exactly Solvable Time-Dependent Models</title>\n            <categories>quant-ph
        cond-mat.stat-mech gr-qc hep-th</categories>\n            <comments>18 pages,
        8 figures</comments>\n            <report-no>LA-UR-25-23732</report-no>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We discuss the progress on exactly solvable multistate
        Landau-Zener models from a perspective of their application to competing reactions
        of particle creation from a false vacuum. Such models generally predict that,
        even with identical initial conditions, and for nearly the same other particle
        parameters, a quantum coherent evolution results in a final particle distribution
        with significant asymmetry. We use an exact solution of the driven bosonic
        Tavis-Cummings model for two reaction pathways in order to quantify this effect,
        reveal a corresponding phase transition, and identify its universality class.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2505.00178</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2505.00178</id>\n        <created>2025-04-30</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Palmerduca</keyname>\n                        <forenames>Eric</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Qin</keyname>\n
        \                       <forenames>Hong</forenames>\n                </author>\n
        \       </authors>\n        <title>Zero curvature is a necessary and sufficient
        condition for a spin-orbital decomposition</title>\n            <categories>math-ph
        hep-th math.MP</categories>\n            <comments>32 pages</comments>\n            <journal-ref>Phys.
        Rev. D 111, 125018 (2025)</journal-ref>\n            <doi>10.1103/gv6m-9jtv</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>There has been an extended debate regarding the existence
        of a spin-orbital decomposition of the angular momentum of photons and other
        massless particles. It was recently shown that there are both geometric and
        topological obstructions preventing any such decomposition. Here we show that
        any geometric connection on a particle&#39;s state space induces a splitting
        of the angular momentum into two operators. These operators are well-defined
        angular momentum operators if and only if the connection has zero curvature.
        Massive particles have two canonical curved connections corresponding to boosts
        and rotations, respectively. These can be uniquely combined to produce a flat
        connection, and this gives a novel derivation of the Newton-Wigner position
        operator and the corresponding spin and orbital angular momenta for relativistic
        massive particles. When the mass is taken to zero, transverse boosts and rotations
        degenerate, leaving only a single connection for massless particles. This
        connection produces a commonly proposed splitting of the massless angular
        momentum into two operators. However, the connection is not flat, explaining
        why these operators do not satisfy the angular momentum commutation relations
        and are thus not true spin and orbital angular momentum operators.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
