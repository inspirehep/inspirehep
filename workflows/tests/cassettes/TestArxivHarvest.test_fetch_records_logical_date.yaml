        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>R\xF3is</keyname>\n                        <forenames>Gabriel
        I.</forenames>\n                </author>\n                <author>\n                    <keyname>Junior</keyname>\n
        \                       <forenames>Jos\xE9 Tarciso S. S.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lobo</keyname>\n                        <forenames>Francisco
        S. N.</forenames>\n                </author>\n                <author>\n                    <keyname>Rodrigues</keyname>\n
        \                       <forenames>Manuel E.</forenames>\n                </author>\n
        \       </authors>\n        <title>Horizons, throats and bounces in hybrid
        metric-Palatini gravity with a non-zero potential</title>\n            <categories>gr-qc
        astro-ph.HE hep-th</categories>\n            <comments>34 pages, 13 figures.
        V2: 38 pages 15 figures. Discussion, references and Appendix added. Accepted
        for publication in JCAP</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>This work conducts an in-depth exploration of exact
        electrically charged solutions, including traversable wormholes, black holes,
        and black bounces, within the framework of the scalar-tensor representation
        of hybrid metric-Palatini gravity (HMPG) with a non-zero scalar potential.
        By integrating principles from both the metric and Palatini formulations,
        HMPG provides a flexible approach to addressing persistent challenges in General
        Relativity (GR), such as the late-time cosmic acceleration and the nature
        of dark matter. Under the assumption of spherical symmetry, we employ an inverse
        problem technique to derive exact solutions in both the Jordan and Einstein
        conformal frames. This method naturally leads to configurations involving
        either canonical or phantom scalar fields. A thorough examination of horizon
        structures, throat conditions, asymptotic behaviour, and curvature regularity
        (via the Kretschmann scalar) reveals the intricate causal structures permitted
        by this theoretical model. The analysis uncovers a diverse range of geometric
        configurations, with the phantom sector exhibiting a notably richer spectrum
        of solutions than the canonical case. These solutions encompass traversable
        wormholes, black universe models, where the interior of a black hole evolves
        into an expanding cosmological phase rather than a singularity, as well as
        black bounce structures and multi-horizon black holes. The results demonstrate
        that introducing a non-zero scalar potential within HMPG significantly expands
        the array of possible gravitational solutions, yielding complex causal and
        curvature properties that go beyond standard GR. Consequently, HMPG stands
        out as a powerful theoretical framework for modelling extreme astrophysical
        environments, where deviations from classical gravity are expected to play
        a crucial role.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
