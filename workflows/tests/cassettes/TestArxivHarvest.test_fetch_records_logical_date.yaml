        \           <doi>10.46298/epiga.2023.specialvolumeinhonourofclairevoisin.9626</doi>\n
        \           <license>http://creativecommons.org/licenses/by-sa/4.0/</license>\n
        \           <abstract>We generalize the finiteness theorem for the locus of
        Hodge classes with fixed self-intersection number, due to Cattani, Deligne,
        and Kaplan, from Hodge classes to self-dual classes. The proof uses the definability
        of period mappings in the o-minimal structure $\\mathbb{R}_{\\mathrm{an},\\exp}$.</abstract>\n
