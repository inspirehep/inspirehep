        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19596</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Kir\xE1ly</keyname>\n
        \                       <forenames>Csilla</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lencs\xE9s</keyname>\n
        \                       <forenames>M\xE1t\xE9</forenames>\n                </author>\n
        \       </authors>\n        <title>Entanglement and quench dynamics in the
        thermally perturbed tricritical fixed point</title>\n            <categories>cond-mat.stat-mech
        hep-th</categories>\n            <comments>37 pages, 10 figures, 12 tables</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We consider the Blume-Capel model in the scaling limit
        to realize the thermal perturbation of the tricritical Ising fixed point.
        We develop a numerical scaling-limit extrapolation for one-point functions
        and R\xE9nyi entropies in the ground state. In a mass quench scenario, we
        found long-living oscillations despite the absence of explicit spin-flip symmetry
        breaking or confining potential. We construct form factors of branch-point
        twist fields in the paramagnetic phase. In the scaling limit of small quenches,
        we verify form factor predictions for (i) the energy density and leading magnetic
        field using the dynamics of one-point functions, and (ii) branch-point twist
        fields using the dynamics of R\xE9nyi entropies.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19705</identifier>\n
