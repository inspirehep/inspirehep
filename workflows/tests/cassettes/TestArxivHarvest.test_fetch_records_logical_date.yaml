        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20044</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Guimar\xE3es</keyname>\n                        <forenames>V.
        F.</forenames>\n                </author>\n                <author>\n                    <keyname>Cavalcanti</keyname>\n
        \                       <forenames>R. T.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>da Rocha</keyname>\n
        \                       <forenames>R.</forenames>\n                </author>\n
        \       </authors>\n        <title>Hair imprints of the gravitational decoupling
        and hairy black hole spectroscopy</title>\n            <categories>gr-qc hep-th</categories>\n
        \           <comments>55 pages, 12 figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Hairy black holes by gravitational decoupling (GD) are
        probed to derive the gravitational waveform produced by perturbation theory
        applied to these compact objects. Using the Regge-Wheeler and Zerilli equations
        governing the metric perturbations and applying a higher-order WKB method,
        the quasinormal modes (QNMs) are computed and discussed. Compared to the QNMs
        produced in the ringdown phase of Reissner-Nordstr\xF6m black hole solutions,
        it yields a clear physical signature of primary hair imprinting the hairy
        GD black hole gravitational waveforms.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20077</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20077</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Hu</keyname>\n
        \                       <forenames>Peng-Ju</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Ma</keyname>\n                        <forenames>Liang</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Pang</keyname>\n
        \                       <forenames>Yi</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Saskowski</keyname>\n
        \                       <forenames>Robert J.</forenames>\n                </author>\n
        \       </authors>\n        <title>Higher-derivative Heterotic Kerr-Sen Black
        Holes</title>\n            <categories>hep-th</categories>\n            <comments>47
        pages, 1 figure; Mathematica file included</comments>\n            <report-no>USTC-ICTS/PCFT-25-23</report-no>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We obtain the four-derivative corrections to the Kerr-Sen
        solution in heterotic supergravity, which includes the Gibbons-Maeda-Garfinkle-Horowitz-Strominger
        solution as a limiting case. In particular, we first embed the Kerr solution
        into heterotic supergravity and compute the higher-derivative corrections.
        We then obtain the corrections to the Kerr-Sen solution by performing an $O(2,1)$
        boost of the Kerr solution, which, in contrast to the two-derivative case,
        requires field redefinitions to make the $O(2,1)$ invariance of the action
        manifest. Finally, we compute the multipole moments and find that they are
        distinct from those of the Kerr solution at the four-derivative level. We
        also find that the multipole moments are distinct from those of the Kerr-Newman
        solution in Einstein-Maxwell theory at the four-derivative level, even for
        the most general choice of four-derivative corrections. This gives a way to
        experimentally distinguish traces of string theory in gravitational wave data.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20095</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20095</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>He</keyname>\n                        <forenames>Song</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Jiang</keyname>\n
        \                       <forenames>Xuhang</forenames>\n                </author>\n
        \       </authors>\n        <title>Solving Infinite Families of Dual Conformal
        Integrals and Periods</title>\n            <categories>hep-th</categories>\n
        \           <comments>44 pages, many figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We compute infinite families of all-loop planar, dual
        conformal invariant (DCI) integrals, which contribute to four-point Coulomb-branch
        amplitudes and correlators in ${\\cal N}=4$ supersymmetric Yang-Mills theory,
        by solving ``boxing&#34; differential equations via package HyperlogProcedures;
        this amounts to an ``inverse-boxing&#34; operation/integration recursively
        acting on lower-loop cases (with the box integral as the starting point),
        and the resulting single-valued harmonic polylogarithmic functions (SVHPL)
        are nicely labeled by ``binary&#34; strings of $0$ and $1$ without consecutive
        $1$&#39;s. These functions are special cases of the so-called generalized
        ladders studied in arXiv:1207.3824, where extended Steinmann relations are
        imposed due to planarity, and they are counted by the Fibonacci sequence.
        Our results can be viewed as ``two-dimensional&#34; extensions of the well-known
        ladder integrals to many more infinite families of DCI integrals: the ladders
        have strings with a single $1$ followed by all $0$&#39;s, and the other extreme,
        which nicely evaluate to the ``zigzag&#34; SVHPL functions with alternating
        $1$&#39;s and $0$&#39;s, are nothing but the four-point DCI integrals from
        the very special family of anti-prism $f$-graphs. We also study periods of
        these integrals: while their periods are in general complicated single-valued
        multiple zeta values (SVMZV), the ``zigzag&#34; DCI integrals from anti-prism
        gives exactly the famous ``zigzag&#34; periods proportional to $\u03B6_{2L{+}1}$,
        and empirically it provides a numerical lower-bound for $L$-loop periods of
        any binary string, with the upper-bound given by that of the ladder. Based
        on $f$-graphs as a tool for studying these periods, we discuss several interesting
        facts and observations about these (motivic) SVMZV and relations among them
        to all loops, and enumerate a basis for them up to $L=10$.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
