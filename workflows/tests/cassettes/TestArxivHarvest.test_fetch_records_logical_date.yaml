        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.04503</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Martin</keyname>\n                        <forenames>Lucas</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Parlanti</keyname>\n
        \                       <forenames>Martin</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Schvellinger</keyname>\n
        \                       <forenames>Martin</forenames>\n                </author>\n
        \       </authors>\n        <title>Glueball-fermion hard scattering from type
        IIB superstring theory</title>\n            <categories>hep-th</categories>\n
        \           <comments>27 pages, a sign has been corrected in equation (2.10)
        and a reference updated</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We calculate the glueball-fermion hard-scattering amplitude
        from the dilaton-dilatino closed string scattering amplitude in type IIB superstring
        theory, in the framework of the gauge/string theory duality. We investigate
        its high-energy scaling at fixed angle and also in the Regge limit. We derive
        the leading and sub-leading terms contributing to the scattering cross section.
        This dual calculation of the glueball-fermion scattering amplitude is particularly
        interesting since it involves the scattering of two different types of external
        states. We calculate explicitly some angular integrals for two scalar spherical
        harmonics and two spinor spherical harmonics on the five-sphere, leading to
        selection rules.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
