        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Polychronakos</keyname>\n                        <forenames>Alexios
        P.</forenames>\n                </author>\n                <author>\n                    <keyname>Sfetsos</keyname>\n
        \                       <forenames>Konstantinos</forenames>\n                </author>\n
        \       </authors>\n        <title>Triple critical point and emerging temperature
        scales in $SU(N)$ ferromagnetism at large $N$</title>\n            <categories>hep-th
        cond-mat.stat-mech math-ph math.MP nlin.SI</categories>\n            <comments>41
        pages, 9 figures</comments>\n            <journal-ref>Nuclear Physics B 1009,
        December 2024, 116748</journal-ref>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The non-Abelian ferromagnet recently introduced by the
        authors, consisting of atoms in the fundamental representation of $SU(N)$,
        is studied in the limit where $N$ becomes large and scales as the square root
        of the number of atoms $n$. This model exhibits additional phases, as well
        as two different temperature scales related by a factor $N\\!/\\!\\ln N$.
        The paramagnetic phase splits into a &#34;dense&#34; and a &#34;dilute&#34;
        phase, separated by a third-order transition and leading to a triple critical
        point in the scale parameter $n/N^2$ and the temperature, while the ferromagnetic
        phase exhibits additional structure, and a new paramagnetic-ferromagnetic
        metastable phase appears at the larger temperature scale. These phases can
        coexist, becoming stable or metastable as temperature varies. A generalized
        model in which the number of $SU(N)$-equivalent states enters the partition
        function with a nontrivial weight, relevant, e.g., when there is gauge invariance
        in the system, is also studied and shown to manifest similar phases, with
        the dense-dilute phase transition becoming second-order in the fully gauge
        invariant case.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2410.18285</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
