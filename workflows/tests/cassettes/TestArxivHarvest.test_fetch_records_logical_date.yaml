        \       <id>2406.09122</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Ballesteros</keyname>\n
        \                       <forenames>Guillermo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Juan</keyname>\n                        <forenames>Joaquim
        Iguaz</forenames>\n                </author>\n                <author>\n                    <keyname>Serpico</keyname>\n
        \                       <forenames>Paquale D.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Taoso</keyname>\n                        <forenames>Marco</forenames>\n
        \               </author>\n        </authors>\n        <title>Primordial black
        hole formation from self-resonant preheating?</title>\n            <categories>astro-ph.CO
        gr-qc hep-ph hep-th</categories>\n            <comments>20 pages, 6 figures.
        Clarifications added, results unchanged; matches published version in PRD</comments>\n
        \           <license>http://creativecommons.org/licenses/by-nc-sa/4.0/</license>\n
        \           <abstract>We revisit the question of how generic is the formation
        of primordial black holes via self-resonant growth of inflaton fluctuations
        in the post-inflationary, preheating phase. Using analytical and lattice calculations,
        we find that primordial black hole production is far from being a generic
        outcome. Also, in most of the parameter space of viable inflationary models,
        the metric preheating term is subleading to the anharmonic terms and the approximation
        of a quadratic potential for describing the resonance dynamics is inadequate.
        Nonetheless, the anharmonicity of the potential cannot be used to rescue the
        mechanism: The generic outcome of the non-linear evolution of the scalar field
        in this case is the formation of metastable transients or oscillons, that
        do not generically collapse into black holes.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2407.01832</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:quant-ph</setSpec>\n
        \           <setSpec>physics:cond-mat:mes-hall</setSpec>\n            <setSpec>physics:cond-mat:stat-mech</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:physics:atm-clus</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2407.01832</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Hotta</keyname>\n                        <forenames>Masahiro</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Ikeda</keyname>\n
        \                       <forenames>Kazuki</forenames>\n                </author>\n
        \       </authors>\n        <title>Exceeding the maximum classical energy
        density in fully charged quantum batteries</title>\n            <categories>quant-ph
        cond-mat.mes-hall cond-mat.stat-mech hep-th physics.atm-clus</categories>\n
        \           <comments>5 pages, 2 figures</comments>\n            <journal-ref>Quantum
        Inf Process 24, 186 (2025)</journal-ref>\n            <doi>10.1007/s11128-025-04804-8</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Quantum batteries are anticipated to achieve significant
        advancements in energy storage capacity. In classical batteries, the energy
        density at each subsystem reaches its maximum value, denoted as $E_C$, which
        is determined by dividing the maximum energy by the number of subsystems.
        We demonstrate that this limit can be surpassed in quantum batteries by protocols
        of Quantum Energy Teleportaion (QET), allowing for the energy density at a
        subsystem to exceed the value of $E_C$. Our protocol offers enhanced efficiency,
        reduces experimental complexity on quantum computers, and enables instantaneous
        energy charging through Local Operations and Classical Communication (LOCC).
        Leveraging quantum entanglement, this protocol significantly improves quantum
        energy storage systems, promising advances in quantum computing and new technological
        applications. This work represents a crucial step towards revolutionizing
        quantum energy storage and transfer.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2407.08799</identifier>\n        <datestamp>2025-06-25</datestamp>\n
