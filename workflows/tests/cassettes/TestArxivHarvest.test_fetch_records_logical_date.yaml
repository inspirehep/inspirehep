        \       </authors>\n        <title>Effective action of bosonic string theory
        at order $\u03B1&#39;^3$</title>\n            <categories>hep-th</categories>\n
        \           <comments>30 pages, Latex file, no figure</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this work, we derive the classical effective action
        of bosonic string theory at order $\u03B1&#39;^{3}$ for the metric, Kalb-Ramond
        field, and dilaton by imposing a higher-derivative extension of the Buscher
        rules on the circular reduction of the minimal basis at this order, in the
        schemes where their corresponding actions at order $\u03B1&#39;$ are the Meissner
        and the Metsaev-Tseytlin schemes. We find that T-duality fixes all coupling
        constants in terms of the known overall factor at order $\u03B1&#39;$ and
        a single remaining parameter. This final parameter is determined by matching
        the single-trace term $\\Tr(\u03B5\u03B5\u03B5\u03B5)$ in the four-graviton
        S-matrix element which lacks a massless pole, with the corresponding string
        theory amplitude. Our results for the Riemann quartic terms are in full agreement
        with those obtained from the nonlinear sigma-model approach.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19515</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:astro-ph:CO</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19515</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Niedermann</keyname>\n
        \                       <forenames>Florian</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Padilla</keyname>\n
        \                       <forenames>Antonio</forenames>\n                </author>\n
        \       </authors>\n        <title>Higher co-dimension de Sitter branes</title>\n
        \           <categories>hep-th astro-ph.CO gr-qc hep-ph</categories>\n            <comments>9
        pages including references</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We extend the arguments of Maldacena and N\xFA\xF1ez
        to include higher co-dimension brane setups and derive a new no-go theorem.
        Specifically, we show that under reasonable assumptions on the energy-momentum
        conservation and the bulk curvature, co-dimension-two branes fail to support
        stable de Sitter solutions. For co-dimensions higher than two embedded in
        a compact internal space, we show that negative tension sources would be required.
        This result places strong constraints on the viability of higher-dimensional
        braneworld models as a means to obtain de Sitter space within string theory.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19553</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:str-el</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19553</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Liu</keyname>\n                        <forenames>Yan</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Wang</keyname>\n
        \                       <forenames>Chuan-Yi</forenames>\n                </author>\n
        \       </authors>\n        <title>Energy transport in holographic junctions</title>\n
        \           <categories>hep-th cond-mat.str-el gr-qc</categories>\n            <comments>29
        pages, 6 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We study energy transport in a conformal junction connecting
        three 2D conformal field theories using the AdS/CFT correspondence. The holographic
        dual consists of three AdS$_3$ spacetimes joined along the worldsheet of a
        tensile string anchored at the junction. Within a specific range of string
        tension, where the bulk solution is uniquely determined, we find that all
        energy reflection and transmission coefficients vary monotonically with the
        string tension. Notably, the total energy transmission, which quantifies the
        energy flux from one CFT through the junction, is bounded above by the effective
        central charge associated with both the CFTs and the junction. Results for
        energy transport in conformal interfaces are recovered in a special limit.
        Furthermore, we extend our analysis to junctions connecting $N$ 2D CFTs.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19564</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19564</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>O&#39;Connor</keyname>\n
        \                       <forenames>Joshua</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Altschul</keyname>\n
        \                       <forenames>Brett</forenames>\n                </author>\n
        \       </authors>\n        <title>Dalitz Plot Kinematics for a Lorentz-Violating
        Three-Body Decay</title>\n            <categories>hep-ph hep-th</categories>\n
        \           <comments>21 pages</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Rates for particle interaction processes and decays
        will be modified in a Lorentz-violating quantum field theory, because of changes
        to the particle kinematics$-$particularly through the modified dispersion
        relations affecting the outgoing particle phase space. We outline here these
        changes to the rates for three-particle decays. Considering a process with
        a constant scattering amplitude (not directly modified by the Lorentz violation),
        we calculate leading order corrections to the kinematics for a decay into
        three identical spinless particles whose propagation is affected by a $c_{\u03BC\u03BD}$-type
        symmetric tensor background. We examine the angular distribution of the daughter
        particles and describe the shape of the corresponding Dalitz plot outlining
        the kinematically allowed region, according to two toy models for the $c_{\u03BC\u03BD}$
        textures. Precision measurements of the boundaries of this region could be
        used to constrain Lorentz violation coefficients for the particles involved
        in processes such as $\u03B7\\rightarrow 3\u03C0^{0}$.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19596</identifier>\n
