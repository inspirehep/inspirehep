        \                       <forenames>Ziqi</forenames>\n                </author>\n
        \       </authors>\n        <title>Nonrelativistic Short-Distance Completions
        of a Naturally Light Higgs</title>\n            <categories>hep-ph hep-lat
        hep-th</categories>\n            <comments>6 pages</comments>\n            <journal-ref>Phys.Lett.
        B 868 (2025) 139665</journal-ref>\n            <doi>10.1016/j.physletb.2025.139665</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Nonrelativistic scalar field theories can exhibit a
        natural cascading hierarchy of scales, protected by a hierarchy of polynomial
        shift symmetries. Using a simple model, we argue that a high-energy cross-over
        to such nonrelativistic behavior naturally leads to light scalars, and thus
        represents a useful ingredient for technically natural resolutions of scalar
        mass hierarchies, perhaps even the Higgs mass hierarchy puzzle.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
