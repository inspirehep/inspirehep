        \           <setSpec>physics:hep-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19182</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Epelbaum</keyname>\n
        \                       <forenames>E.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Gegelia</keyname>\n
        \                       <forenames>J.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Mei\xDFner</keyname>\n
        \                       <forenames>Ulf-G.</forenames>\n                </author>\n
        \       </authors>\n        <title>Vacuum energy in effective field theory
        of general relativity</title>\n            <categories>hep-th gr-qc hep-ph</categories>\n
        \           <comments>4 pages</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>It is shown to all orders of perturbation theory that
        in the effective field theory of general relativity the condition of vanishing
        of the vacuum energy leads to the same value of the cosmological constant,
        viewed as a parameter of the effective Lagrangian, as obtained by demanding
        the consistency of the effective field theory in Minkowski background. The
        resulting effective action is characterized by the cosmological constant term
        that vanishes exactly.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19194</identifier>\n        <datestamp>2025-06-25</datestamp>\n
