        \           <setSpec>physics:astro-ph:HE</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19906</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Fiorillo</keyname>\n                        <forenames>Damiano
        F. G.</forenames>\n                </author>\n                <author>\n                    <keyname>Lella</keyname>\n
        \                       <forenames>Alessandro</forenames>\n                </author>\n
        \               <author>\n                    <keyname>O&#39;Hare</keyname>\n
        \                       <forenames>Ciaran A. J.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Vitagliano</keyname>\n
        \                       <forenames>Edoardo</forenames>\n                </author>\n
        \       </authors>\n        <title>Leading bounds on micro- to picometer fifth
        forces from neutron star cooling</title>\n            <categories>hep-ph astro-ph.HE
        hep-th</categories>\n            <comments>5 pages, 1 figure + 11 pages, 4
        figures</comments>\n            <report-no>BARI-TH/776-25</report-no>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The equivalence principle and the inverse-square law
        of gravity could be violated at short distances ($10^{-6}$ to $10^{-12}$ meters)
        by scalars sporting a coupling $g_N$ to nucleons and mass $\\mathrm{eV}\\lesssim
        m_\u03D5\\lesssim\\rm MeV$. We show for the first time that stringent bounds
        on the existence of these scalars can be derived from the observed cooling
        of nearby isolated neutron stars (NSs). Although NSs can only be used to set
        limits comparable to the classic SN 1987A cooling bound in the case of pseudoscalars
        such as the QCD axion, the shallow temperature dependence of the scalar emissivity
        results in a huge enhancement in the effect of $\u03D5$ on the cooling of
        cold NSs. As we do not find evidence of exotic energy losses, we can exclude
        couplings down to $g_N\\lesssim 5 \\times 10^{-14}$. Our new bound supersedes
        all existing limits on scalars across six orders of magnitude in $m_\u03D5$.
        These conclusions also extend to Higgs-portal models, for which the bound
        on the scalar-Higgs mixing angle is $\\sin\u03B8\\lesssim 6\\times 10^{-11}$.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19907</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>math:math:CO</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19907</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Figueiredo</keyname>\n                        <forenames>Carolina</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Vaz\xE3o</keyname>\n
        \                       <forenames>Francisco</forenames>\n                </author>\n
        \       </authors>\n        <title>Correlator Polytopes</title>\n            <categories>hep-th
        hep-ph math.CO</categories>\n            <comments>15 pages, 4 figures</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Recently, &#34;cosmohedra&#34; have been introduced
        as polytopes underlying the cosmological wavefunction for conformally coupled
        Tr($\u03A6^3$) theory in FRW cosmologies, generalizing associahedra for flat
        space scattering amplitudes. In this letter we show that correlation functions
        are also directly captured by a new polytope - the &#34;Correlatron&#34;.
        The combinatorics of correlation functions is an interesting blend of flat
        space scattering amplitudes and wavefunctions. This is reflected in the correlatron
        geometry, which is a one-higher dimensional polytope sandwiched between cosmohedron
        and associahedron facets. We provide an explicit embedding for the correlatron,
        which is a natural extension of the &#34;shaving&#34; picture for cosmohedra
        to one higher dimension. As a byproduct, we also define &#34;graph correlahedra&#34;
        as polytopes for the contribution to correlators from any fixed graph. We
        show how the canonical form of these polytopes directly computes the graph
        correlator, without the power of two weights seen in previous geometric formulations.
        Finally, we give a prescription for extracting the full correlator from the
        canonical form of the correlatron.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19909</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19909</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Perez-Lona</keyname>\n
        \                       <forenames>A.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sharpe</keyname>\n
        \                       <forenames>E.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Yu</keyname>\n                        <forenames>X.</forenames>\n
        \               </author>\n        </authors>\n        <title>Categorified
        structures over moduli spaces: Anomalies, non-invertible symmetries, and exceptional
        holonomy</title>\n            <categories>hep-th</categories>\n            <comments>43
        pages, LaTeX</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this note, we propose an extension of the relation
        between worldsheet global symmetries and structures over moduli spaces of
        superconformal field theories (SCFTs) to include noninvertible symmetries.
        The most familiar examples of such structures associated to an ordinary symmetry
        are the Bagger-Witten line bundles, which arise over the moduli spaces of
        two-dimensional N=(2,2) SCFTs from a non-anomalous worldsheet U(1)_R symmetry
        and its associated spectral flow operators. Generalizing this setting, we
        consider examples involving anomalous worldsheet symmetries, which, despite
        not being gaugeable, can still give rise to global structures over moduli
        space -- as illustrated by the momentum/winding symmetries in toroidal compactifications
        and higher group gauge symmetry structure in spacetime. Motivated by this
        analogy, we conjecture the existence of a stack of fusion categories over
        moduli spaces of G_2 and Spin(7) holonomy manifolds which acts as a noninvertible
        analogue of the Hodge or Bagger-Witten line bundles over Calabi-Yau moduli
        spaces. This proposal is based on the observation that SCFTs associated with
        such exceptional holonomy manifolds contain (tricritical) Ising sectors that
        play a role analogous to the U(1)_R symmetry in N=2 theories. Although these
        symmetries are not gaugeable, they behave similarly to anomalous invertible
        symmetries, providing the conceptual foundation for the proposed moduli space
        structure.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.19914</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19914</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Shiu</keyname>\n                        <forenames>Gary</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Tonioni</keyname>\n
        \                       <forenames>Flavio</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Tran</keyname>\n                        <forenames>Hung
        V.</forenames>\n                </author>\n        </authors>\n        <title>Long-lived
        SEC violation via DM/DE couplings</title>\n            <categories>hep-th</categories>\n
        \           <comments>4+2 pages, all comments welcome</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We discuss a cosmological scenario where an effective
        violation of the strong energy condition (SEC) is realized through a coupling
        between SEC-fulfilling dark matter (DM) and dark energy (DE). Although the
        SEC-violating solutions might in principle last for an arbitrarily long time,
        we highlight several challenges that string realizations must face: most notably,
        the identification of suitable heavy states and their relationship with the
        theory cutoff. We also discuss negative potentials in the presence of a tower
        of light states, showing that the DM/DE coupling can push the theory towards
        regions of parametric control.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19915</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:cond-mat:str-el</setSpec>\n            <setSpec>physics:cond-mat:dis-nn</setSpec>\n
        \           <setSpec>physics:cond-mat:quant-gas</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:quant-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19915</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Li</keyname>\n
        \                       <forenames>Yu-Chen</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Zhou</keyname>\n                        <forenames>Tian-Gang</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Zhang</keyname>\n
        \                       <forenames>Shengyu</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Wu</keyname>\n                        <forenames>Ze</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Zhao</keyname>\n
        \                       <forenames>Liqiang</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Yin</keyname>\n                        <forenames>Haochuan</forenames>\n
        \               </author>\n                <author>\n                    <keyname>An</keyname>\n
        \                       <forenames>Xiaoxue</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Zhai</keyname>\n                        <forenames>Hui</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Zhang</keyname>\n
        \                       <forenames>Pengfei</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Peng</keyname>\n                        <forenames>Xinhua</forenames>\n
        \               </author>\n        </authors>\n        <title>Error-resilient
        Reversal of Quantum Chaotic Dynamics Enabled by Scramblons</title>\n            <categories>cond-mat.str-el
        cond-mat.dis-nn cond-mat.quant-gas hep-th quant-ph</categories>\n            <comments>7
        pages, 4 figures, supplementary material 13 pages, 5 figures, 4 tables</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The emergence of the arrow of time in quantum many-body
        systems stems from the inherent tendency of Hamiltonian evolution to scramble
        quantum information and increase entanglement. While, in principle, one might
        counteract this temporal directionality by engineering a perfectly inverted
        Hamiltonian to reverse entanglement growth, such a scenario is fundamentally
        unstable because even minor imperfections in the backward evolution can be
        exponentially amplified, a hallmark of quantum many-body chaos. Therefore,
        successfully reversing quantum many-body dynamics demands a deep understanding
        of the underlying structure of quantum information scrambling and chaotic
        dynamics. Here, by using solid-state nuclear magnetic resonance on a macroscopic
        ensemble of randomly interacting spins, we measure the out-of-time-ordered
        correlator (OTOC) and validate key predictions of scramblon theory, a universal
        theoretical framework for information scrambling. Crucially, this theory enables
        us to isolate and mitigate errors in the OTOC caused by imperfections in the
        backward evolution. As a result, this protocol uncovers the anticipated exponential
        behavior of quantum many-body chaos and extracts the quantum Lyapunov exponent
        in a many-body experimental system for the first time. Our results push the
        fundamental limits of dynamical reversibility of complex quantum systems,
        with implications for quantum simulation and metrology.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19916</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19916</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Polychronakos</keyname>\n
        \                       <forenames>Alexios P.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sfetsos</keyname>\n
        \                       <forenames>Konstantinos</forenames>\n                </author>\n
        \       </authors>\n        <title>Nonabelian ferromagnets with three-body
        interactions</title>\n            <categories>hep-th cond-mat.stat-mech math-ph
        math.MP</categories>\n            <comments>28 pages, 2 figures</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We study the thermodynamics of nonabelian ferromagnets
        consisting of atoms in the fundamental representation of $SU(N)$ and interacting
        with two-body and three-body interactions. An intricate phase structure emerges,
        depending on the relative strength and sign of the two-body and three-body
        coupling constants. In the case where two-body interactions are ferromagnetic
        and three-body ones are antiferromagnetic, we uncover a rich cascade of phase
        transitions, the appearance of phases with two distinct polarization directions
        being the most striking novel feature. Our results are relevant to magnetic
        systems where higher-body interactions cannot be neglected.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19924</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19924</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Zigdon</keyname>\n                        <forenames>Yoav</forenames>\n
        \               </author>\n        </authors>\n        <title>A Charge Constraint
        in BMN</title>\n            <categories>hep-th</categories>\n            <comments>34
        pages, one appendix, one figure and one table</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>I derive a new charge constraint that ties the four
        angular momenta in a $\\frac{1}{16}$-BPS sector of the Berenstein, Maldacena,
        and Nastase (BMN) supersymmetric $U(N)$ matrix quantum mechanics. The result
        is related to the charge constraint of the $U(N)$, $\\mathcal{N}=4$ Super-Yang-Mills
        (SYM) conformal field theory by identifying three SYM charges with three BMN
        angular momenta generating $SO(6)$, two equal SYM angular momenta with a BMN
        angular momentum of $SO(3)$, and scaling $N^2$ by $3$. The BMN charge constraint
        could be useful to determine whether there exists a dual supersymmetric black
        hole solution asymptoting to a plane-wave background.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19950</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-ph</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19950</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Goyal</keyname>\n                        <forenames>Aman</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Jana</keyname>\n
        \                       <forenames>Aneek</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Mandal</keyname>\n
        \                       <forenames>Swapnanil</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sinha</keyname>\n                        <forenames>Aninda</forenames>\n
        \               </author>\n        </authors>\n        <title>Fermionic S-matrix
        and cosmological correlators: T-violation at O(H)</title>\n            <categories>hep-th
        gr-qc hep-ph</categories>\n            <comments>51 pages, 8 figures</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We study the Bunch-Davies (BD) and Unruh-de Witt (UdW)
        de Sitter S-matrices in the presence of spin-$1/2$ fermions. Building on recent
        work, this enables us to correlate the de Sitter S-matrix with cosmological
        correlators. We consider a finite-time version of the UdW S-matrix to study
        $O(H)$ corrections to some typical particle physics processes such as beta
        decay. Owing to the lack of time-reversal symmetry in the expanding Poincar\xE9
        patch, we find signatures of intrinsic T-violation in polarized beta decay.
        The observable we study begins at $O(H)$. The possibility of T-violation was
        examined theoretically in the 1950&#39;s by Jackson, Treiman, and Wyld in
        flat space and has been probed more recently in the emiT experiment, with
        the purpose of examining fundamental T-violation coming from additional interactions
        in the Lagrangian. Our analysis places a lower bound on the intrinsic T-violation
        in the expanding Poincar\xE9 patch. At $O(H)$, we find both energy conserving
        and energy non-conserving contributions. Surprisingly, the energy-violating
        piece, in principle, can give large T-violation at fine-tuned values of the
        kinematical variables.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20028</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>math:math:NT</setSpec>\n
        \           <setSpec>math:math:RT</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20028</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Murthy</keyname>\n
        \                       <forenames>Sameer</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Witten</keyname>\n
        \                       <forenames>Edward</forenames>\n                </author>\n
        \       </authors>\n        <title>Localization of strings on group manifolds</title>\n
        \           <categories>hep-th math.NT math.RT</categories>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We compute the partition function of the WZW model with
        target a compact Lie group $G$ by adapting a method used by Choi and Takhtajan
        to compute the heat kernel of the group manifold. The basic idea is to compute
        the partition function of a supersymmetric version of the WZW model using
        a form of supersymmetric localization and then use the fact that, since the
        fermions of the supersymmetric WZW model are actually decoupled from the bosons,
        this also determines the partition function of the purely bosonic WZW model.
        The result is a formula for the partition function as a sum over contributions
        from abelian classical solutions. We verify for $G=SU(2)$ that this formula
        agrees with the result for the same partition function that comes from the
        Weyl-Kac character formula. We extend the method of supersymmetric localization
        to certain related models such as the $SL(2,\\mathbb{R})$ WZW model and a
        Wick-rotated version of this model in which the target space is hyperbolic
        three-space $H_3^+$.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20044</identifier>\n        <datestamp>2025-06-26</datestamp>\n
