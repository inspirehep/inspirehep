        \               <author>\n                    <keyname>Wang</keyname>\n                        <forenames>Zhi-Wei</forenames>\n
        \               </author>\n        </authors>\n        <title>Testing the
        dark SU(N) Yang-Mills theory Confined Landscape: From the Lattice to Gravitational
        Waves</title>\n            <categories>hep-ph astro-ph.HE gr-qc hep-lat hep-th</categories>\n
        \           <comments>17 pages, 13 figures; v2: corrected Fig.12 &amp; typos,
        updated refs; v3: matches journal version; v4: minor corrections</comments>\n
        \           <doi>10.1103/PhysRevD.104.035005</doi>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We pave the way for future gravitational-wave detection
        experiments, such as the Big Bang Observer and DECIGO, to constrain dark sectors
        made of SU(N) Yang-Mills confined theories. We go beyond the state-of-the-art
        by combining first principle lattice results and effective field theory approaches
        to infer essential information about the non-perturbative dark deconfinement
        phase transition driving the generation of gravitational-waves in the early
        universe, such as the order, duration and energy budget of the phase transition
        which are essential in establishing the strength of the resulting gravitational-wave
        signal.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
