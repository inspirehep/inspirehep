        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Nawata</keyname>\n                        <forenames>Satoshi</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Tao</keyname>\n
        \                       <forenames>Runkai</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Yokoyama</keyname>\n
        \                       <forenames>Daisuke</forenames>\n                </author>\n
        \       </authors>\n        <title>An introduction to 2d conformal field theory</title>\n
        \           <categories>hep-th</categories>\n            <comments>138 pages,
        no originality claimed, comments are welcome. v2; corrections in section 4.2,9.3,9.5,9.7
        with apology for text overlaps by the first author in v1; v3 added explanation
        on conformal blocks, improved presentations and corrected typos; v4,v5 typos
        corrected</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>These lecture notes provide a comprehensive introduction
        to 2d conformal field theory, covering foundational topics such as free fields,
        minimal models, Zamolodchikov&#39;s $c$-theorem, Wess-Zumino-Witten models,
        modular invariant partition functions, and the connections to entanglement
        entropy. The material presented is based on lectures at the Southeast University
        Summer School and the course at Fudan University.</abstract>\n    </arXiv>\n\n
