        \               <author>\n                    <keyname>Souza</keyname>\n                        <forenames>Reinaldo
        de Melo e</forenames>\n                </author>\n                <author>\n
        \                   <keyname>Zarpelon</keyname>\n                        <forenames>Gabriel</forenames>\n
        \               </author>\n        </authors>\n        <title>Influence of
        a Perfectly Conducting Plate on the Uehling Potential of QED</title>\n            <categories>hep-th</categories>\n
        \           <comments>19 pages + references, 7 figures; v2: minor changes,
        references added</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this work, we investigate the influence of a perfectly
        conducting plate on the Uehling potential of Quantum Electrodynamics (QED),
        corresponding to the first loop correction to the classical Coulomb potential
        in that situation. We use the method of images adapted to the photon propagator,
        extending the method beyond the standard (classical) tree level calculation.
        We show that the effect of the plate on the quantum correction is much stronger
        than the expectation from a naive application of the method of images.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
