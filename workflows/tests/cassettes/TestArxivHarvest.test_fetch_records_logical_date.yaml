        \       <id>2503.18818</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Avil\xE9s</keyname>\n
        \                       <forenames>Luis</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Fuentealba</keyname>\n
        \                       <forenames>Oscar</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Hidalgo</keyname>\n
        \                       <forenames>Diego</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Rodr\xEDguez</keyname>\n
        \                       <forenames>Pablo</forenames>\n                </author>\n
        \       </authors>\n        <title>AdS$_3$ Carroll gravity: asymptotic symmetries
        and C-thermal configurations</title>\n            <categories>hep-th gr-qc</categories>\n
        \           <comments>24 pages. No figures. Matches published version in JHEP</comments>\n
        \           <doi>10.1007/JHEP05(2025)174</doi>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The asymptotic structure of three-dimensional Carroll
        gravity with negative cosmological constant is studied. We formulate a consistent
        set of boundary conditions preserved by an infinite-dimensional extension
        of the AdS$_3$ Carroll algebra, which turns out to be isomorphic to a precise
        generalized BMS$_3$ algebra. This is described by four independent functions
        of the circle at infinity, generating spatial superrotations, Carroll superboosts,
        spatial supertranslations and time supertranslations. Remarkably, this asymptotic
        symmetry algebra contains as subalgebras to BMS$_3$ (generated by spatial
        superrotations and time supertranslations) and the two-dimensional conformal
        algebra (spanned by spatial superrotations and spatial supertranslations).
        We also introduce a new solution - endowed with a Carroll extremal surface
        - that fulfills this set of asymptotic conditions. By taking advantage of
        the Chern-Simons formulation of the theory, Carroll thermal properties, obtained
        from regularity conditions, and entropy of the configuration are also addressed.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
