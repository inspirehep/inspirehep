        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:astro-ph:CO</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2503.02940</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Lambiase</keyname>\n
        \                       <forenames>Gaetano</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Poddar</keyname>\n
        \                       <forenames>Tanmay Kumar</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Visinelli</keyname>\n
        \                       <forenames>Luca</forenames>\n                </author>\n
        \       </authors>\n        <title>Impact of the cosmic neutrino background
        on black hole superradiance</title>\n            <categories>hep-ph astro-ph.CO
        gr-qc hep-th</categories>\n            <comments>10 pages, 2 figure. Matches
        published version. COST Actions CA21106 and CA21136</comments>\n            <report-no>CA21106;
        CA21136</report-no>\n            <doi>10.1103/yfwv-37ss</doi>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We assess the effect of the Cosmic Neutrino Background
        (C$\u03BD$B) on superradiant instabilities caused by an ultralight scalar
        field around spinning black holes (BHs). When the scalar couples to neutrinos
        via a Yukawa interaction, thermal corrections from the C$\u03BD$B induce a
        quartic self-interaction and an effective mass term for the scalar. We show
        that, for Yukawa couplings as small as $y_{\u03D5\u03BD} \\sim 10^{-16}$ (for
        astrophysical BHs) or $10^{-20}$ (for supermassive BHs), the quartic term
        can quench the instability and set observable bounds, even if the scalar does
        not constitute dark matter. We assess the robustness of these constraints
        against several sources of uncertainty, including gravitational focusing of
        relic neutrinos, galactic clustering, and non-linear backreaction. An enhanced
        local neutrino density weakens the bounds by up to an order of magnitude compared
        to a uniform background, yet the induced self-interaction remains strong enough
        to significantly affect the superradiant dynamics. Our results open a new
        observational window on neutrino-coupled scalars via BH superradiance.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2503.18090</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2503.18090</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Maulik</keyname>\n                        <forenames>Sabyasachi</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Pari</keyname>\n
        \                       <forenames>Soumen</forenames>\n                </author>\n
        \       </authors>\n        <title>Entanglement entropy and its linear response
        following a global quench in holographic Gauss-Bonnet gravity</title>\n            <categories>hep-th</categories>\n
        \           <comments>v2: References added, section on mutual information
        updated</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Growth of entanglement entropy in time-dependent states
        formed due to a global quench in holographic conformal field theories which
        admit an Einstein-Gauss-Bonnet dual gravity description is studied. The global
        quench in the bulk is modelled by an AdS Vaidya solution with an electric
        charge. It is observed that the Gauss-Bonnet correction parameter leads to
        faster thermalization, and lower saturation entropy. The rate of growth also
        depends crucially on the correction, and may exceed 1 in general spacetime
        dimensions. Nevertheless, the growth still follows the universal pattern expected
        for relativistic CFTs. Additionally, a time-dependent analogue of relative
        entropy introduced in [12] is generalized to include correction from the Gauss-Bonnet
        parameter. We demonstrate our findings through concrete examples, including
        instantaneous, linear, and periodically driven quenches. We also briefly mention
        the evolution of mutual information.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2503.21404</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:quant-ph</setSpec>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2503.21404</id>\n        <created>2025-06-09</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Daem</keyname>\n
        \                       <forenames>F.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Matzkin</keyname>\n
        \                       <forenames>A.</forenames>\n                </author>\n
        \       </authors>\n        <title>Effects of superradiance on relativistic
        Foldy-Wouthuysen densities</title>\n            <categories>quant-ph hep-ph
        hep-th</categories>\n            <journal-ref>Phys. Rev. A 111, L060202 (2025)</journal-ref>\n
        \           <doi>10.1103/d38q-h3qw</doi>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Recent interest in the studies of structured states
        obtained in relativistic electron beams has highlighted the use of two alternative
        descriptions, each based on a different wavefunction and the related space-time
        density. Although both wavefunctions obey the Dirac equation (one directly
        and the other through a Foldy-Wouthuysen transformation) they lead to different
        dynamics and properties, such as the presence or absence of spin-orbit interactions.
        In this work we investigate wavepacket dynamics for the Klein-Gordon equation,
        which displays the same ambiguity regarding the choice of different densities,
        in a setting involving Klein tunneling across a series of supercritical potential
        barriers. Relying on the superradiant character of this setting, we obtain
        solutions to the wavepacket dynamics indicating that the density based on
        a Foldy-Wouthuysen transformation of the wavefunction can be locally amplified
        outside the light-cone. In principle, the exponential increase of the charge
        due to the field inhomogeneities can lead to an arbitrarily large amplification
        over macroscopic distances. These results question the interpretation of the
        Foldy-Wouthuysen density as a fundamentally correct probability or charge
        density.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2504.09055</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:astro-ph:CO</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2504.09055</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Maji</keyname>\n                        <forenames>Rinku</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Shafi</keyname>\n
        \                       <forenames>Qaisar</forenames>\n                </author>\n
        \       </authors>\n        <title>Superheavy Metastable Strings in SO(10)</title>\n
        \           <categories>hep-ph astro-ph.CO hep-th</categories>\n            <comments>14
        pages, 9 captioned figures, published in JHEP</comments>\n            <journal-ref>JHEP
        06 (2025) 217</journal-ref>\n            <doi>10.1007/JHEP06(2025)217</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The spontaneous breaking of $SO(10)$ grand unified symmetry
        to $SU(3)_c \\times SU(2)_L \\times U(1)_Y \\times U(1)_\u03C7$ yields the
        GUT monopole as well as a comparably heavy $U(1)_\u03C7$ monopole which also
        carries $U(1)_Y$ flux. A metastable string scenario in this case requires
        that the $U(1)_\u03C7$ symmetry is necessarily broken close to the GUT scale,
        thus resulting in a dimensionless string tension $G \u03BC\\sim 10^{-6}$.
        We show that the $\u03C7$ monopole does not carry any unconfined flux following
        the electroweak symmetry breaking. Coupled with $G \u03BC\\sim 10^{-6}$, this
        metastable string network appears to provide a good fit to the recent Pulsar
        Timing Array data on the stochastic gravitational background. Gauge coupling
        unification, especially in the presence of low scale supersymmetry, determines
        the GUT scale and, in combination with constraints from proton decay experiments,
        one is able to constrain some of the key parameters in this setup. The breaking
        of $SO(10)$ via $SU(5) \\times U(1)_\u03C7$ also yields superheavy metastable
        strings with no unconfined flux associated with the monopoles. Finally, we
        consider $SO(10)$ breaking via $SU(4)_c \\times SU(2)_L \\times U(1)_R$, $SU(3)_c
        \\times SU(2)_L \\times SU(2)_R \\times U(1)_{B-L}$ and flipped $SU(5)$ that
        yield metastable strings where the associated monopoles carry unconfined flux
        after the electroweak breaking.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2504.10061</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2504.10061</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Totsuka-Yoshinaka</keyname>\n
        \                       <forenames>Jojiro</forenames>\n                </author>\n
        \       </authors>\n        <title>BSFT-like action from cohomomorphism</title>\n
        \           <categories>hep-th</categories>\n            <comments>30 pages,
        no figures, revised several sentences, reexamined the calculations, and eliminated
        unnecessary assumptions</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>By performing a field redefinition via a cohomomorphism
        on the Maurer-Cartan action of the $A_\\infty$ algebra, we construct an action
        that reproduces the characteristic structure of boundary string field theory
        (BSFT), which we refer to as the BSFT-like action. We show that the form and
        several properties of this BSFT-like action closely resemble those of BSFT.
        Our results suggest that this approach provides a systematic framework to
        derive the BSFT action from the OSFT based on $A_\\infty$ algebras.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2504.19097</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:supr-con</setSpec>\n    </header>\n\n
        \           <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2504.19097</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Iugov</keyname>\n                        <forenames>Vasilii</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Nekrasov</keyname>\n
        \                       <forenames>Nikita</forenames>\n                </author>\n
        \       </authors>\n        <title>Yang-Mills flows for multilayered graphene</title>\n
        \           <categories>hep-th cond-mat.supr-con</categories>\n            <comments>30
        pages, 8 figures; v2. 31 pp, added refs and details of the analysis of higher
        fluxes and numerics</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We clarify the origin of magic angles in twisted multilayered
        graphene using Yang-Mills flows in two dimensions. We relate the effective
        Hamiltonian describing the electrons in the multilayered graphene to the ${\\bar\\partial}_{A}$
        operator on a two dimensional torus coupled to an $SU(N)$ gauge field. Despite
        the absence of a characteristic class such as $c_{1}$ relevant for the quantum
        Hall effect, we show that there are topological invariants associated with
        the zero modes occuring in a family of Hamiltonians. The flatbands in the
        spectrum of the effective Hamiltonian are associated with Yang-Mills connections,
        studied by M.Atiyah and R.Bott long time ago. The emergent $U(1)$ magnetic
        field with nonzero flux is presumably responsible for the observed Hall effect
        in the absence of (external) magnetic field. We provide a numeric algorithm
        transforming the original single-particle Hamiltonian to the direct sum of
        ${\\bar\\partial}_{A}$ operators coupled to abelian gauge fields with non-zero
        $c_1$&#39;s. Our perspective gives a simple bound for magic angles: if the
        gauge field $A(\u03B1)$ is such that the YM energy $\\Vert F_{A(\u03B1)} \\Vert^2$
        is smaller than that of $U(1)$ magnetic flux embedded into $SU(2)$, then $\u03B1$
        is not magic.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2504.19324</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2504.19324</id>\n        <created>2025-06-06</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Hadj</keyname>\n
        \                       <forenames>Mohamed Ould El</forenames>\n                </author>\n
        \       </authors>\n        <title>Black hole absorption cross sections: Spin
        and Regge poles</title>\n            <categories>gr-qc hep-th</categories>\n
        \           <comments>17 pages, 9 figures. v2: Minor changes and a few typos
        corrected in the text to match the published version</comments>\n            <journal-ref>Phys.
        Rev. D 111, 124041 (2025)</journal-ref>\n            <doi>10.1103/vj91-h7wd</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We investigate the absorption of massless scalar, electromagnetic,
        and gravitational fields propagating in the Schwarzschild black hole geometry.
        Using complex angular momentum techniques, we first derive a representation
        of the absorption cross section that separates it into smooth background integrals
        and a discrete Regge pole series. This decomposition reveals the physical
        mechanisms underlying black hole absorption, including classical capture,
        surface wave interference near the photon sphere, and subleading background
        effects. We then construct a refined high-frequency analytical approximation
        that captures both the dominant oscillations and the fine structure of the
        absorption spectra for scalar, electromagnetic, and gravitational fields,
        incorporating spin-dependent phase corrections and higher-order effects. In
        addition, we provide a simplified expression that generalizes the sinc approximation
        to describe the leading oscillations for electromagnetic and gravitational
        fields. Our analysis offers a unified semiclassical interpretation of black
        hole absorption, combining geometric optics, surface wave dynamics, and resonant
        phenomena encoded by the Regge pole structure.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2505.21611</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2505.21611</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>De Cesare</keyname>\n                        <forenames>Fabiana</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Rychkov</keyname>\n
        \                       <forenames>Slava</forenames>\n                </author>\n
        \       </authors>\n        <title>Disturbing news about the $d=2+\u03B5$
        expansion</title>\n            <categories>hep-th cond-mat.stat-mech cond-mat.str-el</categories>\n
        \           <comments>33 pages, 6 figures, comments welcome; v2: clarifications
        added, conclusions unchanged; v3: significant changes in discussion of recombination;
        conclusions somewhat weakened</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The $O(N)$ Non-Linear Sigma Model (NLSM) in $d=2+\u03B5$
        has long been conjectured to describe the same conformal field theory (CFT)
        as the Wilson-Fisher (WF) $O(N)$ fixed point obtained from the $\u03BB(\u03D5^2)^2$
        model in $d=4-\u03B5$. In this work, we put this conjecture into question,
        building on the recent observation [Jones (2024)] that the NLSM CFT possesses
        a protected operator with dimension $N-1$, which is instead absent in the
        WF $O(N)$ CFT. We investigate the possibility of lifting this operator via
        multiplet recombination - the only known mechanism that could resolve this
        mismatch while preserving a connection between the two theories. We also explore
        an alternative scenario in which the NLSM $O(N)$ fixed point in $d=2+\u03B5$
        is not continuously connected to the WF $O(N)$ CFT, and instead corresponds
        to a different universality class. For $N=3$, this could be related to the
        hedgehog-suppressed critical point, which describes the N\xE9el-VBS phase
        transition in 3D.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.14049</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:astro-ph:SR</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:quant-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.14049</id>\n        <created>2025-06-16</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Das</keyname>\n
        \                       <forenames>Saurya</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Fridman</keyname>\n
        \                       <forenames>Mitja</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Lambiase</keyname>\n
        \                       <forenames>Gaetano</forenames>\n                </author>\n
        \       </authors>\n        <title>Testing the Quantum Equivalence Principle
        with Gravitational Waves</title>\n            <categories>gr-qc astro-ph.SR
        hep-th quant-ph</categories>\n            <comments>16 pages, no figures</comments>\n
        \           <journal-ref>JHEAp 48, 100413 (2025)</journal-ref>\n            <doi>10.1016/j.jheap.2025.100413</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We study modifications of gravitational wave observables,
        such as the wave amplitude and frequency, which follow from the quantum equivalence
        principle, and are expressed in terms of the inertial, gravitational and rest
        masses of the LIGO/Virgo mirrors. We provide bounds on the violations of the
        quantum equivalence principle by comparing the results with the most resolved
        gravitational wave events observed by the LIGO/Virgo collaboration. The formalism
        is equally applicable to other future ground and space-based gravitational
        wave detectors.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.14693</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:quant-ph</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.14693</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Fedida</keyname>\n                        <forenames>Samuel</forenames>\n
        \               </author>\n        </authors>\n        <title>Einstein causality
        of quantum measurements in the Tomonaga-Schwinger picture</title>\n            <categories>quant-ph
        gr-qc hep-th</categories>\n            <comments>18 pages, 4 figures</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>When quantum measurements are conducted over spacelike-separated
        regions of spacetime, a natural and commonly assumed physical postulate, called
        Einstein causality, asserts that they should commute. In this paper, we provide
        a generalisation to L\xFCders&#39; rule \xE0 la Aharonov-Albert in those globally
        hyperbolic spacetimes which allow unitarily equivalent Hilbert spaces to be
        defined along Cauchy hypersurfaces, thus relying on the existence of an interaction
        picture \xE0 la Tomonaga-Schwinger. We show that under this rule, selective
        quantum measurements satisfy a state-independent anyonic commutation relation
        over spacelike-separated (pre)compact regions. We highlight that this propagates
        to positive operator-valued measures (POVMs), where the commutation is necessarily
        bosonic. In the simplistic scenario where the measurements are assumed to
        be instantaneous, this implies quantum no-signalling for non-selective measurements.
        We then examine Sorkin&#39;s impossible measurements and show that immediate
        contradictions can be averted as long as collapse-inducing measurements are
        irreversible. We finish by discussing the possibility of extending such results
        beyond the interaction picture.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.16516</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:astro-ph:HE</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.16516</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Silvestrini</keyname>\n                        <forenames>Michela</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Maggio</keyname>\n
        \                       <forenames>Elisa</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Chakraborty</keyname>\n
        \                       <forenames>Sumanta</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Pani</keyname>\n                        <forenames>Paolo</forenames>\n
        \               </author>\n        </authors>\n        <title>One Membrane
        to Love them all: Tidal deformations of compact objects from the membrane
        paradigm</title>\n            <categories>gr-qc astro-ph.HE hep-ph hep-th</categories>\n
        \           <comments>20+4 pages, 4 figures; v2: references added, submitted
        version</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The tidal deformability is a key observable to test
        the nature of compact objects in a binary coalescence. Within vacuum General
        Relativity, the tidal Love numbers of a four-dimensional black hole are strictly
        zero, while they are non-zero and model-dependent for material objects, matter
        distributions around black holes, or in alternative theories of gravity. Here,
        we develop a model-agnostic framework based on the membrane paradigm, where
        the tidal properties of a spherically symmetric object are encoded in the
        response of a fictitious membrane in terms of viscosity coefficients. We show
        that both neutron stars and exotic compact objects (in particular, we provide
        an explicit example for thin-shell gravastars) are included in this framework,
        provided that the bulk and shear viscosity coefficients of the membrane have
        a nontrivial frequency dependence. We derive a general result for the electric
        and magnetic tidal Love numbers for non-rotating and spherically symmetric
        compact objects in terms of the viscosity coefficients, discussing their behavior
        with the compactness of the object, and identifying the conditions for the
        logarithmic behavior found in previous literature for various ultracompact
        objects. Finally, we show that the membrane shear viscosity coefficients associated
        with neutron star models feature novel quasi-universal relations, which depend
        only mildly on the neutron-star equation of state.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.17413</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.17413</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Banerjee</keyname>\n                        <forenames>Sourish</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Basu</keyname>\n
        \                       <forenames>Rudranil</forenames>\n                </author>\n
        \       </authors>\n        <title>Light and Shadow OPEs: A Carroll Symmetric
        Approach to Flat Holography</title>\n            <categories>hep-th</categories>\n
        \           <comments>26 pages, references added, minor change in presentation
        of section 5.2</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In this work, we fix the leading term in the operator
        algebra of light-transformed operators in the context of flat space holography.
        Starting with light-transformed graviton correlators, we show that the OPE
        obtained by taking the collinear limit satisfies translation symmetry at the
        leading order not independently but with assistance from the sub-leading order.
        Motivated by this result, we start with a general CFT-like ansatz for the
        OPE and, by keeping track of the sub-leading term, derive an expression for
        the scaling dimension of the operator appearing in the leading term. We further
        show that we can fix the OPE coefficient corresponding to this term as well.
        We use this result to find the OPE for well-studied theories like gravity,
        Yang-Mills and Einstein-Yang-Mills theory, and find that the scaling dimension
        found from our formula matches with the one obtained by looking at the collinear
        limit of bulk momentum space vertices. We initiate a similar study for operators
        in the shadow basis by looking at the OPE of shadow-transformed graviton correlators.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.18911</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>math:math:FA</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.18911</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Anikin</keyname>\n
        \                       <forenames>I. V.</forenames>\n                </author>\n
        \       </authors>\n        <title>Universal inverse Radon transforms: Complexity
        of Radon transforms and the hybrid functions</title>\n            <categories>math.FA
        hep-th math-ph math.MP</categories>\n            <comments>5 pages in JHEP
        style; typos fixed</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>For the reconstruction problem, the universal representation
        of inverse Radon transforms may imply the needed complexity of the direct
        Radon transforms which leads to the additional contributions. Meanwhile, in
        the standard theory of generalized functions, if the origin function which
        generates the Radon image is a pure-real function, as a rule the complexity
        of Radon transform becomes in question. In the letter, we demonstrate that
        the Fourier method together with the hybrid (Wigner-like) function ensure
        naturally the corresponding complexity. In its turn, this complexity provides
        not only the additional contribution to the inverse Radon transforms, but
        also it makes an essential impact on the reconstruction and optimization procedures
        within the frame of the incorrect problems. The presented method can be effectively
        used for the practical tasks of reconstruction problems.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
