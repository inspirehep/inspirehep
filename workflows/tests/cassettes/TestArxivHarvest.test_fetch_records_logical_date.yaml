        \               </author>\n        </authors>\n        <title>A 2D-CFT Factory:
        Critical Lattice Models from Competing Anyon Condensation Processes in SymTO/SymTFT</title>\n
        \           <categories>cond-mat.str-el cond-mat.stat-mech hep-th math-ph
        math.MP</categories>\n            <comments>48 pages + appendices, 21 figures.
        Corrected typos, added references, extended discussion of KW duality and internal
        dof of anyons of A5, and new appendix to elaborate on numerical accuracy of
        the AT phase boundaries</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this paper, we introduce a ``CFT factory&#39;&#39;
        : a novel algorithm of methodically generating 2D lattice models that would
        flow to 2D conformal fixed points in the infrared. These 2D models are realised
        by giving critical boundary conditions to 3D topological orders (symTOs/symTFTs)
        described by string-net models, often called the strange correlators. We engineer
        these critical boundary conditions by introducing a commensurate amount of
        non-commuting anyon condensates. The non-invertible symmetries preserved at
        the critical point can be controlled by studying a novel ``refined condensation
        tree&#39;&#39;. Our structured method generates an infinite family of critical
        lattice models, including the A-series minimal models, and uncovers previously
        unknown critical points. Notably, we find at least three novel critical points
        (c$\\approx 1.3$, $1.8$, and $2.5$ respectively) preserving the Haagerup symmetries,
        in addition to recovering previously reported ones. The condensation tree,
        together with a generalised Kramers-Wannier duality, predicts precisely large
        swathes of phase boundaries, fixes almost completely the global phase diagram,
        and sieves out second order phase transitions. This is not only illustrated
        in well-known examples (such as the 8-vertex model related to the $A_5$ category)
        but also further verified with precision numerics, using our improved (non-invertible)
        symmetry-preserving tensor-network RG, in novel examples involving the Haagerup
        symmetries. We show that critical couplings can be precisely encoded in the
        categorical data (Frobenius algebras and quantum dimensions in unitary fusion
        categories), thus establishing a powerful, systematic route to discovering
        and potentially classifying new conformal field theories.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.09725</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:nucl-th</setSpec>\n
        \           <setSpec>physics:astro-ph:HE</setSpec>\n            <setSpec>physics:cond-mat:supr-con</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.09725</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Zhang</keyname>\n                        <forenames>Tingyu</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Tajima</keyname>\n
        \                       <forenames>Hiroyuki</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Tachibana</keyname>\n
        \                       <forenames>Motoi</forenames>\n                </author>\n
        \       </authors>\n        <title>Schwinger-Keldysh approach to tunneling
        transport at a hadron-quark interface</title>\n            <categories>nucl-th
        astro-ph.HE cond-mat.supr-con hep-ph hep-th</categories>\n            <comments>9
        pages, 4 figures</comments>\n            <report-no>RIKEN-iTHEMS-Report-25</report-no>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We theoretically discuss quantum tunneling transport
        and frictions at a hadron-quark matter interface based on the Schwinger-Keldysh
        approach combined with the tunneling Hamiltonian, which has been developed
        in the context of condensed matter physics. In the inner core of massive neutron
        stars, it is expected that cold quark matter appears at sufficiently high
        densities and hence exhibits color superconductivity, surrounded by nucleon
        superfluids at lower densities. The perturbative expressions of the tunneling
        current and the friction at the interface are obtained in terms of the non-equilibrium
        Green&#39;s functions. We demonstrate the DC Josephson current that occurs
        at the hadron-quark superfluid interface in the present scheme. Our framework
        can be applied to various conflagrations involving the interfaces relevant
        to astrophysical phenomena.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.10046</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.10046</id>\n        <created>2025-06-24</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Nashed</keyname>\n                        <forenames>G.
        G. L.</forenames>\n                </author>\n                <author>\n                    <keyname>Saridakis</keyname>\n
        \                       <forenames>Emmanuel N.</forenames>\n                </author>\n
        \       </authors>\n        <title>3-dimensional charged black holes in $f({Q})$
        gravity</title>\n            <categories>gr-qc hep-th</categories>\n            <comments>12
        pages, four figures, updating references</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We present new exact charged black hole solutions in
        (2+1) dimensions within the framework of $f({Q})$ gravity, where ${Q}$ denotes
        the non-metricity scalar. By considering a cubic $f({Q})$ form we derive classes
        of charged and uncharged spherically symmetric solutions, and we identify
        conditions under which these reduce to the well-known Banados-Teitelboim-Zanelli
        (BTZ) black hole. Notably, our analysis reveals a novel charged solution that
        is asymptotically Anti-de Sitter (AdS) but cannot be continuously deformed
        into a GR counterpart, and thus arising purely from the\n  higher-order nature
        of the non-metricity corrections. Furthermore, we explore the geometrical
        properties of the solutions, demonstrating the existence of multiple horizons
        and a softer central singularity compared to GR. Additionally, we calculate
        various thermodynamic quantities, such as Hawking temperature, entropy, and
        heat capacity, with results confirming thermal stability. Finally, a detailed
        study of the geodesic motion and the effective potentials unveils stable photon
        orbits, as well as the effect of cubic non-metricity corrections on orbital
        dynamics.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.10451</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.10451</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Kol\xE1\u0159</keyname>\n
        \                       <forenames>Ivan</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Kubiznak</keyname>\n
        \                       <forenames>David</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Tadros</keyname>\n
        \                       <forenames>Poula</forenames>\n                </author>\n
        \       </authors>\n        <title>Rotating Carroll Black Holes: A No Go Theorem</title>\n
        \           <categories>hep-th gr-qc</categories>\n            <comments>11
        pages, no figures v2: improved 3d discussion, added references</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Recently, there has been a lot of interest in Carroll
        black holes and in particular whether or not one could find a Carrollian analogue
        of a rotating black hole spacetime. Here we show that every stationary and
        axisymmetric solution (and thence also a black hole) of Carrollian general
        relativity in any number of $d&gt;3$ dimensions is necessarily also static
        (up to a &#34;topological rotation&#34;). The case of $d=3$ dimensions is
        special. There, the topological rotation is important and one can have a rotating
        Carroll BTZ black hole, obtained from a static one by the Carroll boost accompanied
        by the re-identification of the angular coordinate, similar to what happens
        in the Lorentzian case. We also find a Carrollian analogue of an accelerating
        black hole, showing that Schwarzschild is not the only possible stationary
        and axisymmetric Carroll black hole in four dimensions. A generalization of
        the no go theorem to include Maxwell, dilatonic, and axionic matter fields
        is also discussed.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.13876</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.13876</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Sen</keyname>\n
        \                       <forenames>Ashoke</forenames>\n                </author>\n
        \       </authors>\n        <title>Decorating Asymptotically Flat Space-Time
        with the Moduli Space of String Theory</title>\n            <categories>hep-th
        gr-qc</categories>\n            <comments>LaTeX file, 39 pages; v2: added
        comment on cobordism conjecture in footnote 1</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>N=2, 4 and 8 supersymmetric string theories in four
        dimensional flat space-time have moduli space of vacua. We argue that starting
        from a theory where the moduli approach a particular moduli space point A
        at infinity, we can construct a classical solution that contains an arbitrarily
        large space-time region where the moduli take values corresponding to any
        other moduli space point B of our choice to any desired accuracy. Therefore
        the observables of a theory with a given set of asymptotic values of the moduli
        will have complete information on the observables for any other asymptotic
        values of the moduli. Also it is physically impossible for any experiment,
        performed over a finite time, to determine the asymptotic values of the moduli.
        We point out the difference between asymptotically flat space-time and asymptotically
        AdS space-time in this regard and discuss the possible implication of these
        results for holographic duals of string theories in flat space-time. For N=2
        supersymmetric theories, A and B could correspond to compactifications on
        topologically distinct Calabi-Yau manifolds related by flop or conifold transitions.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.18964</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:nucl-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.18964</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Bai</keyname>\n                        <forenames>Yang</forenames>\n
        \               </author>\n                <author>\n                    <keyname>de
        Lima</keyname>\n                        <forenames>Carlos Henrique</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Stolarski</keyname>\n
        \                       <forenames>Daniel</forenames>\n                </author>\n
        \       </authors>\n        <title>Novel Phases of a Baryon-Dense QCD-like
        Theory</title>\n            <categories>hep-ph hep-th nucl-th</categories>\n
        \           <comments>23 pages, 5 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We investigate the phases of a strongly coupled QCD-like
        theory at finite baryon chemical potential using s-confining supersymmetric
        QCD deformed by anomaly-mediated supersymmetry breaking. Focusing on the case
        of three colors and four flavors, we identify novel phases including spontaneous
        breaking of baryon number and/or parity. Both first-order and second-order
        phase transitions are observed as the baryon chemical potential is varied.
        These findings may offer insights into possible phases of real QCD at intermediate
        baryon densities.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.18966</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:quant-ph</setSpec>\n
        \           <setSpec>physics:cond-mat:quant-gas</setSpec>\n            <setSpec>physics:hep-lat</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.18966</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Halimeh</keyname>\n                        <forenames>Jad
        C.</forenames>\n                </author>\n                <author>\n                    <keyname>Hanada</keyname>\n
        \                       <forenames>Masanori</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Matsuura</keyname>\n
        \                       <forenames>Shunji</forenames>\n                </author>\n
        \       </authors>\n        <title>Universal framework with exponential speedup
        for the quantum simulation of quantum field theories including QCD</title>\n
        \           <categories>quant-ph cond-mat.quant-gas hep-lat hep-ph hep-th</categories>\n
        \           <comments>40 pages, 4 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We present a quantum simulation framework universally
        applicable to a wide class of quantum systems, including quantum field theories
        such as quantum chromodynamics (QCD). Specifically, we generalize an efficient
        quantum simulation protocol developed for bosonic theories in [Halimeh et
        al., arXiv:2411.13161] which, when applied to Yang-Mills theory, demonstrated
        an exponential resource advantage with respect to the truncation level of
        the bosonic modes, to systems with both bosons and fermions using the Jordan-Wigner
        transform and also the Verstraete-Cirac transform. We apply this framework
        to QCD using the orbifold lattice formulation and achieve an exponential speedup
        compared to previous proposals. As a by-product, exponential speedup is achieved
        in the quantum simulation of the Kogut-Susskind Hamiltonian, the latter being
        a special limit of the orbifold lattice Hamiltonian. In the case of Hamiltonian
        time evolution of a theory on an $L^d$ spatial lattice via Trotterization,
        one Trotter step can be realized using $\\mathcal{O}(L^d)$ numbers of CNOT
        gates, Hadamard gates, phase gates, and one-qubit rotations. We show this
        analytically for any matter content and $\\mathrm{SU}(N)$ gauge group with
        any $N$. Even when we use the Jordan-Wigner transform, we can utilize the
        cancellation of quantum gates to significantly simplify the quantum circuit.
        We also discuss a block encoding of the Hamiltonian as a linear combination
        of unitaries using the Verstraete-Cirac transform. Our protocols do not assume
        oracles, but rather present explicit constructions with rigorous resource
        estimations without a hidden cost, and are thus readily implementable on a
        quantum computer.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.18975</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:nlin:CD</setSpec>\n            <setSpec>physics:quant-ph</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.18975</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Akers</keyname>\n                        <forenames>Chris</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Lucas</keyname>\n
        \                       <forenames>Andrew</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Vikram</keyname>\n
        \                       <forenames>Amit</forenames>\n                </author>\n
        \       </authors>\n        <title>On the reconstruction map in JT gravity</title>\n
        \           <categories>hep-th nlin.CD quant-ph</categories>\n            <comments>36+28
        pages, 4+5 figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>An open question in AdS/CFT is how to reconstruct semiclassical
        bulk operators precisely enough that non-perturbative quantum effects can
        be computed. We propose a set of physically-motivated requirements for such
        a reconstruction map, and explicitly construct a map satisfying these requirements
        in Jackiw-Teitelboim (JT) gravity. Our map is found by canonically quantizing
        &#34;action-angle&#34; variables for JT gravity, which are chosen to ensure
        that the spectrum of the fundamental quantum theory matches known results
        from the gravitational path integral. We then study unitary quantum dynamics
        in this theory, and obtain analytical predictions for the dynamics of the
        wormhole length, including its quantum fluctuations, leveraging techniques
        from quantum ergodicity theory. Level repulsion in the non-perturbative JT
        spectrum implies that the average wormhole length is non-monotonic in time,
        that fluctuations in wormhole length are non-perturbatively suppressed until
        nearly the Heisenberg time, and that the late-time-evolved Hartle-Hawking
        state has a heavy-tailed distribution of lengths. We discuss the implications
        of our results for the &#34;complexity = volume&#34; conjecture.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.18988</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.18988</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Aramini</keyname>\n                        <forenames>Fabrizio</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Argurio</keyname>\n
        \                       <forenames>Riccardo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Bertolini</keyname>\n
        \                       <forenames>Matteo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Garc\xEDa-Valdecasas</keyname>\n
        \                       <forenames>Eduardo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Moroni</keyname>\n
        \                       <forenames>Pietro</forenames>\n                </author>\n
        \       </authors>\n        <title>Gravity, finite duality cascades and confinement</title>\n
        \           <categories>hep-th</categories>\n            <comments>35 pages
        + one appendix, 5 figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Cascading RG flows are characteristic of $\\mathcal{N}=1$
        gauge theories realized by D3-branes probing singularities in the presence
        of fractional branes. A celebrated example is the Klebanov-Strassler model,
        which exhibits an infinite cascade that ends with confinement. In this work,
        we explore a related setup where the addition of an orientifold plane modifies
        the cascade structure: the RG flow now consists of a finite number of steps,
        originating from a UV fixed point with a finite number of degrees of freedom.
        We provide a supergravity solution dual to this flow, that reproduces all
        its salient features. The string frame curvature can be kept small up to parametrically
        large values of the holographic coordinate, larger than the one at which the
        first cascade step occurs.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.18991</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.18991</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Crump</keyname>\n                        <forenames>John
        R. V.</forenames>\n                </author>\n                <author>\n                    <keyname>Santos</keyname>\n
        \                       <forenames>Jorge E.</forenames>\n                </author>\n
        \       </authors>\n        <title>Tails from the Bulk: Gravitational Decay
        in AdS$_5$</title>\n            <categories>hep-th gr-qc</categories>\n            <comments>27
        pages, 11 figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We study gravitational perturbations of Schwarzschild-AdS
        black holes in $d = 5$ and identify a regime of late-time power-law decay
        for smooth initial data. Based on an analysis of the quasinormal mode spectrum,
        we predict and characterise this decay behaviour. We perform fully nonlinear
        numerical evolutions with long integration times that support the prediction
        and exhibit no signs of instability. Remarkably, the decay is modulated by
        a universal oscillatory pattern, consistent with subleading corrections from
        a large-angular-momentum (eikonal) analysis of the quasinormal mode spectrum.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19000</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19000</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Johnson</keyname>\n                        <forenames>Clifford
        V.</forenames>\n                </author>\n        </authors>\n        <title>Further
        aspects of Supersymmetric Virasoro Minimal Strings</title>\n            <categories>hep-th</categories>\n
        \           <comments>19 pages, 9 figures</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>A supersymmetric version of the Virasoro minimal string
        was defined some time ago using random matrix model techniques. Several of
        the special properties of the matrix model that were noted (accessible fully
        non-perturbatively) underlie features shared by both 0A and 0B versions of
        the theory. This paper develops the formalism much further, including showing
        how the 0A and 0B choices familiar in continuum approaches have a direct analogue
        in terms of building solutions of the appropriate string equations. This also
        illuminates several key differences between the 0A and 0B models at the level
        of matrix model loop observables. The natural all-orders vanishing of loops,
        already observed in some 0A models, translates into the same for 0B. It is
        also noted that the leading amplitude for a single asymptotic boundary, as
        well as the trumpet partition function, are characters of a 2D superconformal
        field theory living on the boundary of a solid torus, suggesting a 3D chiral
        supergravity dual. Non-perturbative results are computed as well.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19013</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:stat-mech</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19013</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Aguilar-Gutierrez</keyname>\n                        <forenames>Sergio
        E.</forenames>\n                </author>\n                <author>\n                    <keyname>Xu</keyname>\n
        \                       <forenames>Jiuci</forenames>\n                </author>\n
        \       </authors>\n        <title>Geometry of Chord Intertwiner, Multiple
        Shocks and Switchback in Double-Scaled SYK</title>\n            <categories>hep-th
        cond-mat.stat-mech gr-qc</categories>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We revisit the bulk Hilbert space interpretation of
        chords in the double-scaled SYK (DSSYK) model and introduce a notion of intertwiner
        that constructs bulk states from states with fixed boundary conditions. This
        leads to an isometric map that factorizes the one-particle bulk Hilbert space
        into a tensor product of two boundary Hilbert spaces without particle insertion.
        The map enables a systematic derivation of a family of correlation functions
        with arbitrary finite amount of matter insertions, relevant for capturing
        the switchback effect-a feature of holographic complexity. We further develop
        a path integral framework that describes multiple shockwave configurations
        in the semiclassical limit. For the two-body scattering processes in semi-classical
        regime, we show it exhibits sub-maximal chaos at finite temperature, consistent
        with the scramblon dynamics associated with the &#34;fake disk&#34; geometry.
        The effective &#34;fake temperature&#34; governing this behavior emerges from
        the semiclassical limit of the quantum $6 j$-symbol associated with the out-of-time-order
        correlator. We further analyze multi-shockwave configurations and derive precise
        conditions under which the switchback effect is realized, both in terms of
        the total chord number and the Krylov complexity of precursor operators. Our
        results clarify the structure of correlation functions with multiple operator
        insertions, their bulk interpretation in terms of shockwave geometries in
        the semiclassical regime, and provide a microscopic derivation of the switchback
        effect in the DSSYK model.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19127</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:quant-ph</setSpec>\n            <setSpec>physics:cond-mat:other</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19127</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>MacIntyre</keyname>\n
        \                       <forenames>Duncan</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Semenoff</keyname>\n
        \                       <forenames>Gordon W.</forenames>\n                </author>\n
        \       </authors>\n        <title>Entropy from scattering in weakly interacting
        systems</title>\n            <categories>quant-ph cond-mat.other hep-th math-ph
        math.MP</categories>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Perturbation theory is used to investigate the evolution
        of the von Neumann entropy of a subsystem of a bipartite quantum system in
        the course of a gedanken scattering experiment. We find surprisingly simple
        criteria for the initial state and the scattering matrix that guarantee that
        the subsystem entropy increases. The class of states that meet these criteria
        are more correlated than simple product states of the subsystems. They form
        a subclass of the set of all separable states, and they can therefore be assembled
        by classical processes alone.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19158</identifier>\n        <datestamp>2025-06-25</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19158</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Moffat</keyname>\n
        \                       <forenames>John. W.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Thompson</keyname>\n
        \                       <forenames>Ethan. J.</forenames>\n                </author>\n
        \       </authors>\n        <title>Embedding $\\mathrm{SL}(2,\\mathbb{C})/\\mathbb{Z}_2$
        in Complex Riemannian Geometry</title>\n            <categories>hep-th math-ph
        math.MP</categories>\n            <comments>8 pages</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We present a unified framework demonstrating how the
        spinor complex Lorentz group SL(2,C)/Z\\_2 is realized as a canonical subgroup
        within a four-dimensional complex Riemannian manifold. Building on the complex,
        holomorphic metric extension and contour-integration regularization of classical
        singularities, we show that promoting the metric to a complex-valued tensor
        on a complex 4-fold enlarges the frame bundle to SO(4,C). Its spin double
        cover factorizes as a product of two independent SL(2,C) factors modulo a
        shared Z\\_2, and selecting one Weyl factor recovers the familiar SL(2,C)/Z\\_2
        spin cover of the Lorentz group. By explicitly extending metric components
        and connection forms into the complex domain, using contour deformations to
        avoid coordinate-singular loci, we exhibit how left- and right-handed Weyl
        spinors transform under separate SL(2,C) factors, and how modding out a common
        Z\\_2 reproduces the standard spin-Lorentz structure. In particular, the same
        contour-integration techniques that yield singularity-free Schwarzschild and
        Kerr solutions via a holomorphic radial coordinate also furnish a holomorphic
        spin bundle in which chiral spin representations live without imposing exotic
        matter or modifying the Einstein equations. This embedding clarifies the geometric
        origin of chirality, enables holomorphic factorization of curvature and connection
        forms, and provides a foundation for constructing holomorphic field theories
        and complexified gravity backgrounds. Our results indicate that extending
        the Lorentz group into a complex Riemannian setting not only recovers SL(2,C)/Z\\_2
        in a canonical fashion, but also establishes a geometric arena for studying
        chiral fermions, Bogomol&#39;nyi-Prasad-Sommerfield (BPS) instantons, and
        potential quantum-gravity corrections within a rigorously defined complex
        manifold.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.19161</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:physics:gen-ph</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19161</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Moffat</keyname>\n
        \                       <forenames>John. W.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Thompson</keyname>\n
        \                       <forenames>Ethan. J.</forenames>\n                </author>\n
        \       </authors>\n        <title>Holomorphic Unified Field Theory of Gravity
        and the Standard Model</title>\n            <categories>physics.gen-ph gr-qc
        hep-ph hep-th</categories>\n            <comments>13 pages</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We present a holomorphic framework in which gravity,
        gauge interactions, and their couplings to charges and currents emerge from
        a single geometric action on a four-complex-dimensional manifold. The Hermitian
        metric yields on the real slice $y^\u03BC= 0$, a real symmetric metric $g_{(\u03BC\u03BD)}$
        giving the vacuum Einstein equations, and an antisymmetric part $g_{[\u03BC\u03BD]}$
        that reproduces Maxwell&#39;s equations with sources. A single holomorphic
        gauge connection for $G_{\\text{GUT}}$, such as $SU(5)$ or $SO(10)$, encodes
        all gauge sectors; its Bianchi identities give homogeneous Yang--Mills equations,
        and variation imposes $\\nabla_\u03BCF^{\u03BC\u03BD}_A = J^\u03BD_A$. Chiral
        fermions arise from a holomorphic Dirac Lagrangian and couple minimally to
        all gauge fields, reproducing the Standard Model spectrum. Anomaly cancellation
        follows from holomorphic gauge invariance. A holomorphic adjoint Higgs breaks
        $G_{\\text{GUT}} \\rightarrow SU(3) \\times SU(2) \\times U(1)$ with unified
        coupling, and a second Higgs breaks electroweak symmetry, generating $W^\\pm$,
        $Z$, and fermion masses. Below the unification scale, couplings run by standard
        renormalization-group flow. This construction unifies Einstein gravity, Yang--Mills
        theory, electromagnetism, and chiral fermions into a single classical geometric
        framework, and admits quantization via a holomorphic path integral that reproduces
        standard Feynman rules.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.19182</identifier>\n        <datestamp>2025-06-25</datestamp>\n
