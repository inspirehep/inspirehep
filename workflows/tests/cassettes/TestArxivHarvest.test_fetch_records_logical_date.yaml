        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19419</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Zhang</keyname>\n
        \                       <forenames>Xing-Kun</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Zhao</keyname>\n                        <forenames>Xin</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Nie</keyname>\n
        \                       <forenames>Zhang-Yu</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Hu</keyname>\n                        <forenames>Ya-Peng</forenames>\n
        \               </author>\n                <author>\n                    <keyname>An</keyname>\n
        \                       <forenames>Yu-Sen</forenames>\n                </author>\n
        \       </authors>\n        <title>Interior structure of the holographic s
        + p superconductor and chaotic-stable transition near the black hole singularity</title>\n
        \           <categories>hep-th gr-qc</categories>\n            <comments>8
        pages, 3 figures, 1 table</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this work, we investigate the interior structure
        of a holographic multi-band superconductor with the coexistence of s-wave
        and p-wave order parameters. Especially, we investigate the singularity structure
        of this multi-band model. Different from the single p-wave case, the alternation
        rule is jointly determined by parameters involving both s-wave order and p-wave
        order. In the coexistence region, we derive the Kasner alternation laws from
        both analytical and numerical methods which fit each other nicely. Furthermore,
        we find that the occurrence of the s-wave order parameter will lead to a chaotic-stable
        transition for the near singularity structure which matches the expectation
        of cosmological billiard approach. This novel transition for the near singularity
        structure constitutes a holographic counterpart of the secondary condensation
        in boundary superconducting system, offering a complementary perspective for
        characterizing the properties of boundary condensed matter systems.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
