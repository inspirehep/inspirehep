        \       <id>2411.10260</id>\n        <created>2024-11-15</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Giotopoulos</keyname>\n
        \                       <forenames>Grigorios</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sati</keyname>\n                        <forenames>Hisham</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Schreiber</keyname>\n
        \                       <forenames>Urs</forenames>\n                </author>\n
        \       </authors>\n        <title>Super-$\\mathrm{Lie}_\\infty$ T-Duality
        and M-Theory</title>\n            <categories>hep-th math-ph math.DG math.MP</categories>\n
        \           <comments>90 pages, some figures</comments>\n            <journal-ref>Reviews
        in Mathematical Physics (2025)</journal-ref>\n            <doi>10.1142/S0129055X25500187</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Super $L_\\infty$-algebras unify extended super-symmetry
        with rational classifying spaces for higher flux densities: The super-invariant
        super-fluxes which control super $p$-branes and their supergravity target
        super-spaces are, together with their (non-linear) Bianchi identities, neatly
        encoded in (non-abelian) super-$L_\\infty$ cocycles. These are the rational
        shadows of flux-quantization laws (in ordinary cohomology, K-theory, Cohomotopy,
        iterated K-theory, etc).\n  We first review, in streamlined form while filling
        some previous gaps, double-dimensional reduction/oxidation and 10D superspace
        T-duality along higher-dimensional super-tori. We do so tangent super-space
        wise, by viewing it as an instance of adjunctions (dualities) between super-$L_\\infty$-extensions
        and -cyclifications, applied to the avatar super-flux densities of 10D supergravity.
        In particular, this yields a derivation, at the rational level, of the traditional
        laws of &#34;topological T-duality&#34; from the super-$L_\\infty$ structure
        of type II superspace. At this level, we also discuss a higher categorical
        analog of T-duality involving M-branes.\n  Then, by considering super-space
        T-duality along all 1+9 spacetime dimensions while retaining the 11th dimension
        as in F-theory, we find the M-algebra appearing as the complete brane-charge
        extension of the fully T-doubled/correspondence super-spacetime. On this backdrop,
        we recognize the &#34;decomposed&#34; M-theory 3-form on the &#34;hidden M-algebra&#34;
        as an M-theoretic lift of the Poincar\xE9 super 2-form that controls superspace
        T-duality as the integral kernel of the super Fourier-Mukai transform. This
        provides the super-space structure of an M-theory lift of the doubled/correspondence
        space geometry, which controls T-duality.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2411.19219</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2411.19219</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Iacobacci</keyname>\n
        \                       <forenames>Lorenzo</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Nguyen</keyname>\n
        \                       <forenames>Kevin</forenames>\n                </author>\n
        \       </authors>\n        <title>Celestial decomposition of Wigner&#39;s
        particles</title>\n            <categories>hep-th math-ph math.MP</categories>\n
        \           <comments>30 pages + appendices; v2: appendix B added; v3: published
        version</comments>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>We provide a detailed decomposition of Wigner&#39;s
        particles, defined as unitary irreducible representations of the Poincar\xE9
        group, in terms of unitary representations of its Lorentz subgroup. As pointed
        out before us, this decomposition only involves Lorentz representations belonging
        to the principal continuous series, and further underpins the connection between
        scattering amplitudes and conformal correlation functions discussed in the
        context of celestial holography. We provide very explicit formulae for the
        decomposition of particles of arbitrary mass and (half-)integer spin and for
        any spacetime dimension. We emphasise that this decomposition is unique and
        comes with a specific inner product on the corresponding Hilbert space. We
        also confirm that unitary translations mix Lorentz representations within
        the principal continuous series only, as required. Implications to the celestial
        holography program are indicated.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2412.01319</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2412.01319</id>\n        <created>2024-12-02</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Furuta</keyname>\n
        \                       <forenames>Yuma</forenames>\n                </author>\n
        \       </authors>\n        <title>On the classification of duality defects
        in $c=2$ compact boson CFTs with a discrete group orbifold</title>\n            <categories>hep-th
        math-ph math.MP</categories>\n            <comments>31 pages, 2 figures</comments>\n
        \           <doi>10.1007/JHEP06(2025)219</doi>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We propose a novel approach to exploring duality defects
        in the $c=2$ compact boson conformal field theory (CFT). This study is motivated
        by the desire to classify categorical symmetries, particularly duality defects,
        in CFTs. While the $c=1$ case has been extensively studied, and the types
        of realizable duality defects are largely understood, the situation becomes
        significantly more complex for $c=2$. The simplicity of the $c=1$ case arises
        from the fact that its theory is essentially determined by the radius of compactification.
        In contrast, the $c=2$ case involves more parameters, leading to a more intricate
        action of T-duality. As a result, directly solving the condition for a theory
        to be self-dual under orbifolding becomes highly challenging. To address this,
        we categorize duality defects into four types and demonstrate that the condition
        for a toroidal branch theory to be self-dual under an orbifold induced by
        an automorphism generated by shift symmetry can be reformulated as quadratic
        equations. We also found that for ``almost all&#34; theories we can enumerate
        all solutions for such equations. Moreover, this reformulation enables the
        simultaneous exploration of multiple duality defects and provides evidence
        for the existence of duality defects under specific parameter families for
        the theory, such as $(\u03C4, \u03C1) = (it, \\frac{1}{2}+it)$ where $t \\in
        \\mathbb{Q}$.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2501.04397</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-lat</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:nucl-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2501.04397</id>\n        <created>2025-05-08</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Guin</keyname>\n
        \                       <forenames>Sayak</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Pandey</keyname>\n
        \                       <forenames>Harshit</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Sharma</keyname>\n
        \                       <forenames>Sayantan</forenames>\n                </author>\n
        \       </authors>\n        <title>Understanding thermalization in a non-Abelian
        gauge theory in terms of its soft modes</title>\n            <categories>hep-lat
        hep-ph hep-th nucl-th</categories>\n            <comments>v2: minor changes
        in the text and the title to match the published version</comments>\n            <journal-ref>Phys.
        Lett. B 866 (2025) 139490</journal-ref>\n            <doi>10.1016/j.physletb.2025.139490</doi>\n
        \           <license>http://creativecommons.org/licenses/by-nc-nd/4.0/</license>\n
        \           <abstract>We measure the maximal Lyapunov exponent $\u03BB_L$
        of physical states in a SU(2) gauge theory consisting of soft momentum modes
        both in and out-of-thermal equilibrium conditions using ab-initio lattice
        techniques. We have implemented different algorithms to appropriately describe
        the dynamics of soft-modes for a wide range of temperatures and under non-equilibrium
        conditions. The non-equilibrium state has been realized starting from an over-occupied
        initial condition for low momentum soft gluons whereas the thermal state comprises
        of strongly interacting soft gluons at temperatures where these are well separated
        from the hard momentum modes. Spectra of positive Lyapunov exponents is observed
        in both these states, similar to a chaotic dynamical system. From the Kolmogorov-Sinai
        entropy rate measured in terms of this spectrum, we estimate a typical time-scale
        of $\\sim 0.50(3)$ fm/c to achieve thermalization at $T\\sim 600$ MeV starting
        from the non-thermal state. We also measure, for the first time, the $\u03BB_L$
        for long wavelength critical modes of SU(2) using the out-of-time-ordered
        correlator of a classical $Z_2$ scalar field theory, which shares the same
        universal behavior with SU(2), near the deconfinement phase transition. The
        $\u03BB_L$ is observed to maximize at the transition temperature.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2502.19370</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:cond-mat:dis-nn</setSpec>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2502.19370</id>\n        <created>2025-02-26</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Altland</keyname>\n                        <forenames>Alexander</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Bagrets</keyname>\n
        \                       <forenames>Dmitry</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Callebaut</keyname>\n
        \                       <forenames>Nele</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Weisenberger</keyname>\n
        \                       <forenames>Konstantin</forenames>\n                </author>\n
        \       </authors>\n        <title>The chiral SYK model in three-dimensional
        holography</title>\n            <categories>hep-th cond-mat.dis-nn cond-mat.str-el</categories>\n
        \           <comments>38 pages + appendices, 10 figures</comments>\n            <journal-ref>SciPost
        Phys. 18, 205 (2025)</journal-ref>\n            <doi>10.21468/SciPostPhys.18.6.205</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>A celebrated realization of the holographic principle
        posits an approximate duality between the $(0+1)$-dimensional quantum mechanical
        SYK model and two-dimensional Jackiw-Teitelboim gravity, mediated by the Schwarzian
        action as an effective low energy theory common to both systems. We here propose
        a generalization of this correspondence to one dimension higher. Starting
        from different microscopic realizations of effectively chiral $(1+1)$-dimensional
        generalizations of the SYK model, we derive a reduction to the Alekseev-Shatashvilli
        (AS)-action, a minimal extension of the Schwarzian action which has been proposed
        as the effective boundary action of three-dimensional gravity. In the bulk,
        we show how the same action describes fluctuations around the Euclidean BTZ
        black hole configuration, the dominant stationary solution of three-dimensional
        gravity. These two constructions allow us to match bulk and boundary coupling
        constants, and to compute observables. Specifically, we apply semiclassical
        techniques inspired by condensed matter physics to the computation of out-of-time-order
        correlation functions (OTOCs), demonstrating maximal chaos in the chiral SYK
        chain and its gravity dual.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2502.20394</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:cond-mat:supr-con</setSpec>\n            <setSpec>physics:cond-mat:mes-hall</setSpec>\n
        \           <setSpec>physics:cond-mat:mtrl-sci</setSpec>\n            <setSpec>physics:cond-mat:str-el</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2502.20394</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Murshed</keyname>\n
        \                       <forenames>Sk Asrap</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Das</keyname>\n                        <forenames>Sanjib
        Kumar</forenames>\n                </author>\n                <author>\n                    <keyname>Roy</keyname>\n
        \                       <forenames>Bitan</forenames>\n                </author>\n
        \       </authors>\n        <title>Superconductivity in doped planar Dirac
        insulators: A renormalization group study</title>\n            <categories>cond-mat.supr-con
        cond-mat.mes-hall cond-mat.mtrl-sci cond-mat.str-el hep-th</categories>\n
        \           <comments>Published version in PRB (Regular Article): 23 Pages,
        9 Figures, and 4 Tables</comments>\n            <journal-ref>Phys. Rev. B
        111, 245153 (2025)</journal-ref>\n            <doi>10.1103/w6vx-375q</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>From a leading-order unbiased renormalization group
        analysis we here showcase the emergence of superconductivity (including the
        topological ones) from purely repulsive electron-electron interactions in
        two-dimensional doped Dirac insulators, featuring a Fermi surface. In the
        absence of chemical doping, such systems describe quantum anomalous or spin
        Hall and normal insulators. Otherwise a simply connected Fermi surface becomes
        annular deep inside the topological regime. By considering all symmetry allowed
        repulsive local four-fermion interactions, we show that the nature of the
        resulting superconducting states at low temperature follows certain Clifford
        algebraic selection rules, irrespective of the underlying Fermi surface topology.
        Within the framework of a microscopic Hubbard model, on-site repulsion among
        fermions with opposite orbitals (spin projections) typically favors topological
        $p$-wave (conventional $s$-wave) pairing. Theoretically predicted superconductivity
        can in principle be observed in experiments once the promising candidate materials
        for quantum anomalous and spin Hall insulators are doped to foster Fermi surfaces.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
