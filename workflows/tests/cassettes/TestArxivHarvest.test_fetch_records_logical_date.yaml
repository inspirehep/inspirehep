        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20133</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Bielli</keyname>\n                        <forenames>Daniele</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Moustakis</keyname>\n
        \                       <forenames>Vasileios</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Torrielli</keyname>\n
        \                       <forenames>Alessandro</forenames>\n                </author>\n
        \       </authors>\n        <title>Boundary Bethe ansatz in massive $AdS_3$</title>\n
        \           <categories>hep-th</categories>\n            <comments>29 pages
        + appendices</comments>\n            <report-no>DMUS-MP-25/01</report-no>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this paper we perform the boundary algebraic Bethe
        Ansatz for massive representations of the $AdS_3 \\times S^3 \\times T^4$
        integrable system. This is a companion analysis to our study of massless representations
        \\cite{Bielli:2024bve}. Our treatment is comprehensive of all possible assortments
        of tensor-factor polarisations which build the physical representations in
        the spectrum, and includes different choices of auxiliary spaces, revealing
        subtle differences in the procedure. We survey both singlet and vector boundaries,
        obtaining the auxiliary Bethe equations in very general form for all cases.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20136</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:quant-ph</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20136</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Mlodinow</keyname>\n                        <forenames>Leonard</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Brun</keyname>\n
        \                       <forenames>Todd A.</forenames>\n                </author>\n
        \       </authors>\n        <title>Bounds on QCA Lattice Spacing from Data
        on Lorentz Violation</title>\n            <categories>quant-ph gr-qc hep-th</categories>\n
        \           <comments>26 pages, RevTeX preprint format, no figures, 75 references</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Recent work has demonstrated that discrete quantum walks,
        when extended to quantum cellular automata (QCA), can, in the continuum limit,
        reproduce relativistic wave equations and quantum field theories (QFTs), including
        free quantum electrodynamics (QED). This QCA/QFT correspondence bridges quantum
        information processing and high-energy physics, raising fundamental questions
        about the nature of spacetime: whether it is the continuum QFT or the discrete
        QCA that is fundamental. For while Lorentz invariance appears robust experimentally,
        it may only approximate a deeper discrete structure, particularly at Planck-scale
        energies. This high-energy Lorentz violation is potentially observable either
        through cumulative effects over cosmic distances or via small deviations at
        accessible energies. In this paper, we analyze the QCA corresponding to QED
        and show that it implies both a deviation from the speed of light and spatial
        anisotropies. Using current experimental and astrophysical constraints, we
        place upper bounds on the QCA lattice spacing, providing insight into the
        plausibility of a fundamentally discrete spacetime.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20281</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20281</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Loginov</keyname>\n                        <forenames>A.
        Yu.</forenames>\n                </author>\n        </authors>\n        <title>A
        nontopological soliton with a dipole chromomagnetic field</title>\n            <categories>hep-th</categories>\n
        \           <comments>13 pages, 6 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>A non-Abelian gauge model with a complex isovector scalar
        field and a sixth-order self-interaction potential is considered. It is shown
        that it has a nontopological soliton solution. The features of this soliton
        include a monopole-like core surrounded by a Q-ball-like shell, the existence
        of radially excited states, and a long-range dipole chromomagnetic field.
        The properties of the soliton are studied using analytical and numerical methods.
        In particular, the asymptotic dependencies of the energy and the Noether charge
        on a phase frequency are obtained for two extreme regimes. It is also found
        that in these two extreme regimes, the chromomagnetic dipole moment of the
        soliton is proportional to its linear size.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20338</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:cond-mat:mes-hall</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20338</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Sugiyama</keyname>\n
        \                       <forenames>Yuuki</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Numasawa</keyname>\n
        \                       <forenames>Tokiro</forenames>\n                </author>\n
        \       </authors>\n        <title>Anomalous Bulk Current in Quantum Hall
        Systems with an Expanding Edge</title>\n            <categories>cond-mat.mes-hall
        gr-qc hep-th</categories>\n            <comments>19 pages, 9 figures</comments>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Understanding topological phases of matter is essential
        for advancing both the fundamental theory and practical applications of condensed
        matter physics. Recently, a theoretical framework for a quantum Hall system
        with an expanding edge state was proposed [Phys. Rev. D {\\bf 105}, 105009
        (2022)], revealing the existence of an energy flux analogous to Hawking radiation
        on the edge. Motivated by this work, we extend the analysis to a model of
        a $(2+1)$-dimensional spacetime that includes both the bulk and edge regions.
        Due to the presence of bulk and edges, we demonstrate that the covariant form
        of the gravitational anomaly appears on the edge via the anomaly-inflow mechanism.
        Then, we investigate the energy flux on the edge from the viewpoint of gravitational
        anomalies, such as covariant gravitational and Weyl anomalies. We also find
        that, due to the conservation of energy and momentum in the entire system,
        the presence of anomalous currents on the expanding edge induces non-trivial
        currents in the bulk originating from the expansion of the edge.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20340</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:gr-qc</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n            <setSpec>physics:math-ph</setSpec>\n
        \           <setSpec>math:math:MP</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20340</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Jercher</keyname>\n
        \                       <forenames>Alexander F.</forenames>\n                </author>\n
        \       </authors>\n        <title>Emergent Lorentzian Geometries from Spin-Foams
        and Group Field Theories</title>\n            <categories>gr-qc hep-th math-ph
        math.MP</categories>\n            <comments>PhD Thesis, 115 + 132 pages</comments>\n
        \           <doi>10.22032/dbt.66266</doi>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The emergence of Lorentzian geometries in spin-foams
        and group field theories is investigated. The spectral dimension of periodic
        Euclidean spin-foam frusta is studied. At large scales, the spectral dimension
        is generically four. At lower scales, a non-trivial flow of the spectral dimension
        is observed, sensitive to quantum effects, curvature induced oscillations
        and the parameters of the theory. The removal of numerical cutoffs and a thermodynamic
        limit is discussed, suggesting a phase transition from zero to four large-scale
        dimensions. Lorentzian Regge calculus for (3+1) cosmology, modelled with Lorentzian
        4-frusta, coupled to a massless free scalar field is studied. It is shown
        that causal regularity, solutions to the Regge equations and a continuum limit
        only exist if the cells connecting neighboring slices are timelike. The dynamics
        can be expressed relationally only in the small deficit angle limit. Effective
        (2+1) spin-foam cosmology with a minimally coupled massive scalar field is
        investigated. The scalar field mass is shown to ensure convergence of the
        path integral. The classicality of expectation values is shown to be intimately
        connected to causal regularity and the path integral measure. A causal completion
        of the Barrett-Crane group field theory model is developed. Its amplitudes
        are explicitly computed in spin representation using methods from integral
        geometry. A Landau-Ginzburg analysis is applied to the complete Barrett-Crane
        (BC) group field theory model. It is shown that mean-field theory is generically
        self-consistent, and that timelike faces do not contribute to the critical
        behavior. Employing the complete BC model, a physical Lorentzian reference
        frame is coupled, and scalar cosmological perturbations are extracted from
        entangled GFT coherent states. The dynamics of these perturbations are shown
        to agree with classical results up to quantum corrections.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.20396</identifier>\n
        \       <datestamp>2025-06-26</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:hep-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20396</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Casagrande</keyname>\n
        \                       <forenames>Gabriele</forenames>\n                </author>\n
        \       </authors>\n        <title>Linear and nonlinear supersymmetry in field
        and string theory</title>\n            <categories>hep-th hep-ph</categories>\n
        \           <comments>Ph.D. Thesis</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>This Ph.D. thesis investigates effective field and string
        theories in which supersymmetry is realized and broken in various ways. Chapter
        1 addresses effective theories with nonlinearly realized supersymmetry, constructed
        using the formalism of constrained superfields. We establish a criterion for
        identifying inconsistent constraints, formulate their improved versions, and
        propose, along these lines, improved supergravity models of inflation. In
        Chapter 2, we discuss a peculiar application of this framework: the gravitational
        production of massive gravitinos in time-dependent backgrounds. We emphasize
        some physical subtleties in the standard description of this mechanism, which
        become particularly severe in the case of the gravitino. Next, the focus shifts
        to linear supersymmetry, and we investigate the leading-order coupling of
        the massive spin-2 field supermultiplet to pure supergravity in four dimensions.
        This analysis is carried out using the supercurrent superfield formalism,
        and it shows that only a single class of such couplings can be consistently
        defined. This is fundamentally distinct from the coupling obtained by compactifying
        higher-dimensional supergravities, and it has interesting connections to string
        theory and the string lamppost principle. Finally, in Chapter 3, we present
        a novel orientifold projection of type IIB string theory. This is a Scherk--Schwarz
        orientifold in which supersymmetry is entirely broken, and the O-planes couple
        only to the twisted sector of the theory. We argue that this model is invariant
        under S-duality and can be formulated as an F-theory compactification. We
        also analyze the D-brane spectrum of the theory and compare the results with
        earlier similar constructions. All original findings presented in this thesis
        are preceded by a comprehensive and detailed introduction to the general frameworks
        to which they belong.</abstract>\n    </arXiv>\n\n            </metadata>\n
        \       </record>\n\n                    <record>\n                <header>\n
        \       <identifier>oai:arXiv.org:2506.20405</identifier>\n        <datestamp>2025-06-26</datestamp>\n
        \           <setSpec>physics:quant-ph</setSpec>\n            <setSpec>physics:cond-mat:other</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.20405</id>\n        <created>2025-06-25</created>\n            <updated>2025-06-26</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Zhao</keyname>\n
        \                       <forenames>Tian-Ming</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Miao</keyname>\n                        <forenames>Rong-Xin</forenames>\n
        \               </author>\n        </authors>\n        <title>Controlling
        Casimir Effect in Networks</title>\n            <categories>quant-ph cond-mat.other
        hep-th</categories>\n            <comments>23 pages, 8 figures</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Networks have played a pivotal role in physics, mathematics,
        and biology, propelling the recent revolution in artificial intelligence.
        This paper studies quantum field theories on networks and proposes a novel
        junction condition on the node. The junction condition is consistent with
        energy conservation in the sense that the total energy flow into the node
        is zero. As an application, we explore the Casimir effect on networks. Remarkably,
        the Casimir force on one edge can be changed from attractive to repulsive
        by adjusting the lengths of the other edges, providing a straightforward way
        to control the Casimir effect. We begin by discussing the Casimir effect for
        $(1+1)$-dimensional free massless scalars on a simple network. We then extend
        this discussion to various types of networks and higher dimensions. Finally,
        we offer brief comments on some open questions.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
