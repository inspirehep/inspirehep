        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>math:math:AG</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2007.03037</id>\n        <created>2023-05-11</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Feyzbakhsh</keyname>\n
        \                       <forenames>Soheyla</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Thomas</keyname>\n
        \                       <forenames>Richard P.</forenames>\n                </author>\n
        \       </authors>\n        <title>Curve counting and S-duality</title>\n
        \           <categories>math.AG hep-th</categories>\n            <comments>Referee&#39;s
        corrections implemented; journal version. 25 pages, 4 figures</comments>\n
        \           <msc-class>14N35, 14D20, 14J60, 14F05</msc-class>\n            <journal-ref>\xC3\u2030pijournal
        de G\xC3\xA9om\xC3\xA9trie Alg\xC3\xA9brique, Volume 7 (May 12, 2023) epiga:9818</journal-ref>\n
        \           <doi>10.46298/epiga.2023.volume7.9818</doi>\n            <license>http://creativecommons.org/licenses/by-sa/4.0/</license>\n
        \           <abstract>We work on a projective threefold $X$ which satisfies
        the Bogomolov-Gieseker conjecture of Bayer-Macr\xEC-Toda, such as $\\mathbb
        P^3$ or the quintic threefold.\n  We prove certain moduli spaces of 2-dimensional
        torsion sheaves on $X$ are smooth bundles over Hilbert schemes of ideal sheaves
        of curves and points in $X$.\n  When $X$ is Calabi-Yau this gives a simple
        wall crossing formula expressing curve counts (and so ultimately Gromov-Witten
        invariants) in terms of counts of D4-D2-D0 branes. These latter invariants
        are predicted to have modular properties which we discuss from the point of
        view of S-duality and Noether-Lefschetz theory.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
