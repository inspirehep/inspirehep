        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.20115</id>\n        <created>2025-06-25</created>\n
        \           <updated>2025-06-26</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Filev</keyname>\n                        <forenames>Veselin
        G.</forenames>\n                </author>\n        </authors>\n        <title>Holographic
        flavour and neural networks</title>\n            <categories>hep-th</categories>\n
        \           <comments>19 pages, 12 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>In holography, flavour probe branes are used to introduce
        fundamental matter to the AdS/CFT correspondence. At a technical level, the
        probes are described by extremizing the DBI action and solving the Lagrange-Euler
        equations of motion. I report on applications of artificial neural networks
        that allow direct minimization of the regularized DBI action (interpreted
        as a free energy) without the need to derive and solve the equations of motion.
        I consider, as examples, magnetic catalysis of chiral symmetry breaking and
        the meson melting phase transition in the D3/D7 holographic set-up. Finally,
        I provide a framework which allows the simultaneous learning of the embeddings
        and the relevant aspects of the dual geometry based on field theory data.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
