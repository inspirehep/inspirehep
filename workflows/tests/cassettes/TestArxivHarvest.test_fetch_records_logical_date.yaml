        \           <setSpec>physics:quant-ph</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19194</id>\n        <created>2025-06-23</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Daddi-Hammou</keyname>\n
        \                       <forenames>Aoumeur</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Delorme</keyname>\n
        \                       <forenames>St\xE9phane</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Blaizot</keyname>\n
        \                       <forenames>Jean-Paul</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Gossiaux</keyname>\n
        \                       <forenames>Pol Bernard</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Gousset</keyname>\n
        \                       <forenames>Thierry</forenames>\n                </author>\n
        \       </authors>\n        <title>Quantum vs. semiclassical description of
        in-QGP quarkonia in the quantum Brownian regime</title>\n            <categories>hep-ph
        hep-th quant-ph</categories>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>In this work, we explore the range of validity of the
        semiclassical approximation of a quantum master equation designed to describe
        the $c\\bar{c}$ dynamics in a quark gluon plasma at various temperatures,
        in the quantum Brownian regime. We perform a comparative study of various
        properties, e.g. the charmonia yield, of the Wigner density obtained with
        the Lindblad equation and with the associated semiclassical Fokker-Planck
        equation. The semiclassical description is found to reproduce with a remarkable
        accuracy the results obtained through the full quantum description. We show
        that, to a large extent, this can be attributed to the non-unitary components
        of the dynamics that result from the contact of the $c\\bar{c}$ subsystem
        with the thermal bath, leading to a rapid classicalization of the subsystem.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19198</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:astro-ph:CO</setSpec>\n            <setSpec>physics:gr-qc</setSpec>\n
        \   </header>\n\n            <metadata>\n                        <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\"
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/
        https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n        <id>2506.19198</id>\n        <created>2025-06-23</created>\n
        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>de Rham</keyname>\n                        <forenames>Claudia</forenames>\n
        \               </author>\n                <author>\n                    <keyname>Jazayeri</keyname>\n
        \                       <forenames>Sadra</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Tolley</keyname>\n
        \                       <forenames>Andrew J.</forenames>\n                </author>\n
        \       </authors>\n        <title>Bispectrum Islands</title>\n            <categories>hep-th
        astro-ph.CO gr-qc</categories>\n            <comments>17 pages, 11 figures</comments>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>Inspired by the amplitude bootstrap program, the spirit
        of this work is to constrain the space of consistent inflationary correlation
        functions - specifically, the bispectrum of curvature perturbations - using
        fundamental principles such as unitarity, locality, analyticity, and symmetries.
        To this end, we assume a setup for inflation in which de Sitter isometries
        are only mildly broken by the slow roll of the inflaton field, and study the
        bispectrum imprinted by a generic hidden sector during inflation. Assuming
        that the hidden sector&#39;s contributions to primordial non-Gaussianity are
        dominated by the exchange of a scalar operator (which does not preclude high-spin
        UV completions), we derive nontrivial positivity constraints on the resulting
        bispectrum $B(k_1,k_2,k_3)$. In particular, we show that $B$ must be negative
        in a certain region around the equilateral configuration. For instance, for
        isosceles triangles (with $k_2=k_3$) this region is given by $0.027\\lesssim
        k_3/k_1\\leq 2$. Furthermore, we demonstrate that unitarity imposes upper
        and lower bounds on the bispectrum shape, thereby carving out a Bispectrum
        Island where consistent shapes in our setup can reside. We complement our
        analysis by contemplating alternative setups where the coupling to the hidden
        sector is allowed to strongly break de Sitter boosts. We also identify situations
        that would push the bispectrum off the island and the profound physical features
        they would reveal.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2506.19310</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-th</setSpec>\n
        \           <setSpec>physics:gr-qc</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19310</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Sakamoto</keyname>\n
        \                       <forenames>Jun-ichi</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Tomizawa</keyname>\n
        \                       <forenames>Shinya</forenames>\n                </author>\n
        \       </authors>\n        <title>Building multi-BTZ black holes through
        Riemann-Hilbert problem</title>\n            <categories>hep-th gr-qc</categories>\n
        \           <comments>54 pages, 10 figures</comments>\n            <report-no>TTI-MATHPHYS-34</report-no>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>We construct a recently found class of non-BPS black
        hole solutions with asymptotically $AdS_3\\times S^3\\times T^4$ in type IIB
        supergravity, consisting of multiple BTZ black holes localized on an $S^3$,
        within the group theoretical framework of Breitenlohner and Maison (BM). Starting
        with the multi-neutral black string solution as a seed, we solve the associated
        Riemann-Hilbert problem for the BM linear system. First, we determine the
        monodromy matrix corresponding to this seed solution by generalizing the early
        work of Katsimpouri et al. on the four-charged black hole of STU supergravity,
        where some assumptions must be relaxed for the solutions with multiple horizons.
        By applying the Harrison transformation, a charge-generating transformation
        in the $SO(4,4)$ group, to the monodromy matrix, we obtain the multi-charged
        black string solution. Furthermore, through a ``subtraction&#39;&#39; procedure
        -- an $SO(4,4)$ transformation that changes the asymptotic structure from
        $R^{1,4}\\times S^1\\times T^4$ to $AdS_3\\times S^3\\times T^4$ spacetime
        -- we derive the multi-BTZ black hole solution. This is the first example
        in which the subtraction procedure is applied to multiple black holes, and
        it may also have potential applications to other cases.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
        \               <header>\n        <identifier>oai:arXiv.org:2506.19355</identifier>\n
        \       <datestamp>2025-06-25</datestamp>\n            <setSpec>physics:hep-ph</setSpec>\n
        \           <setSpec>physics:hep-th</setSpec>\n    </header>\n\n            <metadata>\n
        \                       <arXiv xmlns=\"http://arxiv.org/OAI/arXiv/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"
        xsi:schemaLocation=\"http://arxiv.org/OAI/arXiv/ https://oaipmh.arxiv.org/OAI/arXiv.xsd\">\n
        \       <id>2506.19355</id>\n        <created>2025-06-24</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Butkevich</keyname>\n
        \                       <forenames>A. V.</forenames>\n                </author>\n
        \               <author>\n                    <keyname>Luchuk</keyname>\n
        \                       <forenames>S. V.</forenames>\n                </author>\n
        \       </authors>\n        <title>Assessing the accuracy of the GENIE event
        generator with electron scattering data: Reduced cross section and nuclear
        transparency</title>\n            <categories>hep-ph hep-th</categories>\n
        \           <comments>25 pages, 10 figures</comments>\n            <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>The reduced cross sections of the semi-exclusive $(l,l&#39;p)$
        lepton scattering process can be identified with distorted nuclear spectral
        functions. Irrespective of the type of interaction the distorted spectral
        function is determined mainly by intrinsic properties of the target and the
        ejected nucleon interaction with residual nucleus. Thus the reduced cross
        sections of the neutrino and electron scattering on nuclei as functions of
        nucleon missing momentum and energy are similar up to Coulomb corrections.
        Here we demonstrate the utility of this approach by benchmarking the GENIE
        neutrino event generator against a broad set of semi-exclusive electron scattering
        data for carbon target. We observe persistent disagreements between the generator
        predictions and data in the range of nucleon missing momenta less than 80
        MeV/c. The approach presented in this paper provide a great opportunity to
        test better the accuracy of nuclear models of quasi-elastic neutrino-nucleus
        scattering, employed in neutrino event generators.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
