        \           <updated>2025-06-25</updated>\n        <authors>\n                <author>\n
        \                   <keyname>Grassi</keyname>\n                        <forenames>Pietro
        Antonio</forenames>\n                </author>\n                <author>\n
        \                   <keyname>Hulik</keyname>\n                        <forenames>Ondrej</forenames>\n
        \               </author>\n        </authors>\n        <title>BV Formalism
        and Partition Functions</title>\n            <categories>hep-th math-ph math.MP</categories>\n
        \           <comments>26 pages</comments>\n            <journal-ref>SciPost
        Phys. 18, 202 (2025)</journal-ref>\n            <doi>10.21468/SciPostPhys.18.6.202</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The BV formalism is a well-established method for analyzing
        symmetries and quantization of field theories. In this paper we use the BV
        formalism to derive partition functions of gauge invariant operators up to
        equations of motions and their redundancies of selected theories. We discuss
        various interpretations of the results, some dualities and relation to first
        quantized models.</abstract>\n    </arXiv>\n\n            </metadata>\n        </record>\n\n
        \                   <record>\n                <header>\n        <identifier>oai:arXiv.org:2411.07467</identifier>\n
