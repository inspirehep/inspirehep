        \       <id>2406.00386</id>\n        <created>2024-06-01</created>\n            <updated>2025-06-25</updated>\n
        \       <authors>\n                <author>\n                    <keyname>Loginov</keyname>\n
        \                       <forenames>A. Yu.</forenames>\n                </author>\n
        \       </authors>\n        <title>A modified dyon solution in a non-Abelian
        gauge model</title>\n            <categories>hep-th</categories>\n            <comments>9
        pages, 4 figures</comments>\n            <journal-ref>Phys. Lett. B 855 (2024)
        138840</journal-ref>\n            <doi>10.1016/j.physletb.2024.138840</doi>\n
        \           <license>http://creativecommons.org/licenses/by/4.0/</license>\n
        \           <abstract>A modified $SU(2)$ Georgi-Glashow model is considered
        here, and it is shown that besides the well-known Julia-Zee dyon solution,
        the model can also have a modified dyon solution. The properties of the modified
        dyon solution are studied using analytical and numerical methods. A comparative
        analysis of the modified dyon and the Julia-Zee dyon shows that their properties
        are significantly different. In particular, except for the BPS case, the energy
        and electric charge of the modified dyons exceed considerably those of the
        Julia-Zee dyons. At the same time, the energy and electric charge of the modified
        dyon are bounded for all admissible parameter values, whereas those of the
        Julia-Zee dyon can be arbitrarily large in the BPS case.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n                    <record>\n
