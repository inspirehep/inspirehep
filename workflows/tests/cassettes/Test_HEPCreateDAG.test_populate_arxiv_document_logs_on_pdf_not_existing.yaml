        BY 4.0\",\"material\":\"preprint\"}],\"citeable\":true,\"abstracts\":[{\"value\":\"We
        introduce \\\\textbf{Chebyshev Moment Regularization (CMR)}, a simple, architecture-agnostic
        loss that directly optimizes layer spectra. CMR jointly controls spectral
        edges via a log-condition proxy and shapes the interior via Chebyshev moments,
        with a decoupled, capped mixing rule that preserves task gradients. We prove
        strictly monotone descent for the condition proxy, bounded moment gradients,
        and orthogonal invariance. In an adversarial ``$\u03BA$-stress'' setting (MNIST,
        15-layer MLP), \\\\emph{compared to vanilla training}, CMR reduces mean layer
        condition numbers by $\\\\sim\\\\!10^3$ (from $\\\\approx3.9\\\\!\\\\times\\\\!10^3$
        to $\\\\approx3.4$ in 5 epochs), increases average gradient magnitude, and
        restores test accuracy ( $\\\\approx10\\\\%\\\\!\\\\to\\\\!\\\\approx86\\\\%$
        ). These results support \\\\textbf{optimization-driven spectral preconditioning}:
        directly steering models toward well-conditioned regimes for stable, accurate
        learning.\",\"source\":\"arXiv\"}],\"languages\":[\"en\"],\"references\":[{\"raw_refs\":[{\"value\":\"[1]
        ALICE Collaboration, (2024). Technical Design Report for the ALICE Inner Tracking
        System Upgrade, CERN-LHCC-2024-003, ALICE-TDR-021. https://cds.cern.ch/record/2890181?ln=en\",\"schema\":\"text\",\"source\":\"arXiv\"}],\"reference\":{\"misc\":[\"Technical
