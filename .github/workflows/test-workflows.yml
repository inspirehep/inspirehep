name: Tests

on:
  workflow_call:
    inputs:
      ref:
        description: The reference to build
        type: string
        required: true
    outputs:
      json:
        description: JSON output of tags and labels
        value: ${{ jobs.build.outputs.json }}
      image-id:
        description: The ID of image that has been built
        value: ${{ jobs.build.outputs.image-id }}

jobs:
  build:
    uses: ./.github/workflows/build-backoffice-workflow.yml
    with:
      ref: ${{ inputs.ref }}
      image: cern-sis/inspire/workflows
      context: ./workflows
      dockerfile: ./workflows/Dockerfile
    secrets: inherit
  test:
    runs-on: ubuntu-24.04
    env:
      AIRFLOW_PROJ_DIR: ./workflows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Spin up Docker containers
        run: |
          docker compose up -d cache db-airflow s3 airflow-init
          docker compose run --rm create_buckets

      - name: Test
        working-directory: ./workflows
        run: >
          docker compose run --rm
          airflow-cli
          bash -c "airflow db migrate && airflow connections import /opt/airflow/scripts/configs/connections.json && airflow variables import /opt/airflow/scripts/configs/variables.json && airflow pools import /opt/airflow/scripts/configs/pools.json && pytest /opt/airflow/tests"
