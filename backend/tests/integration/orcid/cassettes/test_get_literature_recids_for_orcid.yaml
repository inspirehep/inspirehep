      Zhokhov\",\"NOREC_Xianglei Zhu\",\"NOREC_Valery Zhukov\",\"NOREC_Stefano Zucchelli\"],\"journal_title_variants\":[\"JHEP\"],\"author_count\":769,\"abstracts\":[{\"value\":\"A
      combination of measurements sensitive to the CKM angle \u03B3 from LHCb is performed.
      The inputs are from analyses of time-integrated B$^{+}$ \u2192 DK$^{+}$, B$^{0}$
      \u2192 DK$^{\u22170}$, B$^{0}$ \u2192 DK$^{+}$\u03C0$^{\u2212}$ and B$^{+}$
      \u2192 DK$^{+}$\u03C0$^{+}$\u03C0$^{\u2212}$ tree-level decays. In addition,
      results from a time-dependent analysis of B$_{s}^{0}$ \u2009\u2192\u2009D$_{s}^{\u2213}$
      K$^{\xB1}$ decays are included. The combination yields \u03B3\u2009=\u2009(72.\u20092$_{\u2212\u20097.3}^{+\u20096.8}$
      )\xB0, where the uncertainty includes systematic effects. The 95.5% confidence
      level interval is determined to be \u03B3 \u2208 [55.9, 85.2]\xB0. A second
      combination is investigated, also including measurements from B$^{+}$ \u2192
      D\u03C0$^{+}$ and B$^{+}$ \u2192 D\u03C0$^{+}$\u03C0$^{\u2212}$\u03C0$^{+}$
      decays, which yields compatible results.\",\"source\":\"Springer\",\"abstract_source_suggest\":{\"input\":\"Springer\"}},{\"value\":\"A
      combination of measurements sensitive to the CKM angle $\\\\gamma$ from LHCb
      is performed. The inputs are from analyses of time-integrated $B^{+}\\\\rightarrow
      DK^+$, $B^{0} \\\\rightarrow D K^{*0}$, $B^{0} \\\\rightarrow D K^+ \\\\pi^-$
      and $B^{+} \\\\rightarrow D K^+\\\\pi^+\\\\pi^-$ tree-level decays. In addition,
      results from a time-dependent analysis of $B_{s}^{0} \\\\rightarrow D_{s}^{\\\\mp}K^{\\\\pm}$
      decays are included. The combination yields $\\\\gamma = (72.2^{+6.8}_{-7.3})^\\\\circ$,
      where the uncertainty includes systematic effects. The 95.5% confidence level
      interval is determined to be $\\\\gamma \\\\in [55.9,85.2]^\\\\circ$. A second
      combination is investigated, also including measurements from $B^{+} \\\\rightarrow
      D \\\\pi^+$ and $B^{+} \\\\rightarrow D \\\\pi^+\\\\pi^-\\\\pi^+$ decays, which
      yields compatible results.\",\"source\":\"arXiv\",\"abstract_source_suggest\":{\"input\":\"arXiv\"}}],\"_ui_display\":\"{\\\"external_system_identifiers\\\":[{\\\"url_name\\\":\\\"HAL
