        \       </authors>\n        <title>CP violation in the B system</title>\n
        \           <categories>hep-ex hep-ph</categories>\n            <comments>Invited
        review for Rep. Prog. Phys. v2 corresponds to published version</comments>\n
        \           <journal-ref>Reports on Progress in Physics, 80 (2017) 046201</journal-ref>\n
        \           <doi>10.1088/1361-6633/aa5514</doi>\n            <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>The phenomenon of CP violation is crucial to understand
        the asymmetry between matter and antimatter that exists in the Universe. Dramatic
        experimental progress has been made, in particular in measurements of the
        behaviour of particles containing the b quark, where CP violation effects
        are predicted by the Kobayashi-Maskawa mechanism that is embedded in the Standard
        Model. The status of these measurements and future prospects for an understanding
        of CP violation beyond the Standard Model are reviewed.</abstract>\n    </arXiv>\n\n
        \           </metadata>\n        </record>\n\n    </GetRecord>\n</OAI-PMH>"
