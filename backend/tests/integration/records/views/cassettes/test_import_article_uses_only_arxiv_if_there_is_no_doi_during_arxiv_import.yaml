        \               </author>\n        </authors>\n        <title>Polarization
        fraction measurement in ZZ scattering using deep learning</title>\n            <categories>hep-ph
        hep-ex</categories>\n            <comments>7 pages</comments>\n            <journal-ref>Phys.
        Rev. D 100, 116010 (2019)</journal-ref>\n            <doi>10.1103/PhysRevD.100.116010</doi>\n
        \           <license>http://arxiv.org/licenses/nonexclusive-distrib/1.0/</license>\n
        \           <abstract>Measuring longitudinally polarized vector boson scattering
        in the ZZ channel is a promising way to investigate unitarity restoration
        with the Higgs mechanism and to search for possible new physics. We investigated
        several deep neural network structures and compared their ability to improve
        the measurement of the longitudinal fraction Z_L Z_L. Using fast simulation
        with the Delphes framework, a clear improvement is found using a previously
        investigated &#39;particle-based&#39; deep neural network on a preprocessed
        dataset and applying principle component analysis to the outputs.A significance
        of around 1.7 standard deviations can be achieved with the integrated luminosity
        of 3000 fb-1 that will be recorded at the High-Luminosity LHC.</abstract>\n
        \   </arXiv>\n\n            </metadata>\n        </record>\n\n    </GetRecord>\n</OAI-PMH>"
